precisar, agents. Não arquitete demais antes de validar."},{"icon":"💰","title":"Custos importam desde o dia 1","text":"Calcule custo por request antes de construir. Um prompt de 4000 tokens × 10.000 requests/dia = U$15-60/dia dependendo do modelo. Cache e modelos menores são seus amigos."},{"icon":"🛡️","title":"Security não é opcional","text":"Se o usuário interage com o prompt, você TEM prompt injection. Trate todo output do LLM como untrusted. Valide antes de usar."},{"icon":"📝","title":"Prompts são código","text":"Versione, teste, meça, revise. Um prompt mal escrito desperdiça tokens e gera output ruim. Promptfoo para eval automatizado."},{"icon":"🔄","title":"Feedback loops vencem","text":"O 👍👎 do usuário é a métrica mais honesta. Colete, analise, melhore os prompts. AI apps que melhoram com uso ganham de apps que são fixas."},{"icon":"🤖","title":"Use AI para construir AI","text":"Use Claude para escrever prompts, refinar outputs e debugar. Meta-prompting (pedir ao LLM para melhorar o prompt) é surpreendentemente eficaz."}],"books":[{"t":"Prompt Engineering Guide","a":"DAIR.AI (gratuito)","c":"#f59e0b","bg":"#1a1408","p":"Fase 2"},{"t":"AI Engineering","a":"Chip Huyen","c":"#a78bfa","bg":"#160a22","p":"Fases 3-6"},{"t":"Building LLM Apps","a":"Valentina Alto","c":"#38bdf8","bg":"#081a28","p":"Fases 4-6"},{"t":"What Is ChatGPT Doing","a":"Stephen Wolfram (gratuito)","c":"#a78bfa","bg":"#160a22","p":"Fase 1"}],"nextSteps":{"desc":"Você completou o roadmap AI para Devs. Aqui estão caminhos para continuar se aprofundando.","items":[{"icon":"🧠","title":"ML Engineering","desc":"Ir além de APIs: treinar modelos, MLOps, pipelines de treino.","tags":["PyTorch","MLflow","Weights & Biases"]},{"icon":"🤖","title":"Autonomous Agents","desc":"Agentes autônomos de longa duração com planejamento e memória complexa.","tags":["AutoGPT","BabyAGI","Devin"]},{"icon":"🔬","title":"AI Research Engineering","desc":"Contribuir para pesquisa de AI: papers, experimentos, benchmarks.","tags":["Papers","Arxiv","Reproduzir resultados"]},{"icon":"🎨","title":"Creative AI","desc":"Geração de vídeo, música, 3D, animação com AI.","tags":["Sora","Runway","Stable Audio"]},{"icon":"🏗️","title":"AI Infrastructure","desc":"Infra para servir modelos em escala: GPU clusters, inference optimization.","tags":["vLLM","TensorRT","Triton"]},{"icon":"📊","title":"Data Engineering para AI","desc":"Pipelines de dados para treino: coleta, limpeza, anotação, synthetic data.","tags":["Databricks","Airflow","Label Studio"]}]}};
const UX={"eyebrow":"roadmap completo · produto digital · craft & estratégia","h1":"UI/UX","h1em":"Basics → Badass","desc":"Guia estruturado para sair dos fundamentos visuais e chegar em design de produto sênior: pesquisa, interação, acessibilidade, design systems, métricas, estratégia e handoff impecável para engenharia.","totalMonths":"~12 meses","dailyHours":"1–3h","storageKey":"rm_ux_v1","phases":[{"id":"mindset","label":"FASE 01","short":"Fundamentos","icon":"🧭","dur":"1–2 semanas","tag":"mentalidade de produto","color":"#f97316","numBg":"#1a1008","numBd":"#2a1808","title":"Fundamentos de UI/UX — Pensar como Designer de Produto","desc":"Antes de Figma bonito vem <strong>clareza</strong>: problema, usuário, contexto, restrições, trade-offs e impacto. Esta fase troca o olhar de \"tela bonita\" por \"decisão de produto bem fundamentada\".","topics":[{"icon":"🎯","title":"O que UI, UX e Product Design resolvem","desc":"Diferenças, sobreposições e responsabilidades reais no dia a dia.","checks":["Distinguir UI, UX, Product Design, Service Design e UX Research","Entender problema, solução, outcome, output e trade-off","Mapear stakeholders: usuário, negócio, engenharia, suporte e vendas","Transformar pedido de tela em pergunta de design: qual comportamento precisa mudar?","Reconhecer restrições de tecnologia, prazo, dados, marca e acessibilidade"],"res":[{"i":"📖","l":"The Design of Everyday Things","t":"book","u":"https://www.nngroup.com/books/design-everyday-things-revised/"},{"i":"🌐","l":"Laws of UX","t":"online","u":"https://lawsofux.com/"}]},{"icon":"🧠","title":"Psicologia, cognição e comportamento","desc":"Como pessoas percebem, decidem, erram, aprendem e confiam.","checks":["Modelos mentais, carga cognitiva e memória de trabalho","Affordance, signifier, feedback, mapping e constraints","Atenção, percepção visual, chunking e reconhecimento vs recall","Viés cognitivo: confirmation bias, anchoring, default effect, loss aversion","Design ético: padrões persuasivos vs dark patterns"],"res":[{"i":"📖","l":"Thinking, Fast and Slow","t":"book","u":"https://us.macmillan.com/books/9780374533557/thinkingfastandslow/"},{"i":"🌐","l":"Cognitive Bias Codex","t":"online","u":"https://commons.wikimedia.org/wiki/File:Cognitive_bias_codex_en.svg"}]},{"icon":"🧩","title":"Heurísticas e princípios de usabilidade","desc":"As regras de bolso que deixam interfaces previsíveis e fáceis de usar.","checks":["Aplicar as 10 heurísticas de Nielsen em telas reais","Detectar problemas de feedback, consistência, controle e prevenção de erro","Fazer uma avaliação heurística com severidade e evidências","Separar preferência estética de problema de usabilidade","Criar checklist próprio para revisar qualquer fluxo"],"res":[{"i":"📖","l":"Nielsen Norman Group — 10 Heuristics","t":"online","u":"https://www.nngroup.com/articles/ten-usability-heuristics/"},{"i":"📖","l":"Heuristic Evaluation — IxDF","t":"online","u":"https://www.interaction-design.org/literature/topics/heuristic-evaluation"}]},{"icon":"🔎","title":"Análise de interfaces existentes","desc":"Treinar o olhar com teardown, comparação e crítica estruturada.","checks":["Fazer teardown de apps bons e ruins sem cair em gosto pessoal","Analisar onboarding, navegação, formulários, estados e mensagens","Identificar padrões recorrentes em SaaS, ecommerce, fintech e social apps","Criar biblioteca de referências com motivo de uso, não só screenshots","Escrever críticas curtas com problema, impacto e alternativa"],"res":[{"i":"🌐","l":"Mobbin","t":"tool","u":"https://mobbin.com/"},{"i":"🌐","l":"Page Flows","t":"tool","u":"https://pageflows.com/"}]}],"project":{"name":"ux-audit — Auditoria Heurística de um Produto Real","desc":"Escolha um produto que você usa muito e faça uma auditoria profunda. A meta é aprender a defender decisões com critérios, não com gosto.","goals":[{"i":"🔎","t":"Auditar 3 fluxos críticos com as heurísticas de Nielsen"},{"i":"📊","t":"Classificar problemas por severidade, frequência e impacto"},{"i":"🧠","t":"Reescrever cada crítica como decisão acionável"},{"i":"🖼️","t":"Criar antes/depois para pelo menos 5 melhorias"}],"dels":["Mapa dos 3 fluxos analisados com screenshots e contexto","Lista de 20+ problemas com heurística violada, evidência e severidade","Redesign de 5 pontos críticos com justificativa","Resumo executivo de 1 página: maiores riscos e quick wins","Arquivo Figma organizado com frames, anotações e componentes básicos","Bônus: versão \"issue de produto\" com problema, evidência, impacto, solução sugerida e esforço estimado"],"tips":["<strong>Use seu lado dev:</strong> quando encontrar um problema, escreva também o provável custo técnico: copy simples, CSS, componente novo, mudança de backend ou métrica nova.","<strong>Critério de done:</strong> alguém consegue ler a auditoria e priorizar um sprint de melhoria sem você explicar ao vivo.","<strong>Exemplo de entrega:</strong> \"O checkout não comunica custo final antes do pagamento, violando visibilidade do status e aumentando abandono. Quick win: subtotal fixo + breakdown antes do CTA.\""],"refs":[{"i":"📖","l":"NN/g — Severity Ratings","t":"online","u":"https://www.nngroup.com/articles/how-to-rate-the-severity-of-usability-problems/"}]},"refs":[{"e":"📖","l":"NN/g — 10 Usability Heuristics","u":"https://www.nngroup.com/articles/ten-usability-heuristics/"},{"e":"📖","l":"The Design of Everyday Things","u":"https://www.nngroup.com/books/design-everyday-things-revised/"},{"e":"🌐","l":"Laws of UX","u":"https://lawsofux.com/"}]},{"id":"visual","label":"FASE 02","short":"Visual Design","icon":"🎨","dur":"2–3 semanas","tag":"craft visual","color":"#ec4899","numBg":"#1a0814","numBd":"#2a0a20","title":"Visual Design — Hierarquia, Cor, Espaço e Composição","desc":"Visual design é engenharia de atenção. Você vai aprender a guiar o olhar, criar ritmo, reduzir ruído e fazer interfaces parecerem confiáveis antes mesmo do usuário ler tudo.","topics":[{"icon":"📐","title":"Composição e hierarquia visual","desc":"Contraste, alinhamento, proximidade, repetição, ritmo e scanning.","checks":["Criar hierarquia clara com tamanho, peso, cor, espaço e posição","Usar grids, colunas, baseline e spacing scale","Aplicar gestalt: proximidade, similaridade, continuidade, figura-fundo","Projetar para leitura em F-pattern, Z-pattern e scanning rápido","Remover ruído visual sem matar personalidade"],"res":[{"i":"📖","l":"Refactoring UI","t":"book","u":"https://www.refactoringui.com/"},{"i":"🌐","l":"Gestalt Principles","t":"online","u":"https://www.interaction-design.org/literature/topics/gestalt-principles"}]},{"icon":"🌈","title":"Cor, contraste e semântica","desc":"Paletas, estados, tokens, acessibilidade e identidade.","checks":["Construir paleta com roles: background, surface, text, border, accent, danger, success","Garantir contraste adequado para texto, ícones e estados","Usar cor como reforço, não como única fonte de significado","Criar escalas claro/escuro e estados hover, focus, active, disabled","Evitar paletas monocromáticas pobres e gradientes sem função"],"res":[{"i":"🔧","l":"Leonardo Color","t":"tool","u":"https://leonardocolor.io/"},{"i":"🔧","l":"Accessible Palette","t":"tool","u":"https://accessiblepalette.com/"}]},{"icon":"🔤","title":"Tipografia para interfaces","desc":"Escalas, legibilidade, densidade, truncamento e sistemas de texto.","checks":["Escolher fontes por legibilidade, tom e suporte de idioma","Criar type scale com display, heading, body, label e code","Controlar line-height, measure, weight, tracking e alinhamento","Projetar tabelas, dashboards, formulários e textos longos","Definir regras de quebra, truncamento, overflow e localização"],"res":[{"i":"📖","l":"Practical Typography","t":"online","u":"https://practicaltypography.com/"},{"i":"🔧","l":"Typescale","t":"tool","u":"https://typescale.com/"}]},{"icon":"🧱","title":"Layout responsivo e densidade","desc":"Do mobile ao desktop, sem telas quebradas ou cards gigantes à toa.","checks":["Projetar mobile, tablet e desktop com prioridades diferentes","Usar constraints, auto layout mental, breakpoints e content-first layout","Criar UIs densas para ferramentas operacionais sem parecer bagunça","Equilibrar espaço em branco com informação escaneável","Projetar estados vazios, loading, erro e conteúdo extremo"],"res":[{"i":"📖","l":"Material Design — Layout","t":"online","u":"https://m3.material.io/foundations/layout/overview"},{"i":"📖","l":"Apple HIG — Layout","t":"online","u":"https://developer.apple.com/design/human-interface-guidelines/layout"}]}],"project":{"name":"visual-redesign — Dashboard SaaS Antes/Depois","desc":"Pegue um dashboard público, template antigo ou tela sua e redesenhe com foco em hierarquia, densidade e clareza.","goals":[{"i":"📐","t":"Criar grid, spacing scale e type scale consistentes"},{"i":"🎨","t":"Definir paleta semântica com contraste validado"},{"i":"🧱","t":"Resolver desktop e mobile com prioridades reais"}],"dels":["Tela original anotada com problemas de hierarquia e leitura","Redesign desktop e mobile em alta fidelidade","Mini style guide: cores, tipografia, spacing, elevação e estados","Checklist de contraste e responsividade","Apresentação curta explicando decisões visuais","Comparação de 3 direções visuais: utilitária, premium e playful, com prós/contras","Versão dark mode ou high contrast para testar robustez do sistema visual"],"tips":["<strong>Badass move:</strong> faça uma versão densa para power users e outra mais guiada para usuários novos. Designers fortes sabem modular densidade.","<strong>Exemplo bom:</strong> dashboard financeiro com hierarquia para saldo, risco, ação recomendada e detalhes escaneáveis, sem depender de cards gigantes."]},"refs":[{"e":"📖","l":"Refactoring UI","u":"https://www.refactoringui.com/"},{"e":"📖","l":"Practical Typography","u":"https://practicaltypography.com/"},{"e":"📖","l":"Material Design 3","u":"https://m3.material.io/"}]},{"id":"figma","label":"FASE 03","short":"Figma Pro","icon":"🛠️","dur":"2–3 semanas","tag":"ferramenta sem bagunça","color":"#a855f7","numBg":"#160a22","numBd":"#241030","title":"Figma Profissional — Componentes, Variáveis e Protótipos","desc":"Figma não é só canvas: é sistema operacional de design. Você vai organizar arquivos, criar componentes reutilizáveis, usar variáveis e prototipar comportamento com precisão.","topics":[{"icon":"📁","title":"Organização de arquivos e workflow","desc":"Pages, naming, branches, review, versionamento e handoff.","checks":["Criar estrutura de páginas: cover, research, flows, components, specs, archive","Nomear frames, componentes e variantes de forma escalável","Usar sections, annotations e links internos para navegação","Trabalhar com branches, version history e comentários","Preparar arquivos para review assíncrono"],"res":[{"i":"📖","l":"Figma Learn","t":"online","u":"https://help.figma.com/hc/en-us/categories/360002051613-Learn-design"}]},{"icon":"🧩","title":"Componentes, variantes e propriedades","desc":"Botões, inputs, cards e padrões flexíveis sem explodir variantes.","checks":["Criar componentes com slots, nested instances e component properties","Modelar variantes por intenção: size, state, tone, icon, density","Evitar variante combinatória impossível de manter","Projetar componentes com estados reais: hover, focus, disabled, loading, error","Criar bibliotecas locais e publicar components com documentação"],"res":[{"i":"📖","l":"Figma — Components and Styles","t":"online","u":"https://help.figma.com/hc/en-us/articles/360038662654-Guide-to-components-in-Figma"}]},{"icon":"🔢","title":"Auto Layout, constraints e variables","desc":"Design responsivo, tokens e temas sem gambiarra manual.","checks":["Usar auto layout para spacing, wrapping, hug/fill e alinhamento","Aplicar constraints em layouts que mudam de tamanho","Criar variables para cor, spacing, radius, números e strings","Usar modes para tema claro/escuro, density e breakpoint mental","Mapear variables para design tokens exportáveis"],"res":[{"i":"📖","l":"Figma — Variables","t":"online","u":"https://help.figma.com/hc/en-us/articles/15339657135383-Guide-to-variables-in-Figma"},{"i":"📖","l":"Figma — Auto Layout","t":"online","u":"https://help.figma.com/hc/en-us/articles/360040451373-Explore-auto-layout-properties"}]},{"icon":"▶️","title":"Prototipagem avançada","desc":"Fluxos clicáveis, condições, microinterações e testes rápidos.","checks":["Criar protótipos navegáveis para desktop e mobile","Usar overlays, interactive components e smart animate com propósito","Simular estados: menus, dialogs, toasts, loading e erro","Usar variables em protótipos para fluxos condicionais","Preparar protótipo para teste moderado ou remoto"],"res":[{"i":"📖","l":"Figma — Prototyping","t":"online","u":"https://help.figma.com/hc/en-us/categories/360002051613-Learn-design"}]}],"project":{"name":"figma-kit — UI Kit Responsivo com Variáveis","desc":"Construa um kit base com componentes, tokens e protótipo navegável. A meta é parar de desenhar tela solta e começar a desenhar sistema.","goals":[{"i":"🧩","t":"20+ componentes com variantes e estados reais"},{"i":"🔢","t":"Variables para tema, spacing e radius"},{"i":"▶️","t":"Protótipo com fluxo completo e estados"}],"dels":["Biblioteca com botões, inputs, selects, tabs, cards, dialogs, toasts e tables","Tokens em variables: color, spacing, radius, typography notes e elevation","Duas telas desktop e duas mobile usando o kit","Protótipo navegável com overlay, erro e sucesso","Página de documentação para uso dos componentes","Component API spec: props esperadas, slots, variantes e estados para implementação","Página \"Do / Don’t\" com exemplos corretos e incorretos de uso"],"tips":["<strong>Pense como dev:</strong> se um componente seria uma prop em React, provavelmente deve virar property/variant no Figma.","<strong>Exemplo bom:</strong> botão com variants de intent, size, state, icon position e loading, mas sem criar 80 combinações manuais."]},"refs":[{"e":"📖","l":"Figma Variables","u":"https://help.figma.com/hc/en-us/articles/15339657135383-Guide-to-variables-in-Figma"},{"e":"📖","l":"Figma Design Systems","u":"https://help.figma.com/hc/en-us/articles/14552901442839-Overview-Introduction-to-design-systems"}]},{"id":"research","label":"FASE 04","short":"Research","icon":"🔬","dur":"3–4 semanas","tag":"evidência antes de opinião","color":"#14b8a6","numBg":"#061a18","numBd":"#0a2a25","title":"UX Research — Descobrir Problemas Reais","desc":"Badass designers não só desenham melhor: eles descobrem o que vale a pena desenhar. Esta fase cobre pesquisa qualitativa, quantitativa, síntese e tomada de decisão.","topics":[{"icon":"🗣️","title":"Entrevistas e descoberta","desc":"Perguntar sem enviesar, ouvir padrões e entender contexto.","checks":["Criar roteiro com objetivos, hipóteses e perguntas abertas","Evitar perguntas tendenciosas, solução cedo demais e confirmação","Conduzir entrevistas com escuta ativa e follow-ups","Capturar jobs, dores, triggers, alternativas e critérios de decisão","Transformar notas em insights acionáveis"],"res":[{"i":"📖","l":"The Mom Test","t":"book","u":"https://www.momtestbook.com/"},{"i":"📖","l":"Continuous Discovery Habits","t":"book","u":"https://www.producttalk.org/book/"}]},{"icon":"🧪","title":"Usability testing","desc":"Testar fluxo com gente real antes de construir errado.","checks":["Definir tarefas, cenário, critérios de sucesso e perguntas pós-tarefa","Rodar testes moderados com think-aloud sem guiar o usuário","Medir task success, time on task, error rate e confidence","Diferenciar problema de usabilidade, conteúdo e expectativa","Priorizar achados por severidade e impacto no objetivo"],"res":[{"i":"📖","l":"NN/g — Usability Testing 101","t":"online","u":"https://www.nngroup.com/articles/usability-testing-101/"},{"i":"🔧","l":"Maze","t":"tool","u":"https://maze.co/"}]},{"icon":"📊","title":"Pesquisa quantitativa e surveys","desc":"Quando medir, como perguntar e como não mentir com número.","checks":["Criar surveys com perguntas claras, escalas corretas e segmentação","Entender amostragem, viés de resposta e significância prática","Usar analytics para encontrar pontos de abandono e fricção","Combinar dados quant com entrevistas para explicar o porquê","Criar research repository pesquisável"],"res":[{"i":"📖","l":"MeasuringU","t":"online","u":"https://measuringu.com/"},{"i":"🔧","l":"Dovetail","t":"tool","u":"https://dovetail.com/"}]},{"icon":"🗺️","title":"Síntese e artefatos","desc":"Persona útil, journey map, JTBD, opportunity tree e story mapping.","checks":["Criar affinity map sem perder evidência original","Usar personas somente quando ajudam decisões reais","Mapear jornadas com emoção, canais, dores e oportunidades","Escrever JTBD e problem statements fortes","Usar opportunity solution tree para conectar pesquisa a roadmap"],"res":[{"i":"📖","l":"Opportunity Solution Tree","t":"online","u":"https://www.producttalk.org/opportunity-solution-tree/"}]}],"project":{"name":"research-sprint — Descoberta de um Problema Real","desc":"Escolha um público que você conhece, entreviste pessoas, teste um fluxo atual e sintetize oportunidades de produto.","goals":[{"i":"🗣️","t":"5 entrevistas com roteiro e notas estruturadas"},{"i":"🧪","t":"5 testes de usabilidade em fluxo existente ou protótipo"},{"i":"🗺️","t":"Opportunity tree conectando dores a soluções"}],"dels":["Plano de pesquisa com hipóteses, público e método","Roteiro de entrevista e teste de usabilidade","Research repository com tags e evidências","Síntese com top 5 insights, severidade e recomendações","Opportunity solution tree priorizada","Clipes ou citações curtas conectadas a cada insight principal","Plano de decisão: o que muda no roadmap se cada insight for verdadeiro"],"tips":["<strong>Não terceirize a verdade para o Figma:</strong> se você não viu alguém sofrer no fluxo, você ainda está chutando com pixels bonitos.","<strong>Exemplo bom:</strong> entrevistar devs que abandonaram um trial e descobrir se o problema era valor, setup técnico, preço, documentação ou falta de confiança."]},"refs":[{"e":"📖","l":"NN/g — UX Research Methods","u":"https://www.nngroup.com/articles/which-ux-research-methods/"},{"e":"📖","l":"Continuous Discovery Habits","u":"https://www.producttalk.org/book/"},{"e":"📖","l":"The Mom Test","u":"https://www.momtestbook.com/"}]},{"id":"ia","label":"FASE 05","short":"IA & Content","icon":"🗂️","dur":"2–3 semanas","tag":"estrutura que some","color":"#38bdf8","numBg":"#081a28","numBd":"#10304a","title":"Information Architecture, Navigation & UX Writing","desc":"Usuários não querem admirar seu menu: querem encontrar, entender e agir. Aqui entram arquitetura da informação, navegação, busca, labels e microcopy.","topics":[{"icon":"🧭","title":"Arquitetura da informação","desc":"Organizar conteúdo e funcionalidades conforme o modelo mental do usuário.","checks":["Fazer inventário de conteúdo e funcionalidades","Agrupar informação com card sorting aberto e fechado","Validar estrutura com tree testing","Projetar taxonomias, labels e hierarquias","Evitar categorias internas que fazem sentido só para a empresa"],"res":[{"i":"📖","l":"Information Architecture — Lou Rosenfeld","t":"book","u":"https://rosenfeldmedia.com/books/information-architecture-for-the-web-and-beyond/"},{"i":"🔧","l":"Optimal Workshop","t":"tool","u":"https://www.optimalworkshop.com/"}]},{"icon":"🧭","title":"Navegação e wayfinding","desc":"Menus, breadcrumbs, search, tabs, sidebars e deep links.","checks":["Escolher navegação por frequência, hierarquia e contexto","Projetar breadcrumbs, back behavior e estado atual","Criar busca com sugestões, filtros, empty states e recuperação","Garantir navegação por teclado e landmarks semânticos","Mapear deep links, URLs e estados compartilháveis"],"res":[{"i":"📖","l":"Apple HIG — Navigation","t":"online","u":"https://developer.apple.com/design/human-interface-guidelines/navigation"},{"i":"📖","l":"Material — Navigation","t":"online","u":"https://m3.material.io/foundations/navigation/overview"}]},{"icon":"✍️","title":"UX writing e microcopy","desc":"Texto que orienta, reduz ansiedade e ajuda o usuário a agir.","checks":["Escrever labels, botões e mensagens em linguagem do usuário","Criar erros com causa, consequência e próximo passo","Definir voz e tom por contexto: sucesso, risco, cobrança, vazio","Evitar jargão interno, culpa no usuário e copy ambígua","Preparar textos para localização e expansão de idioma"],"res":[{"i":"📖","l":"Strategic Writing for UX","t":"book","u":"https://www.oreilly.com/library/view/strategic-writing-for/9781492049388/"},{"i":"🌐","l":"Mailchimp Content Style Guide","t":"online","u":"https://styleguide.mailchimp.com/"}]},{"icon":"📄","title":"Estados e conteúdo operacional","desc":"Empty, loading, error, permission, edge cases e lifecycle.","checks":["Projetar empty states que ensinam o próximo passo","Criar skeletons, progress, optimistic UI e mensagens de espera","Escrever estados de erro recuperáveis e irreversíveis","Mapear permissões, planos pagos, limites e feature unavailable","Documentar conteúdo dinâmico, truncamento e extremos"],"res":[{"i":"📖","l":"Carbon — Content Guidelines","t":"online","u":"https://carbondesignsystem.com/guidelines/content/overview/"}]}],"project":{"name":"ia-redesign — Reorganizar um Produto Complexo","desc":"Pegue um app com muita navegação e redesenhe estrutura, labels, busca e estados.","goals":[{"i":"🗂️","t":"Nova taxonomia validada por tree test ou card sorting"},{"i":"✍️","t":"Microcopy para fluxos críticos e estados extremos"},{"i":"🧭","t":"Mapa de navegação com URLs e estados"}],"dels":["Inventário de conteúdo e funcionalidades","Sitemap atual vs proposto","Card sorting ou tree testing com resultados","Fluxos de navegação desktop e mobile","Guia de microcopy para botões, erros, vazios e confirmações","Matriz de labels: termo interno vs termo do usuário vs termo final escolhido","Search results spec com empty, typo, no permission, archived e loading states"],"tips":["<strong>Exemplo bom:</strong> reorganizar settings de um SaaS multi-tenant separando conta pessoal, workspace, billing, members, security e integrations."]},"refs":[{"e":"📖","l":"Information Architecture for the Web and Beyond","u":"https://rosenfeldmedia.com/books/information-architecture-for-the-web-and-beyond/"},{"e":"📖","l":"Strategic Writing for UX","u":"https://www.oreilly.com/library/view/strategic-writing-for/9781492049388/"}]},{"id":"interaction","label":"FASE 06","short":"Interaction","icon":"⚡","dur":"3–4 semanas","tag":"fluxos que fluem","color":"#f59e0b","numBg":"#1a1408","numBd":"#2a2008","title":"Interaction Design — Fluxos, Padrões e Estados","desc":"Interaction design é onde UX fica concreto: tarefas, fluxo, feedback, validação, erro, recuperação e eficiência para usuários novos e avançados.","topics":[{"icon":"🧵","title":"User flows e task flows","desc":"Desenhar caminhos com intenção, decisão e recuperação.","checks":["Mapear entry points, happy path, alternate paths e failure paths","Projetar fluxo por tarefa, não por tela","Reduzir passos sem esconder decisões importantes","Criar fluxos para usuários novos, recorrentes e avançados","Documentar dependências de dados e estados técnicos"],"res":[{"i":"🔧","l":"FigJam","t":"tool","u":"https://www.figma.com/figjam/"}]},{"icon":"🧱","title":"Padrões de interface","desc":"Quando usar modal, drawer, wizard, tabs, table, command palette e mais.","checks":["Escolher padrões por tarefa, risco, frequência e contexto","Projetar modais sem becos sem saída","Criar tables com sort, filter, bulk actions e density","Usar command palette e shortcuts para power users","Projetar undo, redo, autosave, drafts e confirmação"],"res":[{"i":"📖","l":"UI Patterns","t":"online","u":"https://ui-patterns.com/"},{"i":"📖","l":"Designing Interfaces","t":"book","u":"https://www.oreilly.com/library/view/designing-interfaces-3rd/9781492051954/"}]},{"icon":"📝","title":"Formulários e entrada de dados","desc":"O lugar onde bons produtos ganham confiança e ruins perdem usuário.","checks":["Projetar labels, hints, masks, defaults, validation e errors","Escolher controles corretos para seleção, busca, data e número","Criar multi-step forms com progresso, salvamento e retorno","Reduzir entrada manual com defaults, autocomplete e prefill","Garantir suporte a teclado, mobile input types e password managers"],"res":[{"i":"📖","l":"Form Design Patterns","t":"book","u":"https://www.smashingmagazine.com/printed-books/form-design-patterns/"}]},{"icon":"🧯","title":"Feedback, erro e recuperação","desc":"Sistema visível, previsível e reversível.","checks":["Projetar feedback imediato para ações síncronas e assíncronas","Usar toast, inline message, banner e dialog no contexto certo","Prevenir erros antes de mensagens de erro","Criar recoverability: undo, retry, draft, restore e contact support","Projetar estados offline, timeout, conflito e permissão"],"res":[{"i":"📖","l":"NN/g — Error Message Guidelines","t":"online","u":"https://www.nngroup.com/articles/error-message-guidelines/"}]}],"project":{"name":"flow-lab — Checkout ou Signup de Alta Conversão","desc":"Desenhe um fluxo completo com dados reais, validação, erros, loading, sucesso e recuperação.","goals":[{"i":"🧵","t":"Fluxo completo com happy path e failure paths"},{"i":"📝","t":"Formulários acessíveis e eficientes"},{"i":"🧯","t":"Estados de erro e recuperação documentados"}],"dels":["Task flow com decisões e dependências","Wireframes low-fi para explorar alternativas","UI high-fi desktop e mobile","Protótipo com validação, erro, loading, success e back behavior","Especificação de estados para engenharia","State machine simples do fluxo: idle, editing, validating, saving, success, error, conflict","Mapa de keyboard shortcuts e comportamento de foco"],"tips":["<strong>Exemplo bom:</strong> importador CSV com preview, validação inline, erros por linha, retry, save draft e resumo antes de confirmar."]},"refs":[{"e":"📖","l":"Designing Interfaces","u":"https://www.oreilly.com/library/view/designing-interfaces-3rd/9781492051954/"},{"e":"📖","l":"Form Design Patterns","u":"https://www.smashingmagazine.com/printed-books/form-design-patterns/"}]},{"id":"accessibility","label":"FASE 07","short":"A11y","icon":"♿","dur":"2–3 semanas","tag":"qualidade obrigatória","color":"#22c55e","numBg":"#081a10","numBd":"#0a2a16","title":"Acessibilidade & Inclusive Design — WCAG 2.2 na Prática","desc":"Acessibilidade não é checklist no final: é qualidade de produto. Você vai projetar para teclado, leitor de tela, contraste, movimento, cognição e diferentes capacidades desde o início.","topics":[{"icon":"📜","title":"WCAG 2.2 e critérios essenciais","desc":"POUR, níveis A/AA/AAA e novos critérios de foco, alvo, auth e entrada.","checks":["Entender POUR: perceivable, operable, understandable, robust","Conhecer WCAG 2.2 AA como baseline para produto digital","Projetar foco visível e não obscurecido por headers sticky","Garantir target size, alternativa a drag e accessible authentication","Documentar decisões que impactam conformidade"],"res":[{"i":"📖","l":"W3C — WCAG 2.2","t":"online","u":"https://www.w3.org/TR/WCAG22/"},{"i":"📖","l":"WAI — Understanding WCAG","t":"online","u":"https://www.w3.org/WAI/WCAG22/Understanding/"}]},{"icon":"⌨️","title":"Keyboard, focus e screen readers","desc":"Fluxos operáveis sem mouse e compreensíveis para tecnologia assistiva.","checks":["Projetar ordem de foco lógica e skip links quando necessário","Definir estados focus-visible para todos controles","Descrever labels, names, roles, values e live regions no handoff","Projetar dialogs, menus e comboboxes com comportamento acessível","Testar fluxo com teclado e leitor de tela básico"],"res":[{"i":"📖","l":"ARIA Authoring Practices Guide","t":"online","u":"https://www.w3.org/WAI/ARIA/apg/"}]},{"icon":"👁️","title":"Visual, motion e conteúdo inclusivo","desc":"Contraste, daltonismo, redução de movimento, linguagem clara.","checks":["Validar contraste de texto, ícones e gráficos importantes","Não depender apenas de cor para comunicar estado","Projetar prefers-reduced-motion e evitar animações problemáticas","Criar linguagem simples para erro, ajuda e autenticação","Considerar zoom, reflow, tamanho de texto e touch"],"res":[{"i":"🔧","l":"Stark","t":"tool","u":"https://www.getstark.co/"},{"i":"🔧","l":"APCA Contrast Calculator","t":"tool","u":"https://www.myndex.com/APCA/"}]},{"icon":"🧪","title":"Auditoria e testes de acessibilidade","desc":"Combinar automação, inspeção manual e testes com usuários.","checks":["Rodar check automático como primeira camada, não como garantia total","Fazer keyboard sweep de fluxos críticos","Testar labels, erros, headings e landmarks","Criar backlog de issues com severidade e critério WCAG","Incluir acessibilidade em definition of done"],"res":[{"i":"🔧","l":"axe DevTools","t":"tool","u":"https://www.deque.com/axe/devtools/"},{"i":"📖","l":"Material — Accessibility","t":"online","u":"https://m3.material.io/foundations/accessible-design/overview"}]}],"project":{"name":"a11y-audit — Redesign Acessível de Fluxo Crítico","desc":"Escolha um login, checkout, formulário ou dashboard e faça uma auditoria WCAG 2.2 AA com redesign e handoff técnico.","goals":[{"i":"♿","t":"Auditoria com critérios WCAG 2.2 AA relevantes"},{"i":"⌨️","t":"Fluxo totalmente navegável por teclado"},{"i":"🧪","t":"Issues priorizadas e redesign validado"}],"dels":["Checklist WCAG 2.2 aplicado ao fluxo","Mapa de foco e comportamento de teclado","Redesign com contraste, estados e labels corrigidos","Spec para engenharia com roles, names e estados","Relatório final com antes/depois e severidade","Teste documentado com teclado: ordem de foco, traps, skip, dialogs e erro","Anotações para screen reader: headings, landmarks, labels, descriptions e live regions"],"tips":["<strong>Critério de done:</strong> o fluxo precisa ser entendível sem olhar para a tela e operável sem mouse.","<strong>Exemplo bom:</strong> formulário de pagamento em que erro é anunciado, foco vai para o campo certo e instrução não depende só de cor."]},"refs":[{"e":"📖","l":"W3C WCAG 2.2","u":"https://www.w3.org/TR/WCAG22/"},{"e":"📖","l":"ARIA APG","u":"https://www.w3.org/WAI/ARIA/apg/"},{"e":"🔧","l":"axe DevTools","u":"https://www.deque.com/axe/devtools/"}]},{"id":"systems","label":"FASE 08","short":"Design Systems","icon":"🏗️","dur":"4–5 semanas","tag":"escala e consistência","color":"#0ea5e9","numBg":"#071520","numBd":"#0a2333","title":"Design Systems — Tokens, Componentes e Governança","desc":"Design systems são a ponte entre craft e escala. Você vai aprender a modelar tokens, componentes, padrões, documentação, contribuição e adoção junto com engenharia.","topics":[{"icon":"🔤","title":"Design tokens","desc":"Cores, tipografia, spacing, radius, elevation, motion e semântica.","checks":["Separar primitive tokens, semantic tokens e component tokens","Modelar temas claro/escuro, density e estados","Nomear tokens por função, não por aparência frágil","Mapear tokens Figma para CSS variables ou platform tokens","Documentar uso, exemplos e anti-patterns"],"res":[{"i":"📖","l":"Design Tokens Community Group","t":"online","u":"https://www.w3.org/community/design-tokens/"},{"i":"🔧","l":"Tokens Studio","t":"tool","u":"https://tokens.studio/"}]},{"icon":"🧩","title":"Component architecture","desc":"API mental de componentes: props, slots, variants, states e composition.","checks":["Projetar componentes com anatomy, behavior, states e accessibility","Evitar componentes genéricos demais ou específicos demais","Definir component API alinhada a implementação frontend","Criar padrões para forms, tables, navigation, overlays e feedback","Versionar breaking changes e migration notes"],"res":[{"i":"📖","l":"Material Design 3 Components","t":"online","u":"https://m3.material.io/components"},{"i":"📖","l":"Carbon Design System","t":"online","u":"https://carbondesignsystem.com/"}]},{"icon":"📚","title":"Documentação e adoção","desc":"Como designers e devs realmente usam o sistema sem virar museu.","checks":["Escrever docs com usage, anatomy, behavior, content e a11y","Criar exemplos bons, ruins e edge cases","Definir contribution model, review e ownership","Medir adoção, duplicação e componentes órfãos","Criar changelog e comunicação de releases"],"res":[{"i":"📖","l":"Figma — Design Systems Course","t":"online","u":"https://help.figma.com/hc/en-us/articles/14552901442839-Overview-Introduction-to-design-systems"},{"i":"🔧","l":"Storybook","t":"tool","u":"https://storybook.js.org/"}]},{"icon":"🤝","title":"Design-engineering collaboration","desc":"Handoff, QA visual, specs, tokens e colaboração contínua.","checks":["Fazer handoff com specs de comportamento, estados e edge cases","Usar Storybook, Chromatic ou previews para revisar componentes reais","Participar de QA visual e accessibility QA","Criar fluxo de design review e component intake","Traduzir decisões de design em constraints técnicas claras"],"res":[{"i":"🔧","l":"Chromatic","t":"tool","u":"https://www.chromatic.com/"}]}],"project":{"name":"product-system — Design System de SaaS + Storybook Spec","desc":"Crie um sistema com tokens, componentes e documentação pensada para designers e devs.","goals":[{"i":"🔤","t":"Tokens semânticos com tema claro/escuro"},{"i":"🧩","t":"30+ componentes documentados"},{"i":"📚","t":"Docs com uso, a11y, conteúdo e exemplos"}],"dels":["Token architecture com naming e modos","Component library Figma com anatomy, variants e estados","Documentação de 10 componentes críticos","Spec de implementação para Storybook","Governança: contribuição, versionamento e release notes","Migration guide: como trocar componentes antigos pelos novos sem quebrar produto","Matriz de ownership: quem aprova token, componente, pattern e breaking change"],"tips":["<strong>Use sua experiência técnica:</strong> desenhe componentes como se alguém fosse importar e compor em React amanhã.","<strong>Exemplo bom:</strong> tabela documentada com density, seleção, bulk action, empty state, loading, erro, sort, filter e coluna customizável."]},"refs":[{"e":"📖","l":"Figma Design Systems","u":"https://help.figma.com/hc/en-us/articles/14552901442839-Overview-Introduction-to-design-systems"},{"e":"📖","l":"Material Design 3","u":"https://m3.material.io/"},{"e":"📖","l":"Carbon Design System","u":"https://carbondesignsystem.com/"}]},{"id":"platforms","label":"FASE 09","short":"Platforms","icon":"📱","dur":"2–3 semanas","tag":"web, mobile e desktop","color":"#6366f1","numBg":"#0d1024","numBd":"#151a35","title":"Platform Design — Web, Mobile, Desktop e Responsividade","desc":"Um designer forte respeita plataforma. iOS, Android, web e desktop têm convenções diferentes, inputs diferentes e expectativas diferentes.","topics":[{"icon":"🍎","title":"iOS e Apple HIG","desc":"Navegação, gestures, sheets, controls, tab bars e platform feel.","checks":["Entender hierarquia, harmonia e consistência na Apple HIG","Projetar navigation stacks, sheets, tab bars e toolbars","Considerar Dynamic Type, Safe Areas, VoiceOver e Reduce Motion","Usar componentes nativos quando eles reduzem fricção","Evitar padrões web que parecem estranhos no iOS"],"res":[{"i":"📖","l":"Apple Human Interface Guidelines","t":"online","u":"https://developer.apple.com/design/human-interface-guidelines/"}]},{"icon":"🤖","title":"Android e Material Design","desc":"Material 3, navigation, components, adaptive layout e motion.","checks":["Entender color roles, typography, elevation e shape no Material 3","Projetar bottom navigation, navigation rail, drawers e app bars","Usar adaptive layout para foldables, tablets e desktop","Considerar back behavior, permissions e system UI","Projetar componentes com estados Material e acessibilidade"],"res":[{"i":"📖","l":"Material Design 3","t":"online","u":"https://m3.material.io/"}]},{"icon":"🌐","title":"Web app e SaaS patterns","desc":"Dashboards, admin, tables, filters, command menus e productivity UX.","checks":["Projetar layouts com sidebar, topbar, breadcrumbs e workspace switcher","Criar tabelas densas com filtros, bulk actions e saved views","Projetar keyboard shortcuts, command palette e power-user flows","Lidar com permissões, planos, billing, orgs e multi-tenant UX","Pensar em URLs, deep links, reload e browser history"],"res":[{"i":"🌐","l":"Linear Method","t":"online","u":"https://linear.app/method"}]},{"icon":"🖥️","title":"Desktop, responsive e adaptive design","desc":"Janelas, densidade, estados hover, pointer, touch e resize real.","checks":["Projetar breakpoints por conteúdo, não por device genérico","Diferenciar responsive, adaptive e fluid layout","Criar layouts que resistem a dados extremos","Projetar hover, focus, touch, keyboard e pointer precision","Testar com zoom, viewport pequeno, ultrawide e split screen"],"res":[{"i":"📖","l":"Responsive Design — web.dev","t":"online","u":"https://web.dev/learn/design/"}]}],"project":{"name":"cross-platform — Mesmo Produto em Web, iOS e Android","desc":"Desenhe a mesma feature em três plataformas, preservando intenção e respeitando convenções nativas.","goals":[{"i":"📱","t":"Feature adaptada para iOS, Android e web SaaS"},{"i":"🧭","t":"Navegação nativa em cada plataforma"},{"i":"♿","t":"Acessibilidade e inputs por plataforma"}],"dels":["Brief da feature e tarefas principais","Wireframes por plataforma","High-fi iOS, Android e web desktop","Notas de diferenças de navegação, componentes e input","Protótipos clicáveis de cada versão","Matriz de diferenças por plataforma: navegação, input, componente nativo, gesto e back behavior","Checklist de safe area, keyboard mobile, hover/focus desktop e deep links"],"tips":["<strong>Exemplo bom:</strong> mesma feature de comentários como drawer no web app, bottom sheet no mobile e painel lateral no desktop."]},"refs":[{"e":"📖","l":"Apple HIG","u":"https://developer.apple.com/design/human-interface-guidelines/"},{"e":"📖","l":"Material Design 3","u":"https://m3.material.io/"},{"e":"📖","l":"web.dev Responsive Design","u":"https://web.dev/learn/design/"}]},{"id":"localization","label":"FASE 10","short":"Localization","icon":"🌍","dur":"2 semanas","tag":"global por padrão","color":"#10b981","numBg":"#061a12","numBd":"#0a2a1c","title":"Localization & Global UX — Produto para Muitos Contextos","desc":"Interfaces quebram quando encontram idiomas longos, moedas, datas, culturas, legal requirements e expectativas locais. Esta fase coloca internacionalização no design desde o começo.","topics":[{"icon":"🔤","title":"Texto, idioma e expansão","desc":"Copy preparada para tradução sem quebrar layout ou sentido.","checks":["Projetar strings com expansão de 30–50% sem estourar componentes","Evitar texto embutido em imagens, ícones ou screenshots","Documentar contexto de tradução para termos ambíguos","Criar regras de truncamento, wrapping e pluralização","Testar pseudo-localização em telas críticas"],"res":[{"i":"📖","l":"Google Material — Localization","t":"online","u":"https://m3.material.io/foundations/content-design/overview"}]},{"icon":"💱","title":"Formato local e dados regionais","desc":"Data, hora, moeda, número, endereço, telefone, nomes e documentos.","checks":["Projetar datas, horas e fusos sem ambiguidade","Adaptar moeda, separador decimal e casas decimais","Criar formulários flexíveis para endereço, telefone e nomes internacionais","Considerar unidades, documentos, impostos e requisitos locais","Documentar fallback quando dado regional não existe"],"res":[{"i":"📖","l":"W3C — Internationalization","t":"online","u":"https://www.w3.org/International/"}]},{"icon":"↔️","title":"RTL, direção e layouts adaptáveis","desc":"Suporte a idiomas right-to-left e leitura culturalmente adequada.","checks":["Entender quando espelhar layout, ícones e navegação","Projetar componentes com direção lógica, não coordenadas fixas","Testar strings longas em botões, tabs, cards e tabelas","Evitar dependência de posição esquerda/direita no texto","Criar specs para mirrored UI, gráficos e fluxos"],"res":[{"i":"📖","l":"Material — Bidirectionality","t":"online","u":"https://m2.material.io/design/usability/bidirectionality.html"}]},{"icon":"⚖️","title":"Cultura, confiança e compliance local","desc":"Expectativas locais de privacidade, pagamento, identidade e suporte.","checks":["Adaptar trust signals, métodos de pagamento e prova social por mercado","Considerar LGPD, GDPR, consentimento e comunicação legal por região","Evitar imagens, exemplos e metáforas culturalmente frágeis","Projetar suporte, idioma e fallback humano por país","Validar com usuários ou especialistas locais antes de escalar"],"res":[{"i":"📖","l":"Gov.uk — Inclusive Language","t":"online","u":"https://www.gov.uk/guidance/content-design/inclusive-language"}]}],"project":{"name":"global-ready — Internacionalizar um Fluxo SaaS","desc":"Pegue um fluxo existente e torne-o pronto para português, inglês, alemão e árabe, incluindo texto longo, formatos locais e RTL.","goals":[{"i":"🌍","t":"Fluxo resiliente a tradução, expansão e RTL"},{"i":"💱","t":"Datas, moedas, números e formulários localizados"},{"i":"⚖️","t":"Confiança e compliance adaptados por mercado"}],"dels":["Inventário de strings com contexto para tradução","Frames em 4 idiomas: pt-BR, en-US, de-DE e ar-SA","Versão RTL com navegação, ícones e alinhamentos revisados","Formulários com endereço, telefone, moeda e data localizados","Checklist de pseudo-localização e edge cases de texto","Notas de handoff para i18n: pluralização, truncamento, locale e fallback"],"tips":["<strong>Exemplo bom:</strong> pricing page com moeda local, impostos, planos, FAQ legal e checkout adaptados por país.","<strong>Critério de done:</strong> nenhum botão, tab, tabela ou card quebra quando o idioma fica 50% maior."],"refs":[{"i":"📖","l":"W3C Internationalization","t":"online","u":"https://www.w3.org/International/"}]},"refs":[{"e":"📖","l":"W3C Internationalization","u":"https://www.w3.org/International/"},{"e":"📖","l":"Material Bidirectionality","u":"https://m2.material.io/design/usability/bidirectionality.html"}]},{"id":"product","label":"FASE 11","short":"Product UX","icon":"📈","dur":"3–4 semanas","tag":"design que move métrica","color":"#84cc16","numBg":"#101a08","numBd":"#1a2a0a","title":"Product UX — Métricas, Experimentação e Decisão","desc":"Design de produto bom muda comportamento mensurável. Aqui você conecta UX a aquisição, ativação, retenção, conversão, satisfação e saúde do negócio.","topics":[{"icon":"📊","title":"Métricas de produto e UX","desc":"North Star, funil, ativação, retenção, conversão, NPS, SUS e CES.","checks":["Definir outcome metric, guardrail metrics e leading indicators","Mapear funis e eventos para fluxos críticos","Usar métricas UX: task success, SUS, CES, time on task, error rate","Separar métrica de vaidade de sinal acionável","Criar dashboard simples de saúde da experiência"],"res":[{"i":"📖","l":"Amplitude — North Star Metric","t":"online","u":"https://amplitude.com/north-star"},{"i":"📖","l":"MeasuringU — SUS","t":"online","u":"https://measuringu.com/sus/"}]},{"icon":"🧪","title":"Experimentação e A/B testing","desc":"Hipótese, desenho experimental, risco, interpretação e ética.","checks":["Escrever hipóteses com comportamento esperado e métrica","Diferenciar A/B test, fake door, prototype test e usability test","Entender sample size, duração, novelty effect e false positives","Definir guardrails para não otimizar uma métrica destruindo outra","Documentar aprendizados mesmo quando o teste perde"],"res":[{"i":"📖","l":"Trustworthy Online Controlled Experiments","t":"book","u":"https://www.cambridge.org/core/books/trustworthy-online-controlled-experiments/7A2F9F07B3D997890E1C8B4B36A6E30A"}]},{"icon":"🚀","title":"Onboarding, activation e retention","desc":"Ajudar usuário a chegar ao valor e voltar.","checks":["Mapear aha moment, setup tasks e activation criteria","Projetar onboarding progressivo sem tour inútil","Criar empty states e templates que puxam para ação","Projetar notifications, reminders e lifecycle sem spam","Reduzir churn com UX de valor recorrente"],"res":[{"i":"📖","l":"UserOnboard","t":"online","u":"https://www.useronboard.com/"}]},{"icon":"💸","title":"Conversion, pricing e monetização","desc":"UX para trial, paywall, upgrade, checkout, billing e cancelamento.","checks":["Projetar planos e pricing com comparação justa","Criar upgrade prompts contextuais e não predatórios","Desenhar trial, checkout, billing e invoice UX","Projetar cancellation flow ético com feedback útil","Medir conversão junto com confiança, suporte e chargebacks"],"res":[{"i":"📖","l":"Stripe — Checkout Best Practices","t":"online","u":"https://stripe.com/resources/more/checkout-best-practices"}]}],"project":{"name":"activation-redesign — Melhorar Ativação de um SaaS","desc":"Escolha um produto SaaS e redesenhe onboarding, empty states e primeiro valor usando métricas.","goals":[{"i":"📊","t":"Funil com eventos e métricas definidos"},{"i":"🚀","t":"Onboarding orientado ao aha moment"},{"i":"🧪","t":"Plano de experimento para validar melhoria"}],"dels":["Mapa do funil atual e hipótese de gargalo","Redesign de onboarding e primeira experiência","Event tracking plan para engenharia","Protótipo de activation flow","Plano de experimento com métrica primária e guardrails","Instrumentação detalhada: evento, propriedade, trigger, owner e pergunta que responde","Plano de rollout com segmento, risco, guardrails e rollback"],"tips":["<strong>Exemplo bom:</strong> onboarding que mede time-to-first-value, não só completion rate."]},"refs":[{"e":"📖","l":"Continuous Discovery Habits","u":"https://www.producttalk.org/book/"},{"e":"📖","l":"Amplitude North Star","u":"https://amplitude.com/north-star"},{"e":"📖","l":"MeasuringU","u":"https://measuringu.com/"}]},{"id":"service","label":"FASE 12","short":"Service Design","icon":"🧭","dur":"3–4 semanas","tag":"produto além da tela","color":"#fb7185","numBg":"#1a080d","numBd":"#2a0a13","title":"Service Design & Journey Ecosystems — Experiência Ponta a Ponta","desc":"Produtos digitais vivem dentro de serviços maiores: suporte, operações, vendas, cobrança, onboarding humano, políticas e processos internos. Esta fase ensina a desenhar a experiência completa, não só a interface.","topics":[{"icon":"🗺️","title":"Service blueprint e frontstage/backstage","desc":"Mapear o que o usuário vê e o que precisa acontecer por trás.","checks":["Separar ações do usuário, pontos de contato, frontstage, backstage e sistemas","Identificar falhas entre canais: produto, email, suporte, vendas e operações","Mapear handoffs entre times e momentos de espera","Encontrar oportunidades que não são resolvidas apenas com UI","Transformar blueprint em backlog de produto, operação e conteúdo"],"res":[{"i":"📖","l":"NN/g — Service Blueprints","t":"online","u":"https://www.nngroup.com/articles/service-blueprints-definition/"},{"i":"📖","l":"Service Design — Practical Access Guide","t":"online","u":"https://www.practicalservicedesign.com/"}]},{"icon":"📍","title":"Journey maps e lifecycle","desc":"Entender a experiência antes, durante e depois do produto.","checks":["Mapear etapas de awareness, avaliação, setup, uso recorrente, suporte e churn","Registrar emoção, dúvidas, barreiras, canais e métricas por etapa","Conectar jornadas a segmentos e jobs diferentes","Identificar momentos de verdade, ansiedade e confiança","Criar ações de melhoria para curto, médio e longo prazo"],"res":[{"i":"📖","l":"NN/g — Journey Mapping 101","t":"online","u":"https://www.nngroup.com/articles/journey-mapping-101/"}]},{"icon":"🎛️","title":"Omnichannel e touchpoints","desc":"Produto, email, notificações, suporte, docs e vendas como uma experiência só.","checks":["Projetar consistência entre app, emails, help center e mensagens transacionais","Definir o canal certo para cada tipo de mensagem","Criar continuidade: usuário não deve repetir contexto a cada canal","Mapear escalonamento de self-service para suporte humano","Projetar experiências de falha: atraso, cancelamento, cobrança e incidentes"],"res":[{"i":"📖","l":"Intercom — Customer Support UX","t":"online","u":"https://www.intercom.com/resources/customer-support"}]},{"icon":"🏢","title":"Operações e experiência interna","desc":"Ferramentas internas e processos que sustentam a experiência externa.","checks":["Mapear quem precisa agir internamente para cumprir a promessa ao usuário","Desenhar admin tools, moderation queues e support consoles","Projetar SLAs, status, ownership e alertas operacionais","Criar visão de risco e exceções para times internos","Medir experiência do usuário e custo operacional juntos"],"res":[{"i":"📖","l":"Designing for the Digital Age","t":"book","u":"https://www.goodreads.com/book/show/6264248-designing-for-the-digital-age"}]}],"project":{"name":"service-blueprint — Redesenhar uma Experiência Ponta a Ponta","desc":"Escolha uma jornada complexa, como onboarding B2B, cancelamento, suporte de incidente ou cobrança, e redesenhe produto + canais + operação.","goals":[{"i":"🗺️","t":"Blueprint com frontstage, backstage, sistemas e handoffs"},{"i":"📍","t":"Journey map com emoção, canais, fricções e métricas"},{"i":"🎛️","t":"Touchpoints redesenhados: app, email, help center e suporte"}],"dels":["Service blueprint completo com usuário, frontstage, backstage, sistemas e políticas","Journey map com emoções, perguntas, canais, métricas e oportunidades","Redesign de 3 touchpoints: tela do produto, email transacional e artigo de ajuda","Admin/support view para o time interno resolver exceções","Roadmap de melhorias dividido em quick wins, processo, produto e automação","Métricas de sucesso: satisfação, tempo de resolução, tickets evitados e conversão"],"tips":["<strong>Exemplo bom:</strong> redesenhar cancelamento SaaS sem dark pattern: tela clara, email de confirmação, base de ajuda, motivo estruturado, winback ético e dashboard interno de churn.","<strong>Critério de done:</strong> alguém de produto, suporte e engenharia consegue ver o mapa e entender onde agir primeiro."],"refs":[{"i":"📖","l":"NN/g — Service Blueprint","t":"online","u":"https://www.nngroup.com/articles/service-blueprints-definition/"},{"i":"📖","l":"Practical Service Design","t":"online","u":"https://www.practicalservicedesign.com/"}]},"refs":[{"e":"📖","l":"NN/g — Service Blueprints","u":"https://www.nngroup.com/articles/service-blueprints-definition/"},{"e":"📖","l":"NN/g — Journey Mapping","u":"https://www.nngroup.com/articles/journey-mapping-101/"},{"e":"📖","l":"Practical Service Design","u":"https://www.practicalservicedesign.com/"}]},{"id":"advanced","label":"FASE 13","short":"Advanced UX","icon":"🧠","dur":"3–4 semanas","tag":"complexidade real","color":"#eab308","numBg":"#1a1608","numBd":"#2a2408","title":"Advanced UX — Sistemas Complexos, Enterprise e Dados","desc":"A diferença entre designer bom e sênior aparece quando o produto é complexo: permissões, dados, workflows, status, edge cases, multi-user e decisões irreversíveis.","topics":[{"icon":"🏢","title":"Enterprise UX e workflows","desc":"Ferramentas internas, B2B SaaS, multi-step jobs e produtividade.","checks":["Mapear workflow real com roles, handoffs e exceções","Projetar para frequência alta e baixo glamour visual","Criar bulk actions, saved views, audit logs e permissions","Reduzir tempo de tarefa para usuários especialistas","Equilibrar configurabilidade com simplicidade"],"res":[{"i":"📖","l":"Designing for the Digital Age","t":"book","u":"https://www.goodreads.com/book/show/6264248-designing-for-the-digital-age"}]},{"icon":"📊","title":"Data visualization e dashboards","desc":"Gráficos, tabelas, comparação, alerta, investigação e decisão.","checks":["Escolher gráfico por pergunta: comparação, tendência, composição, distribuição","Projetar dashboards por decisão, não por coleção de gráficos","Criar drill-down, filtros, time ranges e exportação","Evitar chartjunk, eixos enganosos e uso ruim de cor","Projetar estados sem dados, dados atrasados e anomalias"],"res":[{"i":"📖","l":"Storytelling with Data","t":"book","u":"https://www.storytellingwithdata.com/books"}]},{"icon":"🔐","title":"Trust, safety e risk UX","desc":"Permissões, privacidade, segurança, fraude, consentimento e decisões de risco.","checks":["Projetar consentimento claro e configurações de privacidade","Criar UX para permissões, roles e access requests","Projetar warning, confirmation e irreversible actions","Lidar com fraude, abuse, report, block e moderation","Evitar dark patterns e manipulação de escolha"],"res":[{"i":"📖","l":"Deceptive Patterns","t":"online","u":"https://www.deceptive.design/"}]},{"icon":"🤖","title":"AI UX e interfaces inteligentes","desc":"Chat, copilots, suggestions, uncertainty, eval e human-in-the-loop.","checks":["Projetar AI com transparência sobre capacidade e limite","Criar streaming, citations, confidence, editability e undo","Projetar fallback quando o modelo erra ou demora","Coletar feedback útil para eval e melhoria","Evitar automação perigosa sem revisão humana"],"res":[{"i":"📖","l":"NN/g — AI UX","t":"online","u":"https://www.nngroup.com/topic/ai/"},{"i":"📖","l":"People + AI Guidebook","t":"online","u":"https://pair.withgoogle.com/guidebook/"}]}],"project":{"name":"ops-console — Produto Enterprise Complexo","desc":"Desenhe um console operacional para investigar alertas, filtrar dados, executar ações em massa e revisar riscos.","goals":[{"i":"🏢","t":"Workflow enterprise com roles e permissões"},{"i":"📊","t":"Dashboard orientado a decisão"},{"i":"🔐","t":"Ações críticas com confiança e recuperação"}],"dels":["Service blueprint ou workflow map","Dashboard com tabela, gráficos, filtros e saved views","Fluxo de ação em massa com preview, confirmação e undo","Estados de permissão, erro, loading e dados vazios","Spec de eventos e audit log","Permission matrix por role, action, resource e estado","Audit log UX com filtros, diffs, actor, timestamp e reversibilidade"],"tips":["<strong>Exemplo bom:</strong> console de incidentes com triagem, severidade, owner, timeline, ações sugeridas e postmortem."]},"refs":[{"e":"📖","l":"Storytelling with Data","u":"https://www.storytellingwithdata.com/books"},{"e":"📖","l":"People + AI Guidebook","u":"https://pair.withgoogle.com/guidebook/"},{"e":"🌐","l":"Deceptive Patterns","u":"https://www.deceptive.design/"}]},{"id":"ethics","label":"FASE 14","short":"Ethics & Privacy","icon":"🛡️","dur":"2–3 semanas","tag":"confiança por design","color":"#64748b","numBg":"#0d1118","numBd":"#1f2937","title":"Design Ethics, Privacy & Responsible UX","desc":"Design também define incentivos. Esta fase aprofunda consentimento, privacidade, manipulação, segurança psicológica, dados sensíveis e escolhas responsáveis.","topics":[{"icon":"🕳️","title":"Dark patterns e manipulação","desc":"Reconhecer, evitar e substituir padrões enganosos.","checks":["Identificar confirmshaming, hidden costs, forced continuity e obstruction","Projetar cancelamento, opt-out e downgrade sem fricção artificial","Separar persuasão legítima de manipulação","Criar checklist ético para growth e monetização","Revisar flows de cobrança, trial, consentimento e notificações"],"res":[{"i":"📖","l":"Deceptive Patterns","t":"online","u":"https://www.deceptive.design/"}]},{"icon":"🔐","title":"Privacy UX e consentimento","desc":"Permissão clara, controle real e compreensão do uso de dados.","checks":["Projetar consentimento granular e revogável","Explicar coleta, uso, retenção e compartilhamento de dados em linguagem clara","Criar privacy settings encontráveis e compreensíveis","Projetar default privacy-safe sem esconder opções","Evitar coleta de dado sem valor explícito para o usuário"],"res":[{"i":"📖","l":"GDPR — Consent Guidance","t":"online","u":"https://gdpr.eu/gdpr-consent-requirements/"}]},{"icon":"🧯","title":"Risk, harm e safety reviews","desc":"Antecipar abuso, dano, erro irreversível e uso indevido.","checks":["Mapear possíveis danos para usuário, negócio e terceiros","Projetar friction intencional para ações de alto risco","Criar review humano para automações sensíveis","Considerar abuso, assédio, fraude const TABS={webdev:WD,lowlevel:LL,ai:AI,ux:UX};
let activeTab='webdev';
const state={webdev:{},lowlevel:{},ai:{},ux:{}};

function tp(el){el.closest('.phase').classList.toggle('open')}
function collapseAll(){
var tab=activeTab||'webdev';
var el=document.getElementById('tab-'+tab);
if(!el)return;
el.querySelectorAll('.phase.open').forEach(function(p){p.classList.remove('open');});
persistExpand();
}
function switchTab(t){activeTab=t;try{localStorage.setItem('rm_active_tab',t);}catch(e){}document.body.dataset.tab=t;document.documentElement.style.setProperty('--accent',{webdev:'210',lowlevel:'155',ai:'270',ux:'330'}[t]||'210');document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i==={webdev:0,lowlevel:1,ai:2,ux:3}[t]));document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+t));updateGlobal();}

function totalItems(t){const d=TABS[t];return d.phases.reduce((s,p)=>s+p.topics.reduce((ss,tp)=>ss+tp.checks.length,0)+(p.project?.dels?.length||0),0);}
function doneItems(t){return Object.values(state[t]).filter(Boolean).length;}
function phTotal(t,pid){const p=TABS[t].phases.find(x=>x.id===pid);return p.topics.reduce((s,tp)=>s+tp.checks.length,0)+(p.project?.dels?.length||0);}
function phDone(t,pid){let c=0;for(const k in state[t])if(state[t][k]&&k.startsWith(pid+'-'))c++;return c;}

function updateGlobal(){const t=totalItems(activeTab),d=doneItems(activeTab),pct=t?Math.round(d/t*100):0;const circ=69.12;document.getElementById('progRing').style.strokeDashoffset=circ-(circ*pct/100);document.getElementById('progPct').textContent=pct+'%';document.getElementById('progText').textContent=d+' / '+t+' itens';}
function updatePhase(tab,pid){const d=phDone(tab,pid),t=phTotal(tab,pid),pct=t?Math.round(d/t*100):0;const pf=document.getElementById(tab+'-pf-'+pid);if(pf)pf.style.width=pct+'%';const pp=document.getElementById(tab+'-ppct-'+pid);if(pp){pp.textContent=pct+'%';pp.classList.toggle('done',pct===100);}const pc=document.getElementById(tab+'-pcnt-'+pid);if(pc)pc.textContent=d+'/'+t;}

function toggle(tab,key,el){state[tab][key]=!state[tab][key];el.classList.toggle('done',state[tab][key]);const box=el.querySelector('.cb,.pi-box');if(box){const phase=el.closest('.phase');box.style.background=state[tab][key]?(phase?phase.dataset.color:'var(--c)'):'';};updatePhase(tab,key.split('-')[0]);updateGlobal();saveState(tab);}
function saveState(t){try{localStorage.setItem(TABS[t].storageKey,JSON.stringify(state[t]));}catch(e){}}
function loadState(t){try{const s=localStorage.getItem(TABS[t].storageKey);if(s)Object.assign(state[t],JSON.parse(s));}catch(e){}}

function phaseIsOpen(tab,phaseId,isFirst){
try{var s=localStorage.getItem('rm_exp_'+tab);if(s){var m=JSON.parse(s);return m.hasOwnProperty(phaseId)?!!m[phaseId]:false;}}catch(e){}
return isFirst;
}
function persistExpand(){
['webdev','lowlevel','ai','ux'].forEach(function(tab){
var el=document.getElementById('tab-'+tab);if(!el)return;
var m={};el.querySelectorAll('.phase').forEach(function(p){
var pid=p.id.replace(tab+'-','');
if(p.classList.contains('open'))m[pid]=1;else m[pid]=0;
});
try{localStorage.setItem('rm_exp_'+tab,JSON.stringify(m));}catch(e){}
});
}
function renderTab(tab,cid){
const D=TABS[tab];const root=document.getElementById(cid);loadState(tab);
let h='<div class="hero"><div class="hero-eyebrow">'+D.eyebrow+'</div><h1>'+D.h1+'<br><em>'+D.h1em+'</em></h1><p class="hero-desc">'+D.desc+'</p></div>';
h+='<div class="stats"><div class="stat-cell"><div class="stat-val">'+D.phases.length+'</div><div class="stat-lbl">Fases</div></div><div class="stat-cell"><div class="stat-val">'+D.totalMonths+'</div><div class="stat-lbl">Estimativa</div></div><div class="stat-cell"><div class="stat-val">'+D.dailyHours+'</div><div class="stat-lbl">Por dia</div></div><div class="stat-cell"><div class="stat-val">'+totalItems(tab)+'</div><div class="stat-lbl">Itens</div></div></div>';
h+='<div class="nav">'+D.phases.map((p,i)=>'<a href="#'+tab+'-'+p.id+'">'+(i<9?'0':'')+(i+1)+' · '+p.short+'</a>').join('')+'</div>';
D.phases.forEach((phase,pi)=>{
h+='<div class="phase'+(phaseIsOpen(tab,phase.id,pi===0)?' open':'')+'" id="'+tab+'-'+phase.id+'" data-color="'+phase.color+'">';
h+='<div class="ph-head" ><div class="ph-bar" style="background:'+phase.color+'"></div><div class="ph-inner"><div class="ph-badge" style="background:'+phase.numBg+';color:'+phase.color+';border:1px solid '+phase.numBd+'">'+phase.label+'</div><div class="ph-icon">'+phase.icon+'</div><div class="ph-meta"><div class="ph-title">'+phase.title+'</div><div class="ph-sub"><span>⏱ '+phase.dur+'</span><span>📍 '+phase.tag+'</span></div></div><div class="ph-right"><div class="ph-pct" id="'+tab+'-ppct-'+phase.id+'">0%</div><div class="ph-cnt" id="'+tab+'-pcnt-'+phase.id+'">0/0</div></div><div class="ph-toggle">▼</div></div></div>';
h+='<div class="ph-body"><div class="ph-desc" style="border-left-color:'+phase.color+'">'+phase.desc+'</div>';
h+='<div class="ph-prog"><div class="ph-prog-fill" id="'+tab+'-pf-'+phase.id+'" style="background:'+phase.color+'"></div></div>';
h+='<div class="tg">';
phase.topics.forEach((tp,ti)=>{
h+='<div class="tc" style="border-top:2px solid '+phase.color+'"><div class="tc-top"><div class="tc-ico">'+tp.icon+'</div><div><div class="tc-title">'+tp.title+'</div><div class="tc-desc">'+tp.desc+'</div></div></div><div class="cl"><div class="cl-label">checklist</div>';
tp.checks.forEach((c,ci)=>{const key=phase.id+'-'+ti+'-'+ci;const dn=state[tab][key]?' done':'';h+='<div class="ci'+dn+'" data-key="'+key+'" data-tab="'+tab+'" data-ck="'+key+'"><div class="cb"'+(dn?' style="background:'+phase.color+'"':'')+'>✓</div><span class="ct">'+c+'</span></div>';});
h+='</div>';
if(tp.res?.length){h+='<div class="tc-res">';tp.res.forEach(r=>{h+=r.u?'<a class="rc '+r.t+'" href="'+r.u+'" target="_blank" rel="noopener">'+r.i+' '+r.l+'</a>':'<span class="rc '+r.t+'">'+r.i+' '+r.l+'</span>';});h+='</div>';}
h+='</div>';});
h+='</div>';
if(phase.project){const pr=phase.project;h+='<div class="pb" style="border-top:2px solid '+phase.color+'"><div class="pb-head"><div class="pb-badge" style="color:'+phase.color+'">🏗️ PROJETO</div><div class="pb-title">'+pr.name+'</div></div><div class="pb-body"><div class="pb-desc">'+pr.desc+'</div>';
if(pr.goals?.length){h+='<div class="pb-goals">'+pr.goals.map(g=>'<div class="pb-goal"><span class="pb-goal-ico">'+g.i+'</span>'+g.t+'</div>').join('')+'</div>';}
h+='<div class="pb-cl-title">entregas</div>';
(pr.dels||[]).forEach((d,di)=>{const key=phase.id+'-proj-'+di;const dn=state[tab][key]?' done':'';h+='<div class="pi'+dn+'" data-key="'+key+'" data-tab="'+tab+'" data-ck="'+key+'"><div class="pi-box"'+(dn?' style="background:'+phase.color+'"':'')+'>✓</div><span class="pi-text">'+d+'</span></div>';});
if(pr.tips&&pr.tips.length){h+='<div class="pb-tips"><div class="pb-tips-title">🧭 Guia de Implementação</div>'+pr.tips.map(function(t){return '<div class="pb-tip-item">'+t+'</div>';}).join('')+'</div>';}
h+='</div></div>';}
if(phase.refs?.length){h+='<div class="ph-res"><div class="ph-res-lbl">📚 Referências</div><div class="ph-res-list">'+phase.refs.map(r=>'<div class="ph-res-item"><span>'+r.e+'</span>'+(r.u?'<a href="'+r.u+'" target="_blank" rel="noopener">'+r.l+'</a>':'<span>'+r.l+'</span>')+'</div>').join('')+'</div></div>';}
h+='</div></div>';});
if(D.tips){h+='<div class="tips"><div class="tips-ey">// dicas essenciais</div><div class="tips-h">Dicas que ninguém conta</div><div class="tips-g">'+D.tips.map(t=>'<div class="tip"><div class="tip-ico">'+t.icon+'</div><h4>'+t.title+'</h4><p>'+t.text+'</p></div>').join('')+'</div></div>';}
if(D.books){h+='<div class="books"><div class="books-ey">// biblioteca essencial</div><div class="books-h">Livros que não podem faltar</div><div class="books-g">'+D.books.map(b=>'<div class="bk"><div class="bk-spine" style="background:'+b.c+'"></div><div><div class="bk-title">'+b.t+'</div><div class="bk-author">'+b.a+'</div><span class="bk-tag" style="background:'+b.bg+';color:'+b.c+'">'+b.p+'</span></div></div>').join('')+'</div></div>';}
if(D.nextSteps){h+='<div class="next"><div class="next-ey">// e agora?</div><div class="next-h">Próximos Caminhos</div><div class="next-desc">'+D.nextSteps.desc+'</div><div class="next-g">';D.nextSteps.items.forEach(n=>{h+='<div class="next-card"><div class="next-card-ico">'+n.icon+'</div><h4>'+n.title+'</h4><p>'+n.desc+'</p><div class="next-card-tags">'+n.tags.map(t=>'<span class="next-tag">'+t+'</span>').join('')+'</div></div>';});h+='</div></div>';}
h+='<footer><p>// clique nos itens para marcar · '+D.phases.length+' fases · '+D.totalMonths+'</p></footer>';
root.innerHTML=h;D.phases.forEach(p=>updatePhase(tab,p.id));
}

renderTab('webdev','tab-webdev');
renderTab('lowlevel','tab-lowlevel');
renderTab('ai','tab-ai');
renderTab('ux','tab-ux');
var savedTab='webdev';try{savedTab=localStorage.getItem('rm_active_tab')||'webdev';}catch(e){}
switchTab(savedTab);
document.addEventListener('click',function(e){
  var ci=e.target.closest('[data-ck]');
  if(ci)toggle(ci.dataset.tab,ci.dataset.ck,ci);
  var ph=e.target.closest('.ph-head');
  if(ph){ph.parentElement.classList.toggle('open');persistExpand();}
});

</script>
</body>
</html>
