g> — CRUD, persistência type-safe, JWT auth, logging estruturado — e benchmark contra Express.js. O borrow checker automatiza o que você fazia manualmente em C.\n<div class=\"pb-tree\"><span class=\"dir\">rust-web/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">main.rs</span>\n│   ├── <span class=\"dir\">routes/</span>\n│   │   ├── <span class=\"f\">mod.rs</span>\n│   │   └── <span class=\"f\">tasks.rs</span>    <span class=\"cmt\"># CRUD /tasks</span>\n│   ├── <span class=\"dir\">middleware/</span>\n│   │   ├── <span class=\"f\">auth.rs</span>     <span class=\"cmt\"># JWT validation</span>\n│   │   └── <span class=\"f\">logging.rs</span>  <span class=\"cmt\"># tracing</span>\n│   ├── <span class=\"dir\">models/</span>\n│   │   └── <span class=\"f\">task.rs</span>\n│   ├── <span class=\"dir\">errors/</span>\n│   │   └── <span class=\"f\">mod.rs</span>      <span class=\"cmt\"># AppError → IntoResponse</span>\n│   └── <span class=\"f\">db.rs</span>           <span class=\"cmt\"># SQLx pool</span>\n├── <span class=\"dir\">migrations/</span>\n├── <span class=\"f\">Cargo.toml</span>\n├── <span class=\"f\">Dockerfile</span>          <span class=\"cmt\"># multi-stage < 15MB</span>\n├── <span class=\"f\">benchmark.md</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "🌐", "t": "API CRUD completa: GET/POST/PUT/DELETE /tasks com Axum + Tokio"}, {"i": "🗄️", "t": "SQLx + PostgreSQL com queries verificadas em compile time"}, {"i": "🔐", "t": "JWT auth middleware + logging estruturado com tracing crate"}, {"i": "🚦", "t": "Benchmark vs Express.js: req/s, latência p50/p99, memória RSS"}, {"i": "🐳", "t": "Dockerfile multi-stage com imagem final < 15MB (musl + scratch)"}], "dels": ["CRUD: GET /tasks, POST /tasks, GET /tasks/:id, PUT /tasks/:id, DELETE /tasks/:id", "SQLx com query_as! — queries type-safe em compile time, migrations versionadas", "JWT middleware: validar token, extrair claims, rejeitar requests sem auth", "tracing crate para logging estruturado (equivalente ao Pino.js)", "AppError enum implementando IntoResponse — sem panic em handlers", "Benchmark: Axum vs Express para 1/10/100 conexões com oha/wrk", "Dockerfile: build em rust:alpine, imagem final scratch < 15MB", "Testes de integração com axum::TestClient e SQLite :memory:"], "refs": [{"i": "📖", "l": "The Rust Book", "t": "online", "u": "https://doc.rust-lang.org/book/"}, {"i": "📖", "l": "Tokio Tutorial", "t": "online", "u": "https://tokio.rs/tokio/tutorial"}, {"i": "🌐", "l": "Axum", "t": "online", "u": "https://github.com/tokio-rs/axum"}, {"i": "🌐", "l": "SQLx", "t": "online", "u": "https://github.com/launchbadge/sqlx"}], "tips": ["<strong>Handler Axum — tipo seguro:</strong>\n<div class=\"pb-cmd\">async fn create_task(\n    State(pool): State<PgPool>,\n    Json(input): Json<CreateTask>,\n) -> Result<Json<Task>, AppError> {\n    let task = sqlx::query_as!(Task,\n        \"INSERT INTO tasks (title, done) VALUES ($1, false) RETURNING *\",\n        input.title\n    )\n    .fetch_one(&pool)\n    .await?;\n    Ok(Json(task))\n}</div>", "<strong>Error handling — AppError:</strong>\n<div class=\"pb-cmd\">enum AppError {\n    NotFound(String),\n    BadRequest(String),\n    Unauthorized,\n    Internal(anyhow::Error),\n}\nimpl IntoResponse for AppError {\n    fn into_response(self) -> Response {\n        let (status, msg) = match self {\n            Self::NotFound(m) => (StatusCode::NOT_FOUND, m),\n            Self::Unauthorized => (StatusCode::UNAUTHORIZED, \"unauthorized\".into()),\n            <span class=\"cmt\">// ...</span>\n        };\n        (status, Json(json!({ \"error\": msg }))).into_response()\n    }\n}</div>", "<strong>Benchmark vs Express:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> oha -n 10000 -c 100 http://localhost:3000/tasks\n<span class=\"cmt\"># Comparar ambos com mesma carga:</span>\n<span class=\"cmt\"># Axum:    ~45k req/s, p99=2ms, RSS=8MB</span>\n<span class=\"cmt\"># Express: ~8k req/s,  p99=15ms, RSS=80MB</span></div>", "<strong>Dockerfile multi-stage:</strong>\n<div class=\"pb-cmd\">FROM rust:1.75-alpine AS builder\nRUN apk add musl-dev\nWORKDIR /app\nCOPY . .\nRUN cargo build --release --target x86_64-unknown-linux-musl\n\nFROM scratch\nCOPY --from=builder /app/target/x86_64-unknown-linux-musl/release/rust-web /\nCMD [\"/rust-web\"]\n<span class=\"cmt\"># Imagem final: ~10-15MB</span></div>", "<strong>Critério de \"done\":</strong> <code>cargo test</code> passa, benchmark mostra Axum >4x mais rápido que Express, Docker image < 15MB, JWT auth funcional, zero panics em handlers."]}, "refs": [{"e": "📖", "l": "The Rust Book", "u": "https://doc.rust-lang.org/book/"}, {"e": "📖", "l": "Programming Rust", "u": "https://www.oreilly.com/library/view/programming-rust-2nd/9781492052586/"}, {"e": "📖", "l": "Tokio Tutorial", "u": "https://tokio.rs/tokio/tutorial"}, {"e": "📖", "l": "Rustonomicon", "u": "https://doc.rust-lang.org/nomicon/"}, {"e": "🌐", "l": "Rustlings", "u": "https://github.com/rust-lang/rustlings"}]}, {"id": "spec", "label": "FASE 10", "short": "Especialização", "icon": "🔬", "dur": "4–6 semanas", "tag": "topo da pirâmide", "color": "#ff4d6d", "numBg": "#1a0810", "numBd": "#2a0818", "title": "Especialização — Escolha seu Domínio", "desc": "Escolha <strong>um nicho</strong> e vá fundo. Cada trilha é 3–6 meses. Profundidade > amplitude.", "topics": [{"icon": "⚙️", "title": "Trilha A: Runtime JS", "desc": "Lexer → parser → AST → evaluator. Síntese perfeita.", "checks": ["Lexer com tokens JS", "Parser AST recursive descent", "Evaluator com closures", "GC mark-and-sweep"], "res": [{"i": "📖", "l": "Crafting Interpreters", "t": "book", "u": "https://craftinginterpreters.com/"}]}, {"icon": "💾", "title": "Trilha B: Database Engine", "desc": "B-Trees, buffer pool, WAL, MVCC, SQL parser.", "checks": ["B-Tree insert/search/delete", "Buffer pool LRU", "Write-ahead log", "SQL parser (SELECT, INSERT)"], "res": [{"i": "📖", "l": "Database Internals", "t": "book"}, {"i": " CMU 15-445.</p>\n<p><strong>C) Kernel Module:</strong> LKM + device driver + netfilter hook. Seguir xv6 MIT.</p>\n<p><strong>D) Game Engine:</strong> ECS + game loop fixed timestep + renderer 2D SDL2 + profiler.</p>\n<p><strong>E) eBPF:</strong> bpftrace + tracer syscalls + XDP filtering + dashboard observabilidade.</p>\n<p><strong>F) Compiladores:</strong> Frontend linguagem simples → LLVM IR → optimization pass.</p>\n</div>", "goals": [{"i": "🎯", "t": "Uma trilha completada com implementação funcional e testada"}, {"i": "📖", "t": "README detalhado: arquitetura, decisões de design, limitações, próximos passos"}, {"i": "📊", "t": "Benchmarks: comparar sua implementação com referência (ex: seu DB vs SQLite)"}, {"i": "📝", "t": "Blog post ≥ 1500 palavras explicando decisões e aprendizados"}, {"i": "🎤", "t": "Capaz de explicar qualquer parte do código em entrevista de 45min"}], "dels": ["Trilha A: lexer → parser → AST → evaluator com closures + GC mark-and-sweep funcional", "Trilha B: B-Tree insert/search/delete + buffer pool LRU + WAL + SQL parser (SELECT/INSERT)", "Trilha C: LKM + device driver char + netfilter hook + xv6 até Cap 6", "Trilha D: ECS com archetypes + game loop fixed timestep + renderer 2D SDL2 + profiler", "Trilha E: bpftrace + tracer syscalls libbpf + XDP filtering + dashboard", "Trilha F: frontend → LLVM IR via llc → 1 optimization pass", "Para todas: CI no GitHub, README completo, benchmarks, blog post publicado"], "refs": [{"i": "📖", "l": "Crafting Interpreters (gratuito)", "t": "online", "u": "https://craftinginterpreters.com/"}, {"i": "📖", "l": "Database Internals", "t": "book", "u": "https://www.databass.dev/"}, {"i": "🌐", "l": "xv6 MIT", "t": "online", "u": "https://pdos.csail.mit.edu/6.S081/"}, {"i": "🌐", "l": "LLVM Kaleidoscope", "t": "online", "u": "https://llvm.org/docs/tutorial/MyFirstLanguageFrontend/index.html"}, {"i": "🌐", "l": "CMU 15-445", "t": "online", "u": "https://15445.courses.cs.cmu.edu/"}], "tips": ["<strong>Trilha A — Crafting I  Debugar segfault no GDB ensina mais que 10 tutoriais."}, {"icon": "📏", "title": "Meça tudo", "text": "Low-level é performance. perf, Valgrind, RDTSC. Intuição sem dados é opinião. Dados com contexto são engenharia."}, {"icon": "🐢", "title": "Devagar para ir rápido", "text": "Uma semana entendendo cache lines vale mais que um mês correndo. Profundidade > velocidade."}, {"icon": "🤝", "title": "Comunidade certa", "text": "r/osdev, r/rust, HN, Discord Rustaceans. Low-level tem comunidade apaixonada."}], "books": [{"t": "The C Programming Language", "a": "K&R", "c": "#39ff8f", "bg": "#0a1a10", "p": "Fase 2"}, {"t": "CS:APP 3ª ed", "a": "Bryant & O'Hallaron", "c": "#3b9eff", "bg": "#081222", "p": "Fases 2-4"}, {"t": "TLPI", "a": "Michael Kerrisk", "c": "#ff6b35", "bg": "#1a0e08", "p": "Fase 6"}, {"t": "OSTEP (gratuito)", "a": "Arpaci-Dusseau", "c": "#ff6b35", "bg": "#1a0e08", "p": "Fase 6"}, {"t": "Effective Modern C++", "a": "Scott Meyers", "c": "#00d4ff", "bg": "#08181e", "p": "Fase 8"}, {"t": "Programming Rust", "a": "Blandy & Orendorff", "c": "#ffd93d", "bg": "#1a1408", "p": "Fase 9"}, {"t": "The Rust Book", "a": "Klabnik & Nichols", "c": "#ffd93d", "bg": "#1a1408", "p": "Fase 9"}, {"t": "Crafting Interpreters", "a": "Nystrom (gratuito)", "c": "#ff4d6d", "bg": "#1a0810", "p": "Fase 10A"}], "nextSteps": {"desc": "Você dominou os fundamentos de sistemas. Aqui estão caminhos para continuar aprofundando — cada um pode levar anos.", "items": [{"icon": "🖥️", "title": "Escrever um OS", "desc": "xv6 do MIT, OSDev Wiki, ou construir um kernel mínimo do zero.", "tags": ["xv6", "OSDev", "Kernel dev"]}, {"icon": "🧮", "title": "GPU Programming", "desc": "CUDA, OpenCL, compute shaders. Paralelismo massivo para ML e gráficos.", "tags": ["CUDA", "OpenCL", "Vulkan Compute"]}, {"icon": "🔐", "title": "Cryptography Deep Dive", "desc": "Implementar AES, RSA, ECC do zero. Entender ataques side-channel.", "tags": ["Crypto", "Side-channel", "TLS"]}, {"icon": "🌐", "title": "Sistemas Distribu const AI={"eyebrow":"roadmap completo · ai para desenvolvedores · edição definitiva","h1":"AI para","h1em":"Desenvolvedores","desc":"Guia estruturado para devs full stack que querem usar, integrar e construir produtos com inteligência artificial. Não é sobre virar pesquisador de ML — é sobre usar AI como ferramenta de produtividade e construir produtos inteligentes.","totalMonths":"~8 meses","dailyHours":"1–3h","storageKey":"rm_ai_v1","phases":[{"id":"fund","label":"FASE 01","short":"Fundamentos","icon":"🧠","dur":"1–2 semanas","tag":"como LLMs funcionam","color":"#a78bfa","numBg":"#160a22","numBd":"#241030","title":"Fundamentos & Landscape de Modelos","desc":"Antes de usar qualquer API, você precisa entender <strong>o que é um LLM, como funciona e quais existem</strong>. Não precisa de matemática — precisa de modelos mentais corretos para tomar decisões informadas.","topics":[{"icon":"🧠","title":"Como LLMs Funcionam (sem matemática)","desc":"Tokens, context window, temperature, top-p, transformer em alto nível.","checks":["Tokenização: como texto vira números (BPE), por que 'tokenizer' importa","Context window: o que são 200K tokens, como calcular, o que acontece quando estoura","Temperature e top-p: como controlam criatividade vs determinismo","O que é um transformer em 5 minutos: attention, layers, forward pass (conceitual)","Por que LLMs alucinam: probabilidade, não verdade — next token prediction","Diferença entre base model e instruction-tuned (chat) model"],"res":[{"i":"📖","l":"What Is ChatGPT Doing — Stephen Wolfram","t":"online","u":"https://writings.stephenwolfram.com/2023/02/what-is-chatgpt-doing-and-why-does-it-work/"},{"i":"🌐","l":"Tokenizer visualizer — OpenAI","t":"online","u":"https://platform.openai.com/tokenizer"},{"i":"📖","l":"3Blue1Brown — Transformers","t":"video","u":"https://www.youtube.com/watch?v=wjZofJX0v4M"}]},{"icon":"🗺️","title":"Mapa de Modelos & Quando Usar Qual","desc":"Claude, GPT, Gemini, Llama, Mistral — capacidades, preços e trade-offs.","checks":["Claude (Anthropic): Opus, Sonnet, Haiku — quando usar cada tier","GPT (OpenAI): GPT-4o, GPT-4o-mini, o3 — pontos fortes e fracos","Gemini (Google): context window enorme, multimodal nativo, integração Google","Llama/Mistral/Phi (open source): rodar local, sem custo de API, privacidade","Benchmarks: MMLU, HumanEval, LMSYS Chatbot Arena — como interpretar","Custos: preço por 1M tokens input/output por modelo, calcular custo de uma feature"],"res":[{"i":"🌐","l":"LMSYS Chatbot Arena — ranking de modelos","t":"online","u":"https://chat.lmsys.org/"},{"i":"📖","l":"Anthropic Model docs","t":"online","u":"https://docs.anthropic.com/en/docs/about-claude/models"},{"i":"📖","l":"OpenAI Models","t":"online","u":"https://platform.openai.com/docs/models"},{"i":"🌐","l":"Artificial Analysis — benchmark & pricing","t":"online","u":"https://artificialanalysis.ai/"}]}],"project":{"name":"model-playground — CLI que Compara Respostas de Modelos","desc":"CLI que envia o mesmo prompt para Claude, GPT e um modelo local (Ollama) e mostra respostas lado a lado com tempo e custo estimado.\n<div class=\"pb-tree\"><span class=\"dir\">model-playground/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">cli.ts</span>\n│   ├── <span class=\"f\">providers/</span>  <span class=\"cmt\"># anthropic.ts, openai.ts, ollama.ts</span>\n│   └── <span class=\"f\">compare.ts</span>  <span class=\"cmt\"># formata comparação lado a lado</span>\n├── <span class=\"f\">package.json</span>\n└── <span class=\"f\">README.md</span></div>","goals":[{"i":"🔧","t":"CLI funcional: playground 'explain closures' compara 3 modelos"},{"i":"⏱","t":"Mede tempo de resposta e tokens usados por modelo"},{"i":"💰","t":"Calcula custo estimado baseado em pricing de cada provider"},{"i":"📊","t":"Output formatado: resposta + tempo + tokens + custo lado a lado"}],"dels":["CLI com commander.js: playground 'prompt' --models claude,gpt,llama","Provider abstraction: cada modelo implementa mesma interface"," romptfoo — eval framework","t":"tool","u":"https://www.promptfoo.dev/"},{"i":"📖","l":"Braintrust — prompt eval","t":"online","u":"https://www.braintrust.dev/"}]}],"project":{"name":"prompt-library — Repositório de Prompts com Eval Automatizado","desc":"Repositório de prompts versionados com <strong>Promptfoo para eval automatizado</strong> — cada prompt tem testes que validam qualidade.\n<div class=\"pb-tree\"><span class=\"dir\">prompt-library/</span>\n├── <span class=\"dir\">prompts/</span>\n│   ├── <span class=\"f\">code-review.md</span>\n│   ├── <span class=\"f\">refactor.md</span>\n│   ├── <span class=\"f\">test-gen.md</span>\n│   ├── <span class=\"f\">explain.md</span>\n│   └── <span class=\"f\">translate.md</span>\n├── <span class=\"dir\">evals/</span>\n│   └── <span class=\"f\">promptfooconfig.yaml</span>\n├── <span class=\"f\">package.json</span>\n└── <span class=\"f\">README.md</span></div>","goals":[{"i":"📝","t":"10+ prompts versionados cobrindo tarefas comuns de dev"},{"i":"🧪","t":"Eval automatizado com Promptfoo: cada prompt tem 5+ assertions"},{"i":"📊","t":"Score dashboard mostrando qualidade de cada prompt por modelo"}],"dels":["10+ prompts .md com system prompt + user template","Promptfoo config: cada prompt testado com 5+ cases e assertions","CI: rodar eval em push, bloquear merge se score cair","README: catálogo com descrição, uso e score de cada prompt"],"tips":["<strong>Promptfoo config:</strong>\n<div class=\"pb-cmd\">prompts:\n  - file://prompts/code-review.md\nproviders:\n  - anthropic:messages:claude-sonnet-4-20250514\ntests:\n  - vars: { code: \"function add(a,b){return a+b}\" }\n    assert:\n      - type: contains\n        value: \"no issues found\"\n      - type: llm-rubric\n        value: \"response is structured with sections\"</div>","<strong>Critério de \"done\":</strong> 10 prompts com eval passing, score > 80% em todos, CI configurado."],"refs":[{"i":"🔧","l":"Promptfoo","t":"tool","u":"https://www.promptfoo.dev/"},{"i":"📖","l":"Anthropic Prompt Engineering","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering"}]},"refs":[{"e":"📖","l":"Anthropic Prompt Engineering","u":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering"},{"e":"🌐","l":"Prompt Engineering Guide","u":"https://www.promptingguide.ai/"},{"e":"🔧","l":"Promptfoo","u":"https://www.promptfoo.dev/"},{"e":"📖","l":"Learn Prompting","u":"https://learnprompting.org/"}]},{"id":"api","label":"FASE 03","short":"APIs & Streaming","icon":"⚡","dur":"2–3 semanas","tag":"conectar com código","color":"#38bdf8","numBg":"#081a28","numBd":"#10304a","title":"APIs de LLMs, Streaming & Conversational Design","desc":"Conectar LLMs ao seu código: APIs, streaming em tempo real, gerenciamento de conversas e custos.","topics":[{"icon":"⚡","title":"APIs & SDKs de LLMs","desc":"Anthropic Messages API, OpenAI Chat Completions, Vercel AI SDK.","checks":["Anthropic Messages API: system, messages, max_tokens, model selection","OpenAI Chat Completions: messages array, response format, function calling","Vercel AI SDK: useChat hook, streamText, generateObject para React/Next.js","Error handling: rate limits (429), context too long (400), timeouts","Retries com exponential backoff + jitter","Multi-turn: manter histórico de mensagens entre requests"],"res":[{"i":"📖","l":"Anthropic API docs","t":"online","u":"https://docs.anthropic.com/en/api"},{"i":"📖","l":"OpenAI API docs","t":"online","u":"https://platform.openai.com/docs/api-reference"},{"i":"📖","l":"Vercel AI SDK","t":"online","u":"https://sdk.vercel.ai/docs"}]},{"icon":"🌊","title":"Streaming & UX de Respostas","desc":"SSE, streaming no terminal e no browser, token-by-token rendering.","checks":["Server-Sent Events (SSE): como streaming funciona sob o capô","Streaming no terminal: process.stdout.write token por token","Streaming no React: useChat do Vercel AI SDK, loading states","Streaming em Server Actions do Next.js","Cancelamento de stream: AbortController","Backpressure: quando o frontend não consegue renderizar tão rápido"],"res":[{"i":"📖","l":"Vercel AI SDK — streaming","t":"online","u":"https://sdk.vercel.ai/docs/ai-sdk-core/streaming"},{"i":"📖","l":"Anthropic streaming","t":"online","u":"https://docs.anthropic.com/en/api/messages-streaming"}]},{"icon":"💬","title":"Conversational Design & Memory","desc":"Gerenciar contexto em conversas longas, sliding window, summarization.","checks":["Context window management: quando o histórico excede o limite do modelo","Sliding window: manter últimas N mensagens + system prompt","Summarization: resumir histórico antigo e incluir como contexto","System prompt dinâmico: mudar baseado no estado da conversa/usuário","Conversation branching: permitir 'voltar' a um ponto da conversa","Token counting: estimar tokens antes de enviar para evitar erros"],"res":[{"i":"📖","l":"Anthropic — Long conversations","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-caching"}]},{"icon":"💰","title":"Custos, Caching & Batching","desc":"Calcular custos, cache de respostas, prompt caching, batch API.","checks":["Calcular custo por feature: tokens × preço por modelo","Prompt caching (Anthropic): reusar system prompt entre requests com desconto","Response caching: hash do input → cache local/Redis para respostas idênticas","Batch API: processar muitos requests em paralelo com desconto","Monitorar custos: dashboards de uso por feature/endpoint/usuário"],"res":[{"i":"📖","l":"Anthropic Prompt Caching","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-caching"},{"i":"📖","l":"OpenAI Batch API","t":"online","u":"https://platform.openai.com/docs/guides/batch"}]}],"project":{"name":"ai-chat — Chat Interface com Streaming em Next.js","desc":"Chat interface completa com Next.js + Vercel AI SDK: streaming, multi-turn, troca de modelo, estimativa de custo.\n<div class=\"pb-tree\"><span class=\"dir\">ai-chat/</span>\n├── <span class=\"dir\">app/</span>\n│   ├── <span class=\"f\">page.tsx</span>         <span class=\"cmt\"># chat UI</span>\n│   ├── <span class=\"f\">api/chat/route.ts</span> <span class=\"cmt\"># streaming endpoint</span>\n│   └── <span class=\"f\">layout.tsx</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">providers.ts</span>    <span class=\"cmt\"># Claude + GPT</span>\n│   ├── <span class=\"f\">memory.ts</span>       <span class=\"cmt\"># sliding window + summarization</span>\n│   └── <span class=\"f\">cost.ts</span>         <span class=\"cmt\"># token counting + pricing</span>\n└── <span class=\"f\">package.json</span></div>","goals":[{"i":"💬","t":"Chat funcional com streaming token-by-token no browser"},{"i":"🔀","t":"Trocar entre Claude e GPT no meio da conversa"},{"i":"💰","t":"Mostrar tokens usados e custo estimado por mensagem"},{"i":"📜","t":"Memory: sliding window + summarization para conversas longas"}],"dels":["Chat UI com streaming usando Vercel AI SDK useChat","Troca de modelo mid-conversation (Claude ↔ GPT)","Token counter + custo estimado visível por mensagem","Sliding window memory: resumir histórico quando > 50% do context window","Responsivo, dark mode, Markdown rendering nas respostas"],"tips":["<strong>Vercel AI SDK — streaming:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// app/api/chat/route.ts</span>\nimport { anthropic } from '@ai-sdk/anthropic';\nimport { streamText } from 'ai';\n\nexport async function POST(req: Request) {\n  const { messages } = await req.json();\n  const result = streamText({\n    model: anthropic('claude-sonnet-4-20250514'),\n    messages,\n  });\n  return result.toDataStreamResponse();\n}</div>","<strong>Critério de \"done\":</strong> chat funciona com streaming, memória não estoura context window, custo mostrado em tempo real."],"refs":[{"i":"📖","l":"Vercel AI SDK","t":"online","u":"https://sdk.vercel.ai/docs"},{"i":"📖","l":"Anthropic API","t":"online","u":"https://docs.anthropic.com/en/api"}]},"refs":[{"e":"📖","l":"Anthropic API","u":"https://docs.anthropic.com/en/api"},{"e":"📖","l":"OpenAI API","u":"https://platform.openai.com/docs/api-reference"},{"e":"📖","l":"Vercel AI SDK","u":"https://sdk.vercel.ai/docs"}]},{"id":"tools","label":"FASE 04","short":"Tool Use & MCP","icon":"🔧","dur":"2–3 semanas","tag":"LLMs que agem","color":"#f97316","numBg":"#1a0e08","numBd":"#2a1808","title":"Function Calling, Tool Use & MCP","desc":"O LLM deixa de só responder texto e passa a <strong>executar ações</strong>: chamar APIs, consultar banco, executar código. É o que faz Windsurf e Claude Code funcionarem.","topics":[{"icon":"🔧","title":"Function Calling & Tool Use","desc":"Tool definitions, parsing de chamadas, tool results, loops de agente.","checks":["Tool definitions: descrever funções com JSON Schema para o LLM chamar","Parsing: LLM retorna tool_use block → seu código executa → retorna resultado","Loop: LLM decide se precisa de mais tools ou se já pode responder","Parallel tool use: LLM chama múltiplas ferramentas em paralelo","Error handling: tool falha → LLM tenta alternativa ou reporta erro","Validação: sempre validar parâmetros que o LLM envia (não confiar cegamente)"],"res":[{"i":"📖","l":"Anthropic Tool Use","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use"},{"i":"📖","l":"OpenAI Function Calling","t":"online","u":"https://platform.openai.com/docs/guides/function-calling"}]},{"icon":"🔌","title":"MCP — Model Context Protocol","desc":"Como Windsurf/Claude Code se conectam a ferramentas externas. Construir seu próprio MCP server.","checks":["O que é MCP: protocolo padrão para LLMs se conectarem a ferramentas/dados","MCP server: expor ferramentas via JSON-RPC para qualquer client MCP","MCP com Claude Desktop: conectar seu server para Claude usar suas ferramentas","MCP com Windsurf/Cursor: como IDEs usam MCP para acessar seu código","Construir MCP server: TypeScript SDK, definir tools, handle requests","MCP para databases: permitir que LLM consulte seu banco via MCP"],"r ","u":"https://www.pinecone.io/learn/"}]},{"icon":"📄","title":"RAG Pipeline Completo","desc":"Upload → chunk → embed → store → query → contexto → LLM → resposta.","checks":["Chunking: dividir documentos em pedaços de ~500-1000 tokens com overlap","Estratégias de chunking: por parágrafo, por heading, recursive character splitter","Embedding dos chunks e armazenamento no vector DB","Query: embedar a pergunta do usuário e buscar chunks mais similares","Contexto: injetar top-K chunks no prompt como contexto para o LLM responder","Reranking: após busca inicial, reordenar por relevância com modelo dedicado","Avaliação: relevance (chunks certos?), faithfulness (resposta fiel ao contexto?)"],"res":[{"i":"📖","l":"RAG Guide — Anthropic","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/retrieval-augmented-generation"},{"i":"📖","l":"LangChain RAG","t":"online","u":"https://js.langchain.com/docs/tutorials/rag"}]},{"icon":"🏗️","title":"AI Search & Recommendations","desc":"Busca semântica em produtos, recomendações, classificação.","checks":["Busca semântica em e-commerce: buscar produto por descrição em linguagem natural","Recomendações: 'itens similares' via proximidade de embeddings","Classificação: categorizar texto automaticamente (tickets, reviews, emails)","Clustering: agrupar documentos similares sem labels prévios","Busca semântica no seu produto existente: adicionar pgvector ao PostgreSQL"],"res":[{"i":"🌐","l":"pgvector tutorial","t":"online","u":"https://github.com/pgvector/pgvector"},{"i":"📖","l":"Embeddings use cases — OpenAI","t":"online","u":"https://platform.openai.com/docs/guides/embeddings/use-cases"}]},{"icon":"📊","title":"Extração Estruturada de Dados","desc":"Extrair dados de texto livre: faturas→JSON, emails→action items, PDFs→tabelas.","checks":["Extração de entidades: parsear fatura/email → JSON estruturado","PDF parsing + AI: extrair tabelas e dados de documentos escaneados","Schema-driven extraction: definir Zod schema → forçar outpu  streaming + lista de sources (documento + página)","Avaliação: testar com 10 perguntas, medir relevance e faithfulness"],"tips":["<strong>pgvector setup:</strong>\n<div class=\"pb-cmd\">CREATE EXTENSION vector;\nCREATE TABLE chunks (\n  id SERIAL PRIMARY KEY,\n  content TEXT,\n  embedding vector(1536),\n  metadata JSONB\n);\nCREATE INDEX ON chunks USING hnsw (embedding vector_cosine_ops);</div>","<strong>Critério de \"done\":</strong> upload 3 PDFs, fazer 10 perguntas, todas retornam resposta relevante com sources corretos."],"refs":[{"i":"📖","l":"RAG Guide — Anthropic","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/retrieval-augmented-generation"},{"i":"🌐","l":"pgvector","t":"online","u":"https://github.com/pgvector/pgvector"},{"i":"📖","l":"LangChain.js","t":"online","u":"https://js.langchain.com/"}]},"refs":[{"e":"📖","l":"RAG Guide — Anthropic","u":"https://docs.anthropic.com/en/docs/build-with-claude/retrieval-augmented-generation"},{"e":"🌐","l":"pgvector","u":"https://github.com/pgvector/pgvector"},{"e":"📖","l":"Pinecone Learning","u":"https://www.pinecone.io/learn/"},{"e":"🌐","l":"Instructor","u":"https://github.com/jxnl/instructor"}]},{"id":"agents","label":"FASE 06","short":"AI Agents","icon":"🤖","dur":"3–4 semanas","tag":"AI que planeja e age","color":"#ec4899","numBg":"#1a081a","numBd":"#2a1028","title":"AI Agents & Orquestração Multi-Agente","desc":"Agentes que <strong>planejam e executam múltiplos passos</strong>: pesquisar, analisar, sintetizar e entregar resultado. É o futuro de AI em produtos.","topics":[{"icon":"🤖","title":"Agent Patterns & Frameworks","desc":"ReAct, planning→execution→observation, frameworks modernos.","checks":["ReAct pattern: Reasoning + Acting — pensar → agir → observar → repetir","Planning: LLM cria plano de passos antes de executar","Memory: short-term (contexto da conversa) e long-term (banco de dados)","Frameworks: LangGraph, CrewAI, Vercel AI SDK agents, Mastra","Human-in-the-loop: pausar agente para ns/"}]},{"icon":"🗄️","title":"AI para Dados Existentes","desc":"Text-to-SQL, análise de logs com AI, summarização de dashboards.","checks":["Text-to-SQL: pergunta em linguagem natural → LLM gera query SQL → executa → responde","Guardrails para SQL: validar query gerada, readonly, timeout, whitelist de tabelas","Análise de logs: enviar logs de erro para AI → categorizar, sugerir fix","Summarização de dashboards: AI resume métricas do dia em parágrafo executivo","Chat sobre seus dados: interface onde stakeholders perguntam em português sobre métricas"],"res":[{"i":"📖","l":"Vanna.ai — text-to-SQL","t":"online","u":"https://vanna.ai/"},{"i":"📖","l":"Anthropic — Data analysis","t":"online","u":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use"}]}],"project":{"name":"ai-saas — App Completa com AI em Produção","desc":"Pegar um projeto anterior (doc-search ou research-agent) e transformar em <strong>produto real</strong>: auth, billing, eval, rate limiting, feedback loop.\n<div class=\"pb-tree\"><span class=\"dir\">ai-saas/</span>\n├── <span class=\"dir\">app/</span>               <span class=\"cmt\"># Next.js app</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">auth.ts</span>         <span class=\"cmt\"># Clerk/Auth.js</span>\n│   ├── <span class=\"f\">billing.ts</span>      <span class=\"cmt\"># Stripe usage-based</span>\n│   ├── <span class=\"f\">rate-limit.ts</span>   <span class=\"cmt\"># por tier de plano</span>\n│   ├── <span class=\"f\">eval.ts</span>         <span class=\"cmt\"># Langfuse integration</span>\n│   ├── <span class=\"f\">feedback.ts</span>     <span class=\"cmt\"># 👍👎 collection</span>\n│   └── <span class=\"f\">fallback.ts</span>     <span class=\"cmt\"># Claude → GPT → error</span>\n├── <span class=\"f\">docker-compose.yml</span>\n└── <span class=\"f\">package.json</span></div>","goals":[{"i":"🔐","t":"Auth + billing: plano free (10 queries/dia) e paid (ilimitado)"},{"i":"📊","t":"Langfuse: traces de cada chamada LLM
