<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — Full Stack, Low-Level, AI & UI/UX</title>
<link rel="icon" type="image/x-icon" href="icon.ico">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800;900&family=Epilogue:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--bg2:#0a0d17;--surface:#0e1222;--surface2:#131830;--surface3:#1a2038;--border:#1c2340;--border2:#252c52;--text:#d4daf0;--text2:#8690b8;--text3:#4e567a;--white:#ecf0ff;--accent:210;--c:hsl(var(--accent),80%,60%);--c-dim:hsl(var(--accent),50%,38%);--c-glow:hsla(var(--accent),90%,55%,.07);--c-surface:hsla(var(--accent),75%,50%,.06);--c-border:hsla(var(--accent),60%,50%,.18);--radius:10px}
[data-tab=lowlevel]{--accent:155}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;min-height:100vh;overflow-x:hidden;transition:--accent .4s}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(hsla(var(--accent),50%,50%,.015) 1px,transparent 1px),linear-gradient(90deg,hsla(var(--accent),50%,50%,.015) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}

/* ── TAB BAR ── */

.collapse-btn{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.5px;padding:5px 12px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:10px;margin-right:10px}
.collapse-btn:hover{color:var(--white);border-color:var(--c-border);background:var(--c-surface)}
.tab-bar{position:sticky;top:0;z-index:200;background:rgba(6,8,16,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0;height:48px}
.tab-btn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--text3);background:none;border:none;cursor:pointer;padding:14px 20px;position:relative;transition:color .25s;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--white)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--c);border-radius:2px;box-shadow:0 0 10px var(--c)}
.tab-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tab-spacer{flex:1}
.tab-progress{display:flex;align-items:center;gap:10px}
.tab-prog-ring{width:28px;height:28px;position:relative}
.tab-prog-ring svg{transform:rotate(-90deg)}
.tab-prog-ring circle{fill:none;stroke-width:3}
.tab-prog-ring .bg{stroke:var(--surface3)}
.tab-prog-ring .fg{stroke:var(--c);stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.tab-prog-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--c)}
.tab-prog-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}

/* ── LAYOUT ── */
.wrap{max-width:1060px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.tab-content{display:none}.tab-content.active{display:block}

/* ── HEADER ── */
.hero{padding:56px 0 40px}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:3.5px;text-transform:uppercase;color:var(--c);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:24px;height:1px;background:var(--c);box-shadow:0 0 8px var(--c)}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(34px,6vw,62px);font-weight:900;line-height:.93;letter-spacing:-2px;color:var(--white);margin-bottom:16px}
.hero h1 em{font-style:normal;color:var(--c);text-shadow:0 0 30px hsla(var(--accent),90%,55%,.3)}
.hero-desc{font-size:14px;color:var(--text2);max-width:580px;line-height:1.8;margin-bottom:22px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:0 0 36px}
.stat-cell{background:var(--surface);padding:18px 16px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--white);margin-bottom:2px}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}

/* ── NAV ── */
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:36px}
.nav a{font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);color:var(--text3);text-decoration:none;transition:all .2s;white-space:nowrap}
.nav a:hover{color:var(--white);border-color:var(--c-border);background:var(--c-surface)}

/* ── PHASE ── */
.phase{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .3s,box-shadow .3s;animation:su .45s ease both}
.phase:hover{border-color:var(--border2)}
.phase.open{border-color:var(--c-border);box-shadow:0 0 40px var(--c-glow)}
.ph-head{display:flex;align-items:stretch;cursor:pointer;user-select:none;background:var(--surface);transition:background .2s}
.phase.open .ph-head{background:var(--surface2)}
.ph-bar{width:4px;flex-shrink:0}
.ph-inner{flex:1;display:flex;align-items:center;gap:14px;padding:16px 20px}
.ph-badge{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:4px;flex-shrink:0}
.ph-icon{font-size:20px;flex-shrink:0}
.ph-meta{flex:1;min-width:0}
.ph-title{font-family:'Syne',sans-serif;font-size:15.5px;font-weight:700;color:var(--white);margin-bottom:3px;letter-spacing:-.2px}
.ph-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap}
.ph-right{text-align:right;flex-shrink:0;min-width:44px}
.ph-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--white);transition:color .3s}
.ph-pct.done{color:var(--c)}
.ph-cnt{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3)}
.ph-toggle{font-size:12px;color:var(--text3);transition:transform .3s;flex-shrink:0;margin-left:4px}
.phase.open .ph-toggle{transform:rotate(180deg)}

/* ── PHASE BODY ── */
.ph-body{display:none;background:var(--bg2);padding:24px 20px 28px;border-top:1px solid var(--border)}
.phase.open .ph-body{display:block;animation:fi .25s ease}
.ph-desc{background:var(--surface);border-radius:6px;padding:14px 18px;margin-bottom:20px;font-size:12.5px;color:var(--text2);line-height:1.75;border-left:3px solid}
.ph-desc strong{color:var(--text);font-style:normal}
.ph-desc code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface3);padding:1px 5px;border-radius:3px;color:var(--white)}
.ph-prog{height:2px;background:var(--surface3);margin-bottom:20px;border-radius:2px;overflow:hidden}
.ph-prog-fill{height:100%;border-radius:2px;transition:width .4s ease;width:0}

/* ── TOPICS GRID ── */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-bottom:20px}

/* ── TOPIC CARD ── */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s,transform .15s}
.tc:hover{transform:translateY(-1px);border-color:var(--border2)}
.tc-top{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;gap:9px}
.tc-ico{font-size:16px;flex-shrink:0;margin-top:2px}
.tc-title{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;color:var(--white);margin-bottom:2px;line-height:1.3}
.tc-desc{font-size:11px;color:var(--text2);line-height:1.55}
.cl{padding:10px 14px;border-bottom:1px solid var(--border)}
.cl-label{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:7px}
.ci{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;cursor:pointer;padding:2px 0;transition:opacity .15s}
.ci:hover{opacity:.78}
.ci:last-child{margin-bottom:0}
.cb{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1.5px;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:7.5px;color:transparent;font-weight:900}
.ci.done .cb{border-color:transparent;color:var(--bg)}
.ci.done .ct{text-decoration:line-through;opacity:.3}
.ct{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text2);line-height:1.5}
.tc-res{padding:8px 14px;display:flex;gap:4px;flex-wrap:wrap}
.rc{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:2.5px 7px;border-radius:3px;display:inline-flex;align-items:center;gap:3px;font-weight:500;text-decoration:none;transition:opacity .2s;letter-spacing:.2px}
.rc:hover{opacity:.7}
.rc.book{background:#1a1208;color:#ffaa44;border:1px solid #2a1e0a}
.rc.online{background:#081a10;color:#44cc77;border:1px solid #0a2a16}
.rc.tool{background:#08101a;color:#44aaff;border:1px solid #0a1a2a}
.rc.video{background:#180818;color:#cc66ff;border:1px solid #280a28}
.rc.course{background:#1a0818;color:#ff66aa;border:1px solid #2a0a20}

/* ── PROJECT BOX ── */
.pb{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-top:6px}
.pb-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.pb-badge{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:var(--surface3);border:1px solid var(--border2)}
.pb-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white)}
.pb-body{padding:16px 18px}
.pb-desc{font-size:12.5px;color:var(--text2);line-height:1.75;margin-bottom:14px}
.pb-goals{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-bottom:14px}
.pb-goal{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text2);line-height:1.45;display:flex;gap:7px}
.pb-goal-ico{flex-shrink:0;font-size:12px}

.pb-cmd{background:#0c1218;border:1px solid #1a2535;border-radius:6px;padding:10px 14px;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#88c0d0;line-height:1.65;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
.pb-cmd .cmt{color:#4e5a6e}.pb-cmd .pr{color:#a3be8c}
.pb-tree{background:#0c1218;border:1px solid #1a2535;border-radius:6px;padding:12px 16px;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#81a1c1;line-height:1.6;overflow-x:auto;white-space:pre}
.pb-tree .dir{color:#ebcb8b}.pb-tree .f{color:#88c0d0}
.pb-spec{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin:8px 0}
.pb-spec-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:6px}
.pb-spec p{font-size:12px;color:var(--text2);line-height:1.75;margin-bottom:6px}
.pb-spec ul{list-style:none;padding:0}.pb-spec li{font-size:11.5px;color:var(--text2);line-height:1.7;padding:2px 0 2px 18px;position:relative}
.pb-spec li::before{content:'☐';position:absolute;left:0;color:var(--text3);font-size:12px}
.pb-done{background:hsla(var(--accent),50%,50%,.04);border:1px dashed var(--c-border);border-radius:8px;padding:14px 16px;margin:10px 0}
.pb-done-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:2px;color:var(--c);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pb-done li{font-size:11.5px;color:var(--text2);line-height:1.7;margin-bottom:4px;padding-left:20px;position:relative;list-style:none}
.pb-done li::before{content:'✓';position:absolute;left:0;color:var(--c);font-weight:700;font-size:11px}
.pb-tips{margin-top:14px;padding:14px 16px;border-radius:8px;background:rgba(255,255,255,.018);border:1px dashed var(--border2)}
.pb-tips-title{font-family:'JetBrains Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:2px;color:var(--c);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pb-tip-item{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:8px;padding-left:18px;position:relative}
.pb-tip-item::before{content:'→';position:absolute;left:0;color:var(--c);font-weight:700;font-size:11px}
.pb-tip-item:last-child{margin-bottom:0}
.pb-tip-item strong{color:var(--text);font-weight:600}
.pb-tip-item code{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:var(--surface3);padding:1px 5px;border-radius:3px;color:var(--white)}
.pb-tip-item .pb-cmd,.pb-tip-item .pb-tree{margin:6px 0}

.pb-cl-title{font-family:'JetBrains Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.pi{display:flex;align-items:flex-start;gap:9px;margin-bottom:6px;cursor:pointer}
.pi-box{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;font-weight:900}
.pi.done .pi-box{border-color:transparent;color:var(--bg)}
.pi.done .pi-text{opacity:.3;text-decoration:line-through}
.pi-text{font-size:12px;color:var(--text);line-height:1.5}

/* ── PHASE RESOURCES ── */
.ph-res{margin-top:14px;padding:14px 16px;border-radius:8px;background:rgba(255,255,255,.012);border:1px solid var(--border)}
.ph-res-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.ph-res-list{display:flex;flex-direction:column;gap:4px}
.ph-res-item{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.ph-res-item a{color:hsl(calc(var(--accent)+15),50%,62%);text-decoration:none;border-bottom:1px solid hsla(var(--accent),40%,50%,.18);transition:all .2s}
.ph-res-item a:hover{color:hsl(calc(var(--accent)+15),55%,72%);border-color:hsla(var(--accent),40%,50%,.45)}

/* ── TIPS ── */
.tips{margin:48px 0;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.tips-ey{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.tips-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);margin-bottom:24px;letter-spacing:-.3px}
.tips-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.tip{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.tip-ico{font-size:20px;margin-bottom:8px}
.tip h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:5px}
.tip p{font-size:11px;color:var(--text2);line-height:1.7}

/* ── NEXT STEPS ── */
.next{margin:0 0 48px;padding:32px;background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border2);border-radius:var(--radius);position:relative;overflow:hidden}
.next::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,hsla(var(--accent),80%,50%,.06),transparent 70%);pointer-events:none}
.next-ey{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.next-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);margin-bottom:8px;letter-spacing:-.3px}
.next-desc{font-size:12.5px;color:var(--text2);line-height:1.7;margin-bottom:20px;max-width:600px}
.next-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.next-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .2s,transform .15s}
.next-card:hover{border-color:var(--c-border);transform:translateY(-1px)}
.next-card-ico{font-size:22px;margin-bottom:8px}
.next-card h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px}
.next-card p{font-size:10.5px;color:var(--text2);line-height:1.65;margin-bottom:8px}
.next-card-tags{display:flex;gap:4px;flex-wrap:wrap}
.next-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;background:var(--c-surface);border:1px solid var(--c-border);color:var(--c)}

/* ── BOOKS ── */
.books{margin-bottom:48px}
.books-ey{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.books-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);letter-spacing:-.3px;margin-bottom:18px}
.books-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px}
.bk{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;gap:10px;transition:border-color .2s}
.bk:hover{border-color:var(--border2)}
.bk-spine{width:6px;height:50px;border-radius:2px;flex-shrink:0}
.bk-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px;line-height:1.25}
.bk-author{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:5px}
.bk-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;display:inline-block}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:32px 0;text-align:center}
footer p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}

/* ── ANIMS ── */
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.phase:nth-child(1){animation-delay:.03s}.phase:nth-child(2){animation-delay:.06s}.phase:nth-child(3){animation-delay:.09s}.phase:nth-child(4){animation-delay:.12s}.phase:nth-child(5){animation-delay:.15s}.phase:nth-child(6){animation-delay:.18s}.phase:nth-child(7){animation-delay:.21s}.phase:nth-child(8){animation-delay:.24s}.phase:nth-child(9){animation-delay:.27s}.phase:nth-child(10){animation-delay:.30s}.phase:nth-child(11){animation-delay:.33s}.phase:nth-child(12){animation-delay:.36s}.phase:nth-child(13){animation-delay:.39s}.phase:nth-child(14){animation-delay:.42s}.phase:nth-child(15){animation-delay:.45s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#1a2040;border-radius:99px}
@media(max-width:640px){.tg{grid-template-columns:1fr}.pb-goals{grid-template-columns:1fr}.ph-inner{padding:12px 14px;gap:10px}.ph-badge{display:none}h1{font-size:34px!important}.stats{grid-template-columns:repeat(3,1fr)}.tab-bar{overflow-x:auto;padding:0 12px;scrollbar-width:none}.tab-bar::-webkit-scrollbar{display:none}.tab-spacer,.collapse-btn,.tab-progress{display:none}.tab-btn{padding:12px 14px;font-size:12px;flex:0 0 auto}.tips-g,.next-g{grid-template-columns:1fr}.books-g{grid-template-columns:1fr 1fr}}
</style>
</head>
<body data-tab="webdev">

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('webdev')">⚡ Full Stack WebDev</button>
  <div class="tab-sep"></div>
  <button class="tab-btn" onclick="switchTab('lowlevel')">🔧 Low-Level</button>
  <div class="tab-sep"></div>
  <button class="tab-btn" onclick="switchTab('ai')">🤖 AI para Devs</button>
  <div class="tab-sep"></div>

rtions"], "res": [{"i": "🎓", "l": "Total TypeScript", "t": "course", "u": "https://www.totaltypescript.com/"}, {"i": "📦", "l": "ts-reset", "t": "tool", "u": "https://github.com/total-typescript/ts-reset"}]}, {"icon": "⚙️", "title": "Qualidade & Tooling", "desc": "Strict mode, type guards, linting e formatação automatizada.", "checks": ["tsconfig strict mode — todas flags", "Type guards customizados (is, asserts)", "ESLint + typescript-eslint rígido", "Biome como alternativa rápida", "Declaration merging e module augmentation"], "res": [{"i": "⚡", "l": "Biome", "t": "tool", "u": "https://biomejs.dev/"}]}, {"icon": "📦", "title": "Monorepo & Build", "desc": "Turborepo, pnpm workspaces, changesets e compilação de libs.", "checks": ["Turborepo: build caching e pipelines", "pnpm workspaces para pacotes internos", "Changesets para versionamento semântico", "tsup / unbuild para compilar libs", "Package exports field e dual ESM/CJS"], "res": [{"i": "🔧", "l": "Turborepo", "t": "tool", "u": "https://turbo.build/"}]}], "project": {"name": "ts-toolkit — Biblioteca Utilitária Tipada no npm", "desc": "Você vai criar, testar e <strong>publicar no npm</strong> uma biblioteca TypeScript de utilitários genéricos — 100% tipada, zero <code>any</code>. O projeto cobre o ciclo completo: design de API, generics, validação com Zod, build dual ESM/CJS, docs e publicação.\n<div class=\"pb-tree\"><span class=\"dir\">ts-toolkit/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">array.ts</span>       <span class=\"cmt\"># groupBy, chunk, unique, flatten</span>\n│   ├── <span class=\"f\">object.ts</span>      <span class=\"cmt\"># pick, omit, deepMerge</span>\n│   ├── <span class=\"f\">function.ts</span>    <span class=\"cmt\"># debounce, throttle, pipe</span>\n│   ├── <span class=\"f\">guards.ts</span>      <span class=\"cmt\"># isUser, isOrder type guards</span>\n│   ├── <span class=\"f\">schemas.ts</span>     <span class=\"cmt\"># Zod schemas + tipos inferidos</span>\n│   └── <span class=\"f\">index.ts</span>       <span class=\"cmt\"># barrel export</span>\n├── <span class=\"dir\">tests/</span>\n│   ├── <span class=\"f\">array.test.ts</span>\n│   ├── <span class=\"f\">guards.test.ts</span> <span class=\"cmt\"># testes de narrowing</span>\n│   └── <span class=\"f\">types.test.ts</span>  <span class=\"cmt\"># expectTypeOf</span>\n├── <span class=\"f\">tsconfig.json</span>   <span class=\"cmt\"># strict: true, todas flags</span>\n├── <span class=\"f\">tsup.config.ts</span>  <span class=\"cmt\"># build dual ESM/CJS</span>\n├── <span class=\"f\">package.json</span>    <span class=\"cmt\"># exports, types, sideEffects:false</span>\n└── <span class=\"f\">README.md</span>       <span class=\"cmt\"># exemplos + link TypeDoc</span></div>", "goals": [{"i": "📦", "t": "10+ utility functions com generics reais: tipos inferidos, não perdidos"}, {"i": "🛡️", "t": "Type guards por domínio (isUser, isOrder) que o TS entende como narrowing"}, {"i": "📏", "t": "Zero erros em tsc --noEmit strict, ESLint e Biome sem exceções"}, {"i": "🚀", "t": "Publicada no npm com exports modernos (ESM + CJS), .d.ts e source maps"}, {"i": "🔄", "t": "CI: typecheck → lint → test → build → publish ao criar tag v*"}], "dels": ["10+ utilities com generics: groupBy<T>, chunk<T>, debounce<F>, pipe<A,B,C>, deepMerge<T,U>", "Type guards para 3+ tipos de domínio com testes de narrowing (expectTypeOf do Vitest)", "Zod schemas compartilhados front/back com z.infer<typeof schema> exportando tipos", "Build dual ESM/CJS com tsup, declaration files (.d.ts), source maps", "README com exemplos de uso para cada utility e link para TypeDoc hospedado", "CI no GitHub Actions: typecheck → lint → test → build → publish ao criar tag"], "refs": [{"i": "🌐", "l": "Antfu — Como publicar ESM/CJS", "t": "online", "u": "https://antfu.me/posts/publish-esm-and-cjs"}, {"i": "📦", "l": "tsup — bundler para libs TS", "t": "tool", "u": "https://tsup.egoist.dev/"}, {"i": "🛡️", "l": "Zod — schema validation", "t": "tool", "u": "https://zod.dev/"}, {"i": "🎓", "l": "Total TypeScript — Matt Pocock", "t": "online", "u": "https://www.totaltypescript.com/"}], "tips": ["<strong>Exemplo de generic real — groupBy:</strong>\n<div class=\"pb-cmd\">function groupBy&lt;T, K extends string&gt;(\n  arr: T[],\n  fn: (item: T) =&gt; K\n): Record&lt;K, T[]&gt; {\n  return arr.reduce((acc, item) =&gt; {\n    const key = fn(item);\n    (acc[key] ??= []).push(item);\n    return acc;\n  }, {} as Record&lt;K, T[]&gt;);\n}\n<span class=\"cmt\">// Uso: o tipo de retorno é inferido corretamente</span>\nconst grouped = groupBy(users, u =&gt; u.role);\n<span class=\"cmt\">// tipo: Record&lt;\"admin\" | \"user\", User[]&gt;</span></div>", "<strong>Type guards com narrowing:</strong>\n<div class=\"pb-cmd\">interface User { type: 'user'; name: string; email: string }\ninterface Order { type: 'order'; id: string; total: number }\n\nfunction isUser(x: unknown): x is User {\n  return typeof x === 'object' && x !== null && 'type' in x && x.type === 'user';\n}\n<span class=\"cmt\">// Teste de narrowing com Vitest:</span>\ntest('isUser narrows type', () =&gt; {\n  const x: unknown = { type: 'user', name: 'Luan', email: 'l@e.com' };\n  if (isUser(x)) {\n    expectTypeOf(x).toEqualTypeOf&lt;User&gt;(); <span class=\"cmt\">// compile-time check</span>\n    expect(x.name).toBe('Luan');\n  }\n});</div>", "<strong>Build e publicação:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// tsup.config.ts</span>\nexport default defineConfig({\n  entry: ['src/index.ts'],\n  format: ['cjs', 'esm'],\n  dts: true,\n  sourcemap: true,\n  clean: true,\n});\n\n<span class=\"cmt\">// package.json</span>\n\"exports\": {\n  \".\": { \"import\": \"./dist/index.mjs\", \"require\": \"./dist/index.cjs\" }\n},\n\"types\": \"./dist/index.d.ts\",\n\"sideEffects\": false</div>\nTeste com <code>npm publish --dry-run</code> antes de publicar de verdade.", "<strong>Critério de \"done\":</strong> <code>tsc --noEmit</code> sem erros, <code>pnpm test</code> passa (incluindo testes de tipo), <code>npm publish --dry-run</code> mostra pacote correto, alguma aplicação consegue importar e usar com autocomplete funcionando."]}, "refs": [{"e": "📘", "l": "TypeScript Handbook", "u": "https://www.typescriptlang.org/docs/handbook/"}, {"e": "🎓", "l": "Total TypeScript — Matt Pocock", "u": "https://www.totaltypescript.com/"}, {"e": "🛡️", "l": "Zod — Schema validation", "u": "https://zod.dev/"}, {"e": "📖", "l": "Type Challenges", "u": "https://github.com/type-challenges/type-challenges"}]}, {"id": "node", "label": "FASE 03", "short": "Node.js Internals", "icon": "🟢", "dur": "2–3 semanas", "tag": "runtime", "color": "#4ade80", "numBg": "#0a1a10", "numBd": "#1a3020", "title": "Node.js Internals & Runtime", "desc": "Entender o Node.js de verdade — não só como usar, mas <strong>como funciona</strong> — separa quem resolve problemas de performance de quem empilha camadas.", "topics": [{"icon": "🔄", "title": "Event Loop em Profundidade", "desc": "Fases, microtask vs macrotask, backpressure e thread pool.", "checks": ["Fases: timers, pending, poll, check, close", "Microtask (Promise) vs macrotask queue", "nextTick vs setImmediate vs setTimeout(0)", "Backpressure em streams e memory leaks", "UV_THREADPOOL_SIZE e operações bloqueantes"], "res": [{"i": "📖", "l": "Node.js Event Loop", "t": "online", "u": "https://nodejs.org/en/learn/asynchronous-work/event-loop-timers-and-nexttick"}]}, {"icon": "🌊", "title": "Streams & I/O", "desc": "Readable, Writable, Transform, pipeline, AbortController.", "checks": ["Readable, Writable, Transform, Duplex", "stream.pipeline com error handling", "Async iteration com for await...of", "AbortController para cancelar operações", "HTTP/2 multiplexing e push streams"], "res": [{"i": "📖", "l": "Streams API", "t": "online", "u": "https://nodejs.org/api/stream.html"}]}, {"icon": "🔬", "title": "Performance & Debug", "desc": "Profiling, flame graphs, heap snapshots, Worker Threads.", "checks": ["Profiling com --inspect + Chrome DevTools", "Flame graphs com 0x ou clinic flame", "Heap snapshots e detecção de memory leaks", "Worker Threads para CPU-bound", "child_process vs cluster vs worker_threads", "Graceful shutdown com SIGTERM/SIGINT"], "res": [{"i": "🔧", "l": "clinic.js", "t": "tool", "u": "https://clinicjs.org/"}, {"i": "🔧", "l": "0x flame graphs", "t": "tool", "u": "https://github.com/davidmarkclements/0x"}]}, {"icon": "🗂️", "title": "Módulos & Runtime Moderno", "desc": "ESM vs CJS, AsyncLocalStorage, Diagnostics Channel.", "checks": ["ESM vs CJS — interop, top-level await", "AsyncLocalStorage para contexto (req ID)", "Healthchecks: liveness vs readiness", "Node.js native test runner (node:test)", "Diagnostics Channel para instrumentação"], "res": [{"i": "📖", "l": "Node.js Design Patterns", "t": "book", "u": "https://www.nodejsdesignpatterns.com/"}]}], "project": {"name": "node-bench — Laboratório de Concorrência Node.js", "desc": "Você vai executar a <strong>mesma tarefa CPU-intensiva de 4 formas</strong> — sync, async I/O, Worker Threads, child_process — e entender por que cada número é aquele número, com flame graphs e heap snapshots como evidência.\n<div class=\"pb-tree\"><span class=\"dir\">node-bench/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">task.ts</span>            <span class=\"cmt\"># a tarefa CPU-bound (SHA-256 batch)</span>\n│   ├── <span class=\"f\">mode-sync.ts</span>       <span class=\"cmt\"># bloqueante no event loop</span>\n│   ├── <span class=\"f\">mode-async.ts</span>      <span class=\"cmt\"># async I/O (crypto.pbkdf2)</span>\n│   ├── <span class=\"f\">mode-workers.ts</span>    <span class=\"cmt\"># Worker Threads com pool</span>\n│   ├── <span class=\"f\">mode-child.ts</span>      <span class=\"cmt\"># child_process.fork</span>\n│   └── <span class=\"f\">worker-pool.ts</span>     <span class=\"cmt\"># pool reutilizável</span>\n├── <span class=\"dir\">results/</span>\n│   ├── <span class=\"f\">benchmark.md</span>       <span class=\"cmt\"># tabela comparativa</span>\n│   └── <span class=\"dir\">flamegraphs/</span>       <span class=\"cmt\"># HTMLs gerados pelo 0x</span>\n├── <span class=\"f\">package.json</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "⚡", "t": "4 implementações da mesma tarefa: sync, async, Workers, child_process"}, {"i": "🔥", "t": "Flame graphs com 0x para cada modo, salvos como HTML"}, {"i": "📊", "t": "Tabela: throughput, latência p99, memória RSS para cada modo"}, {"i": "🛑", "t": "Graceful shutdown com SIGTERM + AbortController em todos os modos"}, {"i": "🧵", "t": "Worker pool reutilizável com concorrência configurável"}], "dels": ["Tarefa CPU-bound real: SHA-256 em batch de 1000 arquivos (ou prime sieve até 10M)", "4 modos implementados, executáveis individualmente: pnpm bench:sync, bench:async, etc.", "Flame graphs 0x para cada modo, salvos em results/flamegraphs/ como HTML interativo", "Heap snapshots antes/depois de carga — detectar memory leaks em cada modo", "Graceful shutdown: SIGTERM + AbortController em todos os modos, testado com kill -TERM", "Worker pool com concorrência configurável (--concurrency 4) e fila de tarefas", "benchmark.md: tabela + análise explicando cada resultado com base na teoria do event loop"], "refs": [{"i": "🔧", "l": "0x — flame graphs", "t": "tool", "u": "https://github.com/davidmarkclements/0x"}, {"i": "🔧", "l": "clinic.js", "t": "tool", "u": "https://clinicjs.org/"}, {"i": "📖", "l": "Worker Threads API", "t": "online", "u": "https://nodejs.org/api/worker_threads.html"}], "tips": ["<strong>Tarefa sugerida — SHA-256 batch:</strong>\n<div class=\"pb-cmd\">import { createHash } from 'crypto';\nimport { readFileSync } from 'fs';\n\nfunction hashFile(path: string): string {\n  const data = readFileSync(path);\n  return createHash('sha256').update(data).digest('hex');\n}\n<span class=\"cmt\">// Processar 1000 arquivos de 1MB cada</span>\n<span class=\"cmt\">// Modo sync: ~12s (bloqueia event loop)</span>\n<span class=\"cmt\">// Modo workers (4): ~3.5s (4x speedup)</span></div>", "<strong>Worker pool — estrutura:</strong>\n<div class=\"pb-cmd\">class WorkerPool {\n  private workers: Worker[] = [];\n  private queue: Task[] = [];\n  private available: Worker[] = [];\n\n  constructor(private size: number, workerScript: string) {\n    for (let i = 0; i &lt; size; i++) {\n      const w = new Worker(workerScript);\n      w.on('message', (result) =&gt; {\n        this.available.push(w);\n        this.processQueue();\n      });\n      this.available.push(w);\n    }\n  }\n  async execute(data: any): Promise&lt;any&gt; { ... }\n}</div>", "<strong>Flame graph com 0x:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> npx 0x --open -- node dist/mode-sync.js\n<span class=\"cmt\"># Abre flame graph interativo no browser</span>\n<span class=\"cmt\"># A barra mais larga = seu gargalo</span>\n<span class=\"cmt\"># Salvar HTML em results/flamegraphs/sync.html</span></div>", "<strong>No relatório, explique cada resultado:</strong> \"Workers foi 3.8x mais rápido porque cada worker roda em V8 isolate separado, eliminando o bottleneck do single-thread. Async foi semelhante ao sync porque crypto.createHash é CPU-bound e roda no thread pool do libuv que tem 4 threads por default.\"", "<strong>Critério de \"done\":</strong> 4 modos benchmarkados, flame graphs gerados, tabela com throughput/p99/RSS, análise explicando POR QUE cada resultado, graceful shutdown funcional."]}, "refs": [{"e": "📘", "l": "Node.js Event Loop", "u": "https://nodejs.org/en/learn/asynchronous-work/event-loop-timers-and-nexttick"}, {"e": "🔬", "l": "clinic.js", "u": "https://clinicjs.org/"}, {"e": "🔥", "l": "0x flame graphs", "u": "https://github.com/davidmarkclements/0x"}, {"e": "📖", "l": "Node.js Design Patterns", "u": "https://www.nodejsdesignpatterns.com/"}]}, {"id": "arch", "label": "FASE 04", "short": "Arquitetura & DDD", "icon": "🏗️", "dur": "3–4 semanas", "tag": "gap pleno→sênior", "color": "#fb923c", "numBg": "#1a0e08", "numBd": "#2a1808", "title": "Arquitetura & Design de Software", "desc": "O <strong>maior gap entre pleno e sênior</strong>. Não basta funcionar — precisa de código que outros conseguem manter, evoluir e testar.", "topics": [{"icon": "🧱", "title": "Clean Architecture", "desc": "Camadas, Dependency Rule, Hexagonal, separação de concerns.", "checks": ["Camadas: Domain→Application→Infra→Presentation", "Dependency Rule: deps apontam para dentro", "Ports and Adapters (Hexagonal)", "Separar entities de ORM models", "Application Services orquestrando Use Cases", "Modular Monolith vs microsserviços prematuros"], "res": [{"i": "📖", "l": "Clean Architecture (Uncle Bob)", "t": "book"}]}, {"icon": "🗺️", "title": "Domain-Driven Design", "desc": "Value Objects, Entities, Aggregates, Domain Events, Repository.", "checks": ["Value Objects imutáveis com validação", "Entities com identidade e ciclo de vida", "Aggregate roots e invariantes", "Domain Events entre contextos", "Repository como abstração de persistência", "Ubiquitous Language com produto"], "res": [{"i": "📖", "l": "Implementing DDD (Vernon)", "t": "book"}]}, {"icon": "🔩", "title": "Design Patterns Aplicados", "desc": "Factory, Strategy, Observer, Decorator, CQRS, Chain of Responsibility.", "checks": ["Factory Method e Abstract Factory", "Strategy para algoritmos intercambiáveis", "Observer / Event Emitter", "Decorator para cross-cutting concerns", "Command pattern e CQRS", "Chain of Responsibility para pipelines"], "res": [{"i": "📖", "l": "Refactoring (Fowler)", "t": "book", "u": "https://refactoring.com/"}]}, {"icon": "📐", "title": "SOLID na Prática", "desc": "Os 5 princípios aplicados ao TypeScript.", "checks": ["SRP: uma razão para mudar", "OCP: extensível via composição", "LSP: subtipos honram contratos", "ISP: interfaces pequenas e focadas", "DIP: depender de abstrações", "Code smells em code review"], "res": [{"i": "🌐", "l": "solidbook.io", "t": "online", "u": "https://solidbook.io/"}]}, {"icon": "🚨", "title": "Error Handling Avançado", "desc": "Result pattern, error hierarchy, retry, fallback, circuit break.", "checks": ["Result pattern (Either) em vez de throw", "Error hierarchy tipada", "Estratégias: fail-fast, retry, fallback", "Erros de domínio vs erros de infra", "neverthrow para error handling funcional"], "res": [{"i": "📦", "l": "neverthrow", "t": "tool", "u": "https://github.com/supermacro/neverthrow"}]}, {"icon": "🔄", "title": "Migração de Legacy & Modernização", "desc": "Estratégias para evoluir código legado incrementalmente sem reescrever tudo.", "checks": ["Strangler Fig pattern: migrar módulo a módulo", "Feature flags para migração gradual (ex: Redux → Zustand)", "Migrar Pages Router → App Router incrementalmente", "Extrair shared components entre projetos (monorepo)", "Coexistência de libs old/new no mesmo codebase", "Migrar Bootstrap/SASS → Tailwind CSS com codemods", "Documentar decisões de migração em ADR"], "res": [{"i": "📖", "l": "Strangler Fig (Fowler)", "t": "online", "u": "https://martinfowler.com/bliki/StranglerFigApplication.html"}, {"i": "🌐", "l": "Next.js Migration Guide", "t": "online", "u": "https://nextjs.org/docs/app/building-your-application/upgrading"}]}], "project": {"name": "order-service — Clean Architecture + DDD em TypeScript", "desc": "Módulo de pedidos com <strong>Clean Architecture e DDD do zero</strong> — sem framework de DI, só TypeScript puro. O teste definitivo: trocar Prisma por InMemory sem mudar uma linha do domínio.\n<div class=\"pb-tree\"><span class=\"dir\">order-service/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"dir\">domain/</span>\n│   │   ├── <span class=\"dir\">entities/</span>    <span class=\"cmt\"># Order, Customer</span>\n│   │   ├── <span class=\"dir\">value-objects/</span> <span class=\"cmt\"># Money, Address, OrderStatus</span>\n│   │   ├── <span class=\"dir\">events/</span>      <span class=\"cmt\"># OrderConfirmed, OrderCancelled</span>\n│   │   └── <span class=\"dir\">repositories/</span> <span class=\"cmt\"># interfaces (ports)</span>\n│   ├── <span class=\"dir\">application/</span>\n│   │   └── <span class=\"dir\">use-cases/</span>   <span class=\"cmt\"># CreateOrder, ConfirmOrder</span>\n│   ├── <span class=\"dir\">infrastructure/</span>\n│   │   ├── <span class=\"dir\">persistence/</span> <span class=\"cmt\"># PrismaOrderRepo, InMemoryOrderRepo</span>\n│   │   └── <span class=\"dir\">http/</span>       <span class=\"cmt\"># Express controllers</span>\n│   └── <span class=\"dir\">shared/</span>\n│       └── <span class=\"f\">result.ts</span>   <span class=\"cmt\"># neverthrow Result type</span>\n├── <span class=\"dir\">tests/</span>\n│   ├── <span class=\"dir\">domain/</span>         <span class=\"cmt\"># testes sem infra</span>\n│   └── <span class=\"dir\">integration/</span>    <span class=\"cmt\"># testes com Testcontainers</span>\n├── <span class=\"dir\">docs/</span>\n│   └── <span class=\"f\">adr/</span>           <span class=\"cmt\"># Architecture Decision Records</span>\n└── <span class=\"f\">package.json</span></div>", "goals": [{"i": "🧱", "t": "Domain/Application/Infra isolados — domínio não importa nada de fora"}, {"i": "🗺️", "t": "3+ Value Objects (Money, Address, OrderStatus) e 2+ Aggregate Roots (Order, Customer)"}, {"i": "🔌", "t": "Swap: Prisma → InMemory sem alterar Use Cases (teste de isolamento)"}, {"i": "📄", "t": "ADRs documentando decisões de arquitetura"}, {"i": "🧪", "t": "Cobertura ≥ 90% nos testes de domínio sem dependência de infra"}], "dels": ["Estrutura de pastas Domain/Application/Infrastructure/Presentation separadas", "3+ Value Objects imutáveis com validação (Money com precisão decimal, Address com CEP, OrderStatus como state machine)", "2+ Aggregate Roots com invariantes (Order não pode ter 0 itens, Customer precisa email válido)", "Use Cases com DI via interface — não classe concreta", "Domain Events: OrderConfirmed dispara SendConfirmationEmail via subscriber", "Testes domínio ≥ 90% com InMemoryRepo — sem banco, sem HTTP", "ADRs documentando: por que essas camadas, por que esses patterns, alternativas rejeitadas"], "refs": [{"i": "📕", "l": "Clean Architecture — Robert C. Martin", "t": "book"}, {"i": "📗", "l": "Implementing DDD — Vernon", "t": "book"}, {"i": "📦", "l": "neverthrow — Result pattern", "t": "tool", "u": "https://github.com/supermacro/neverthrow"}, {"i": "📖", "l": "ADR templates", "t": "online", "u": "https://adr.github.io/"}], "tips": ["<strong>Value Object — Money:</strong>\n<div class=\"pb-cmd\">class Money {\n  private constructor(\n    readonly amount: number,\n    readonly currency: string\n  ) {\n    if (amount &lt; 0) throw new Error('Amount cannot be negative');\n    if (!['BRL','USD','EUR'].includes(currency)) throw new Error('Invalid currency');\n  }\n  static create(amount: number, currency: string): Result&lt;Money, DomainError&gt; {\n    <span class=\"cmt\">// validação + retorna Ok(new Money(...)) ou Err(...)</span>\n  }\n  add(other: Money): Money {\n    if (this.currency !== other.currency) throw new Error('Currency mismatch');\n    return new Money(this.amount + other.amount, this.currency);\n  }\n  equals(other: Money): boolean {\n    return this.amount === other.amount && this.currency === other.currency;\n  }\n}</div>", "<strong>Teste de isolamento — o teste definitivo:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// Mesmo use case, dois repositórios diferentes:</span>\ndescribe('CreateOrder', () =&gt; {\n  it('works with InMemoryRepo', async () =&gt; {\n    const repo = new InMemoryOrderRepo();\n    const useCase = new CreateOrder(repo);\n    const result = await useCase.execute(input);\n    expect(result.isOk()).toBe(true);\n  });\n\n  it('works with PrismaRepo', async () =&gt; {\n    const repo = new PrismaOrderRepo(prisma);\n    const useCase = new CreateOrder(repo); <span class=\"cmt\">// mesmo use case!</span>\n    const result = await useCase.execute(input);\n    expect(result.isOk()).toBe(true);\n  });\n});</div>\nSe ambos passam com o mesmo Use Case, o domínio está isolado.", "<strong>Domain Events:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// No Aggregate:</span>\nclass Order {\n  confirm(): Result&lt;void, DomainError&gt; {\n    this.status = OrderStatus.Confirmed;\n    this.addDomainEvent(new OrderConfirmed(this.id, this.total));\n    return ok(undefined);\n  }\n}\n<span class=\"cmt\">// No Application layer — subscriber:</span>\neventBus.subscribe('OrderConfirmed', async (event) =&gt; {\n  await sendConfirmationEmail(event.orderId);\n});</div>", "<strong>ADR template:</strong> Contexto (por que decidir) → Decisão (o que decidimos) → Consequências (trade-offs aceitos). Use o formato do <a href=\"https://adr.github.io/\" style=\"color:var(--c)\">adr.github.io</a>.", "<strong>Critério de \"done\":</strong> teste de swap Prisma↔InMemory passa, cobertura domínio ≥90%, 3+ ADRs escritos, zero imports de infra no domínio (<code>grep -r \"prisma\" src/domain/</code> retorna vazio)."]}, "refs": [{"e": "📕", "l": "Clean Architecture — Uncle Bob", "u": "https://www.amazon.com/Clean-Architecture-Craftsmans-Software-Structure/dp/0134494164"}, {"e": "📗", "l": "Implementing DDD — Vernon", "u": "https://www.amazon.com/Implementing-Domain-Driven-Design-Vaughn-Vernon/dp/0321834577"}, {"e": "📕", "l": "Refactoring — Martin Fowler", "u": "https://refactoring.com/"}, {"e": "📕", "l": "Working Effectively with Legacy Code — Feathers", "u": "https://www.amazon.com/Working-Effectively-Legacy-Michael-Feathers/dp/0131177052"}, {"e": "🌐", "l": "solidbook.io", "u": "https://solidbook.io/"}, {"e": "📘", "l": "NestJS docs", "u": "https://docs.nestjs.com/"}]}, {"id": "net", "label": "FASE 05", "short": "Redes & Internet", "icon": "🌐", "dur": "2–3 semanas", "tag": "como a internet funciona", "color": "#06b6d4", "numBg": "#081820", "numBd": "#102830", "title": "Redes, Internet e Protocolos", "desc": "Toda requisição <code>fetch()</code> atravessa DNS, TCP, TLS e HTTP. Entender cada camada te torna capaz de diagnosticar, otimizar e tomar decisões de arquitetura que dependem de rede.", "topics": [{"icon": "🌍", "title": "Como a Internet Funciona", "desc": "DNS resolução, roteamento IP, BGP, ISPs, CDNs e topologia da internet.", "checks": ["DNS: resolução iterativa vs recursiva, TTL, cache", "Registros DNS: A, AAAA, CNAME, MX, TXT, SRV", "Roteamento IP: subnets, CIDR, NAT", "Traceroute e como pacotes atravessam a internet", "CDNs: como funcionam, edge locations, cache invalidation"], "res": [{"i": "🌐", "l": "How DNS Works (comic)", "t": "online", "u": "https://howdns.works/"}, {"i": "📖", "l": "Computer Networking (Kurose)", "t": "book"}]}, {"icon": "🔌", "title": "TCP/IP e UDP em Profundidade", "desc": "Three-way handshake, congestion control, keep-alive, TCP vs UDP trade-offs.", "checks": ["TCP: SYN/SYN-ACK/ACK handshake", "Sliding window e congestion control (Cubic)", "Keep-alive e TIME_WAIT", "UDP: quando usar (DNS, streaming, games)", "TCP_NODELAY e Nagle's algorithm"], "res": [{"i": "📖", "l": "TCP/IP Illustrated", "t": "book"}]}, {"icon": "🔐", "title": "TLS/HTTPS — Segurança de Transporte", "desc": "TLS 1.3 handshake, certificados, PKI, HSTS, certificate pinning.", "checks": ["TLS 1.3 handshake: ECDHE + certificados", "Certificados: CA, chain of trust, Let's Encrypt", "HSTS e preload list", "Mixed content e upgrade-insecure-requests", "mTLS para comunicação entre serviços"], "res": [{"i": "🌐", "l": "SSL Labs Server Test", "t": "tool", "u": "https://www.ssllabs.com/ssltest/"}]}, {"icon": "📡", "title": "HTTP Deep Dive", "desc": "HTTP/1.1, HTTP/2, HTTP/3, métodos, headers, caching, cookies e sessões.", "checks": ["Métodos HTTP: idempotência e safety", "Headers: Cache-Control, ETag, Vary, CORS", "HTTP/2: multiplexing, server push, HPACK", "HTTP/3 e QUIC: 0-RTT, no head-of-line blocking", "Cookies: SameSite, Secure, HttpOnly, partitioned"], "res": [{"i": "📖", "l": "HTTP/3 Explained", "t": "online", "u": "https://http3-explained.haxx.se/"}]}, {"icon": ios reais</span>\n├── <span class=\"f\">package.json</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "🌍", "t": "DNS: resolver, verificar propagação, comparar TTLs entre 8.8.8.8 e 1.1.1.1"}, {"i": "🔐", "t": "TLS: versão, cipher, cadeia de certificados, HSTS, data de expiração"}, {"i": "📡", "t": "Headers: score de segurança (CSP, HSTS, X-Frame-Options, Permissions-Policy)"}, {"i": "📱", "t": "WebSocket echo server com handshake manual e inspeção de frames"}, {"i": "📝", "t": "Guia: 'como diagnosticar problema X' para 5 cenários reais de produção"}], "dels": ["dns-check: resolve domínio, mostra A/AAAA/MX/TXT/CNAME, TTL, compara entre nameservers", "tls-audit: conecta HTTPS, inspeciona certificado (validade, emissor, SANs), versão TLS, cipher", "header-scan: requisição + análise de headers de segurança com score e sugestões", "ws-echo: handshake HTTP→WS manual (Sec-WebSocket-Accept com SHA-1+base64), parseia frames", "troubleshooting.md: certificado expirado, CORS, CDN stale, WebSocket drop, DNS propagation"], "refs": [{"i": "🌐", "l": "How DNS Works", "t": "online", "u": "https://howdns.works/"}, {"i": "🔧", "l": "SSL Labs", "t": "tool", "u": "https://www.ssllabs.com/ssltest/"}, {"i": "🌐", "l": "RFC 6455 — WebSocket", "t": "online", "u": "https://datatracker.ietf.org/doc/html/rfc6455"}], "tips": ["<strong>dns-check — entrada/saída:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> npx net-debug dns google.com\nDNS Records for google.com:\n  A:     142.250.218.14 (TTL: 300)\n  AAAA:  2607:f8b0:4004:800::200e\n  MX:    10 smtp.google.com\n  TXT:   \"v=spf1 include:_spf.google.com ~all\"\nPropagation: 8.8.8.8 ✓  1.1.1.1 ✓  208.67.222.222 ✓</div>\nUse <code>dns.resolve()</code> e <code>dns.setServers()</code> do Node.js.", "<strong>tls-audit:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> npx net-debug tls example.com\nTLS Report for example.com:\n  Protocol:    TLSv1.3\n  Cipher:      TLS_AES_256_GCM_SHA384\n  Certificate: CN=example.com\n  Issuer:      Let's Encrypt Authority X3\n  Valid:       2024-01-15 → 2024-04-14 (87 days remaining)\n  HSTS:        max-age=31536000; includeSubDomains ✓\n  Grade:       A+</div>\nUse <code>tls.connect()</code> e <code>socket.getPeerCertificate()</code>.", "<strong>ws-echo sem libs — o handshake:</strong> Detectar header <code>Upgrade: websocket</code>, calcular <code>Sec-WebSocket-Accept</code> = base64(SHA1(key + \"258EAFA5-E914-47DA-95CA-C5AB0DC85B11\")), parsear frames binários. Pesquise 'WebSocket handshake from scratch'.", "<strong>Critério de \"done\":</strong> Cada ferramenta funciona como CLI (<code>npx net-debug [cmd] [args]</code>), output formatado e legível, troubleshooting.md cobre 5 cenários com passos de diagnóstico."]}, "refs": [{"e": "📖", "l": "TCP/IP Illustrated — W.R. Stevens"}, {"e": "🌐", "l": "How DNS Works", "u": "https://howdns.works/"}, {"e": "📖", "l": "HTTP/3 Explained", "u": "https://http3-explained.haxx.se/"}, {"e": "🛡️", "l": "OWASP Top 10", "u": "https://owasp.org/www-project-top-ten/"}, {"e": "🌐", "l": "web.dev — Network", "u": "https://web.dev/performance/"}, {"e": "🌐", "l": "SSL Labs", "u": "https://www.ssllabs.com/ssltest/"}]}, {"id": "db", "label": "FASE 06", "short": "Banco de Dados", "icon": "🗄️", "dur": "3–4 semanas", "tag": "fundamento de todo backend", "color": "#f59e0b", "numBg": "#1a1408", "numBd": "#2a2008", "title": "Banco de Dados — SQL, NoSQL & Data Modeling", "desc": "Todo sistema sério depende de um banco bem modelado. <strong>Saber escolher, modelar, otimizar e escalar</strong> é o que separa um dev que faz CRUD de um que constrói sistemas reais.", "topics": [{"icon": "📊", "title": "Modelagem de Dados Relacional", "desc": "Normalização, denormalização, ERD, constraints, foreign keys e design de schemas.", "checks": ["Normalização: 1NF, 2NF, 3NF e quando desnormalizar", "Entity-Relationship Diagrams (ERD) para modelar domínios", "Primary keys: UUID vs serial vs ULID — trade-offs", "Foreign keys, ON DELETE CA : "📖", "l": "MongoDB docs", "t": "online", "u": "https://www.mongodb.com/docs/"}]}, {"icon": "🔴", "title": "Redis como Data Store", "desc": "Além de cache: sorted sets, streams, pub/sub, Lua scripting, persistência.", "checks": ["Data structures: strings, hashes, lists, sets, sorted sets", "Redis Streams para event log e messaging", "Pub/Sub para comunicação entre serviços", "Lua scripting para operações atômicas complexas", "Persistência: RDB snapshots vs AOF append-only", "Redis como session store e leaderboard", "TTL strategies: key expiration e eviction policies", "Redis Cluster vs Sentinel para alta disponibilidade"], "res": [{"i": "🎓", "l": "Redis University", "t": "online", "u": "https://university.redis.io/"}, {"i": "📖", "l": "Redis docs", "t": "online", "u": "https://redis.io/docs/"}]}, {"icon": "🔧", "title": "ORMs, Query Builders & Raw SQL", "desc": "Prisma, Drizzle, TypeORM, Knex. Quando usar ORM vs raw SQL.", "checks": ["Prisma: schema-first, type-safe queries, relations", "Drizzle: SQL-like syntax com type safety", "TypeORM: quando encontrar em projetos legados", "Raw SQL com tagged templates para queries complexas", "N+1 problem: como detectar e resolver em cada ORM", "ORM vs Query Builder vs Raw SQL — decision matrix", "Database testing: seeding, truncation, Testcontainers"], "res": [{"i": "📦", "l": "Prisma", "t": "tool", "u": "https://www.prisma.io/docs"}, {"i": "📦", "l": "Drizzle ORM", "t": "tool", "u": "https://orm.drizzle.team/"}]}], "project": {"name": "data-layer — Camada de Dados E-commerce (PostgreSQL + MongoDB + Redis)", "desc": "A <strong>camada de dados completa de um e-commerce</strong> com 3 tecnologias para 3 casos de uso — e documentação justificando cada escolha com EXPLAIN ANALYZE.\n<div class=\"pb-tree\"><span class=\"dir\">data-layer/</span>\n├── <span class=\"dir\">prisma/</span>\n│   ├── <span class=\"f\">schema.prisma</span>      <span class=\"cmt\"># 5+ tabelas</span>\n│   └── <span class=\"dir\">migrations/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"dir\">postgres/</span>          <span class=\"cmt\"># queries, índices, CTEs</span>\n│   ├── <span class=\"dir\">mongo/</span>             <span class=\"cmt\"># catálogo, aggregation</span>\n│   ├── <span class=\"dir\">redis/</span>             <span class=\"cmt\"># session, cache, leaderboard</span>\n│   └── <span class=\"f\">decision.md</span>        <span class=\"cmt\"># por que SQL vs NoSQL para cada</span>\n├── <span class=\"dir\">tests/</span>                 <span class=\"cmt\"># Testcontainers (PG+Mongo+Redis)</span>\n├── <span class=\"f\">docker-compose.yml</span>\n├── <span class=\"f\">explain-results/</span>       <span class=\"cmt\"># antes/depois de índices</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "🐘", "t": "PostgreSQL: 5+ tabelas normalizadas, ERD, índices otimizados, migrations zero-downtime"}, {"i": "🍃", "t": "MongoDB: catálogo com aggregation pipeline, filtros, busca textual, paginação cursor"}, {"i": "🔴", "t": "Redis: sessões JWT, cache-aside, sorted set para top-10 mais vendidos"}, {"i": "🔍", "t": "EXPLAIN ANALYZE: top 10 queries antes/depois de índices"}, {"i": "📄", "t": "Documento: 'por que SQL vs NoSQL para cada caso de uso neste sistema'"}], "dels": ["Schema PostgreSQL: users, products, orders, order_items, payments — ERD no dbdiagram.io", "Migrations Prisma versionadas com zero-downtime (expand/contract para colunas NOT NULL)", "EXPLAIN ANALYZE: 10 queries mostrando Sequential Scan → Index Scan, salvas em explain-results/", "MongoDB: aggregation pipeline para filtros por categoria, preço, busca full-text, cursor pagination", "Redis: session store TTL, cache-aside para produto com invalidação por evento, ZADD para leaderboard", "Testcontainers: PG + Mongo + Redis reais nos testes de integração", "decision.md: justificativa técnica para SQL vs NoSQL vs Redis por entidade"], "refs": [{"i": "📕", "l": "DDIA — Kleppmann", "t": "book", "u": "https://dataintensive.net/"}, {"i": "🌐", "l": "Use The Index, Luke", "t": "online", "u": "https://use-the-index-luke.com/"}, {"i": "🔧", "l": "dbdiagram.io", "t": "tool", "u": "https://dbdiagram.io/"}, {"i": "📦", "l": "Testcontainers", "t": "tool", "u": "https://testcontainers.com/"}], "tips": ["<strong>EXPLAIN ANALYZE — o antes/depois:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">-- SEM índice (antes):</span>\nEXPLAIN ANALYZE SELECT * FROM orders WHERE user_id = 42 AND status = 'pending';\n<span class=\"cmt\">-- Seq Scan on orders  cost=0.00..1542.00 rows=3 width=120</span>\n<span class=\"cmt\">-- Execution Time: 12.543 ms</span>\n\n<span class=\"cmt\">-- COM índice (depois):</span>\nCREATE INDEX idx_orders_user_status ON orders(user_id, status);\nEXPLAIN ANALYZE SELECT * FROM orders WHERE user_id = 42 AND status = 'pending';\n<span class=\"cmt\">-- Index Scan using idx_orders_user_status  cost=0.42..8.44 rows=3</span>\n<span class=\"cmt\">-- Execution Time: 0.087 ms  (~144x mais rápido)</span></div>", "<strong>Redis leaderboard:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// Incrementar vendas de um produto:</span>\nawait redis.zincrby('top_products', 1, productId);\n<span class=\"cmt\">// Top 10 mais vendidos:</span>\nconst top10 = await redis.zrevrange('top_products', 0, 9, 'WITHSCORES');\n<span class=\"cmt\">// Resultado: [productId, score, productId, score, ...]</span></div>", "<strong>MongoDB aggregation pipeline:</strong>\n<div class=\"pb-cmd\">db.products.aggregate([\n  { $match: { category: \"electronics\", price: { $gte: 100, $lte: 500 } } },\n  { $sort: { rating: -1 } },\n  { $skip: 20 }, { $limit: 10 },  <span class=\"cmt\">// cursor-based é melhor</span>\n  { $project: { name: 1, price: 1, rating: 1 } }\n])</div>", "<strong>Testcontainers setup:</strong>\n<div class=\"pb-cmd\">import { PostgreSqlContainer } from '@testcontainers/postgresql';\nconst pg = await new PostgreSqlContainer().start();\nconst connectionString = pg.getConnectionUri();</div>", "<strong>Critério de \"done\":</strong> <code>docker-compose up</code> sobe tudo, 10 queries otimizadas com EXPLAIN salvo, leaderboard Redis funcional, testes com Testcontainers passam, decision.md argumenta trade-offs."]}, "refs": [{"e": "📕", "l": "DDIA — Martin Kleppmann", "u": "https://dataintensive.net/"}, {"e": "📕", "l": "PostgreSQL: Up & Running — Obe & Hsu", "u": "https://www.amazon.com/PostgreSQL-Running-Practical-Advanced-Database/dp/1491963417"}, {"e": "📘", "l": "PostgreSQL docs", "u": "https://www.postgresql.org/docs/current/"}, {"e": "🌐", "l": "Use The Index, Luke", "u": "https://use-the-index-luke.com/"}, {"e": "📖", "l": "MongoDB University", "u": "https://learn.mongodb.com/"}, {"e": "🎓", "l": "Redis University", "u": "https://university.redis.io/"}, {"e": "📦", "l": "Prisma docs", "u": "https://www.prisma.io/docs"}, {"e": "🌐", "l": "pgexercises.com", "u": "https://pgexercises.com/"}]}, {"id": "back", "label": "FASE 07", "short": "Backend Avançado", "icon": "🚀", "dur": "3–4 semanas", "tag": "sistemas distribuídos", "color": "#c084fc", "numBg": "#160a22", "numBd": "#241030", "title": "Backend Avançado & Sistemas Distribuídos", "desc": "A diferença entre um CRUD e um sistema que aguenta tráfego real. <strong>Filas, cache, resiliência e integrações</strong> são obrigatórios para sênior.", "topics": [{"icon": "📨", "title": "Filas & Mensageria", "desc": "BullMQ, DLQ, retry, Outbox, Saga, WebSockets, SSE.", "checks": ["BullMQ: workers, concorrência, prioridade", "Dead-letter queue e retry com backoff", "Outbox Pattern para garantia de entrega", "Saga pattern para transações distribuídas", "Idempotência em consumers", "RabbitMQ ou Kafka (conceitual)"], "res": [{"i": "📖", "l": "BullMQ docs", "t": "online", "u": "https://docs.bullmq.io/"}]}, {"icon": "⚡", "title": "Cache Estratégico", "desc": "Cache-aside, invalidação, rate limiting, distributed locks, CDN.", "checks": ["Cache-aside com TTL por entidade", "Invalidação tag-based e event-driven", "Rate limiting sliding window no Redis", "Distributed lock com Redlock", "CDN edge caching e cache-control headers", "Stale-while-revalidate para APIs públicas"], "res": [{"i": "📖", "l": "Redis caching patterns", "t": "online", "u": "https://redis.io/docs/manual/patterns/"}]}, {"icon": "🔌", "title": "API Design", "desc": "REST avançado, cursor pagination, GraphQL, gRPC, OpenAPI.", "checks": ["REST: versionamento, RFC 7807 errors", "Paginação cursor-based vs offset-based", "Idempotency keys para operações críticas", "GraphQL: resolvers, DataLoader, subscriptions", "gRPC + Protocol Buffers para serviços internos", "OpenAPI 3.0 e geração de SDK"], "res": [{"i": "📖", "l": "GraphQL docs", "t": "online", "u": "https://graphql.org/learn/"}]}, {"icon": "💳", "title": "Pagamentos & Integrações Externas", "desc": "Integração com gateways de pagamento, PCI compliance, webhooks e idempotência financeira.", "checks": ["Integração com Stripe/Adyen: charges, refunds, disputes", "Webhooks: verificação de assinatura, idempotência, retry", "PCI-DSS: o que você precisa saber como dev (SAQ-A)", "Idempotência em transações financeiras (idempotency keys)", "Reconciliação: garantir consistência entre gateway e seu DB", "Circuit breaker para APIs de terceiros instáveis", "Retry com backoff para webhooks falhos"], "res": [{"i": "📖", "l": "Stripe docs", "t": "online", "u": "https://stripe.com/docs"}, {"i": "📖", "l": "PCI-DSS Quick Guide", "t": "online", "u": "https://www.pcisecuritystandards.org/"}]}, {"icon": "🔑", "title": "Autenticação Avançada & Autorização", "desc": "OAuth2/OIDC, RBAC, multi-tenancy, sessions vs tokens — o que todo backend sênior precisa dominar.", "checks": ["OAuth2 + OIDC: Authorization Code flow com PKCE para SPAs", "JWT vs Sessions: trade-offs, quando usar cada, refresh token rotation", "RBAC (Role-Based Access Control): modelar roles, permissions, guards", "Multi-tenancy: row-level security vs schema por tenant vs database por tenant", "Passkeys / WebAuthn: fluxo de registro e autenticação passwordless", "Social login: integrar Google, GitHub, Apple via OIDC", "Auth providers: Auth0, Clerk, NextAuth.js / Auth.js — quando usar vs build próprio"], "res": [{"i": "📖", "l": "OAuth 2.0 Simplified — Aaron Parecki", "t": "online", "u": "https://www.oauth.com/"}, {"i": "📖", "l": "Auth.js (NextAuth)", "t": "online", "u": "https://authjs.dev/"}, {"i": "📖", "l": "WebAuthn Guide", "t": "online", "u": "https://webauthn.guide/"}, {"i": "📖", "l": "Clerk docs", "t": "online", "u": "https://clerk.com/docs"}, {"i": "📖", "l": "OWASP Auth Cheatsheet", "t": "online", "u": "https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"}]}], "project": {"name": "order-processor — Pipeline Assíncrono com BullMQ + Stripe", "desc": "O <strong>backend de processamento de pedidos</strong> — filas, retry, idempotência e resiliência. Cada etapa pode falhar e o sistema precisa ser tolerante.\n<div class=\"pb-tree\"><span class=\"dir\">order-processor/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">api.ts</span>             <span class=\"cmt\"># POST /orders com idempotency key</span>\n│   ├── <span class=\"dir\">workers/</span>\n│   │   ├── <span class=\"f\">check-stock.ts</span>\n│   │   ├── <span class=\"f\">process-payment.ts</span> <span class=\"cmt\"># Stripe</span>\n│   │   └── <span class=\"f\">send-confirmation.ts</span>\n│   ├── <span class=\"f\">outbox.ts</span>          <span class=\"cmt\"># Outbox Pattern</span>\n│   ├── <span class=\"f\">cache.ts</span>           <span class=\"cmt\"># Redis cache-aside</span>\n│   └── <span class=\"f\">rate-limiter.ts</span>    <span class=\"cmt\"># sliding window Redis</span>\n├── <span class=\"f\">docker-compose.yml</span>    <span class=\"cmt\"># PG + Redis + BullMQ</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "📨", "t": "3 workers BullMQ com DLQ e retry exponential backoff + jitter"}, {"i": "💳", "t": "Stripe em modo teste com webhook verificado por assinatura"}, {"i": "🔌", "t": "API REST com idempotency keys para evitar pedidos duplicados"}, {"i": "📋", "t": "Outbox Pattern: evento + pedido na mesma transação PostgreSQL"}, {"i": "⚡", "t": "Cache Redis com invalidação event-driven + rate limiting sliding window"}], "dels": ["POST /orders com header Idempotency-Key — retorna resposta salva se key já existe", "BullMQ: CheckStock, ProcessPayment, SendConfirmation — cada um com retry + DLQ", "Bull Board para visualizar e reprocessar jobs falhos no browser", "Outbox: evento gravado atomicamente com pedido no PG, worker publica na fila", "Stripe: PaymentIntent + webhook com verificação de assinatura", "Cache Redis + invalidação ao mudar status + rate limiting por IP/usuário", "Testes: pedido duplicado, falha pagamento, timeout estoque, reprocessamento DLQ"], "refs": [{"i": "📖", "l": "BullMQ docs", "t": "online", "u": "https://docs.bullmq.io/"}, {"i": "📖", "l": "Stripe docs", "t": "online", "u": "https://stripe.com/docs"}, {"i": "🌐", "l": "Outbox Pattern", "t": "online", "u": "https://microservices.io/patterns/data/transactional-outbox.html"}, {"i": "🔧", "l": "Bull Board", "t": "tool", "u": "https://github.com/felixmosh/bull-board"}], "tips": ["<strong>Idempotency key — tabela:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">-- PostgreSQL:</span>\nCREATE TABLE idempotency_keys (\n  key TEXT PRIMARY KEY,\n  response JSONB NOT NULL,\n  created_at TIMESTAMPTZ DEFAULT now()\n);\n<span class=\"cmt\">// Antes de processar:</span>\nconst existing = await db.query('SELECT response FROM idempotency_keys WHERE key=$1', [key]);\nif (existing.rows.length) return existing.rows[0].response;\n<span class=\"cmt\">// Processar e salvar:</span>\nawait db.query('INSERT INTO idempotency_keys (key, response) VALUES ($1, $2)', [key, response]);</div>", "<strong>Stripe em modo teste:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> stripe listen --forward-to localhost:3000/webhooks\n<span class=\"cmt\"># Criar PaymentIntent no código:</span>\nconst intent = await stripe.paymentIntents.create({\n  amount: order.total, currency: 'brl',\n  metadata: { orderId: order.id }\n});\n<span class=\"cmt\"># Webhook verifica assinatura:</span>\nconst event = stripe.webhooks.constructEvent(body, sig, endpointSecret);</div>", "<strong>Outbox Pattern:</strong> Dentro da mesma transação PG: <code>INSERT INTO orders (...)</code> e <code>INSERT INTO outbox_events (type, payload)</code>. Worker separado: <code>SELECT * FROM outbox_events WHERE published = false</code>, publica no BullMQ, marca como published.", "<strong>Teste de falha:</strong> Desligue o Redis no meio do processamento e verifique recuperação. Retorne 500 no mock do Stripe e verifique que retry funciona. Use <code>--fail-rate 0.3</code> no worker para simular instabilidade.", "<strong>Critério de \"done\":</strong> Pedido duplicado retorna mesma resposta, falha de pagamento vai para DLQ e pode ser reprocessada no Bull Board, rate limiting bloqueia após limite, Outbox garante entrega mesmo com falha."]}, "refs": [{"e": "📘", "l": "BullMQ docs", "u": "https://docs.bullmq.io/"}, {"e": "📕", "l": "DDIA — Kleppmann", "u": "https://dataintensive.net/"}, {"e": "📖", "l": "Stripe docs", "u": "https://stripe.com/docs"}]}, {"id": "react", "label": "FASE 08", "short": "React Avançado", "icon": "⚛️", "dur": "2–3 semanas", "tag": "frontend patterns", "color": "#22d3ee", "numBg": "#08181e", "numBd": "#10282e", "title": "React Avançado & Patterns de Composição", "desc": "React além do básico: patterns reutilizáveis, performance real e arquitetura de frontend que não vira caos em 6 meses.", "topics": [{"icon": "🪝", "title": "Hooks Avançados", "desc": "useReducer, useSyncExternalStore, useTransition, useOptimistic.", "checks": ["useReducer para state machines", "useSyncExternalStore para stores externas", "useTransition e useDeferredValue", "useOptimistic com Server Actions", "Custom hooks claros e testáveis"], "res": [{"i": "📖", "l": "React docs", "t": "online", "u": "https://react.dev/"}]}, {"icon": "🧩", "title": "Patterns de Composição", "desc": "Compound Components, Render Props, Headless, HOC.", "checks": ["Compound Components com Context", "Render Props para inversão de controle", "Slot pattern (headless)", "HOC para cross-cutting (legado)", "Provider pattern para DI"], "res": [{"i": "🎓", "l": "Epic React — Dodds", "t": "course", "u": "https://epicreact.dev/"}]}, {"icon": "🏎️", "title": "Performance React", "desc": "Memoização, Profiler, virtualização, code splitting.", "checks": ["React.memo, useMemo, useCallback — quando usar", "DevTools Profiler: identificar re-renders", "Virtualização @tanstack/react-virtual", "React.lazy + Suspense code splitting"], "res": [{"i": "📖", "l": "TanStack Virtual", "t": "online", "u": "https://tanstack.com/virtual/latest"}]}, {"icon": "🗂️", "title": "Estado & Formulários", "desc": "TanStack Query, Zustand, URL state, React Hook Form, Zod. Migração do Redux.", "checks": ["TanStack Query: cache, stale time, GC", "Zustand para client-side global state", "URL state como fonte de verdade (nuqs)", "React Hook Form com performance", "Zod schemas compartilhados front ↔ back", "Migrar Redux → TanStack Query + Zustand incrementalmente", "Identificar o que é server state vs client state"], "res": [{"i": "📖", "l": "TanStack Query", "t": "online", "u": "https://tanstack.com/query/latest"}, {"i": "📖", "l": "Zustand", "t": "online", "u": "https://zustand-demo.pmnd.rs/"}]}, {"icon": "🎨", "title": "CSS Moderno & Design Systems", "desc": "Tailwind CSS, CSS Modules, design tokens, migração de Bootstrap/SASS.", "checks": ["Tailwind CSS: utility-first, composição, customização", "Tailwind vs CSS Modules vs styled-components — trade-offs", "Design tokens: cores, spacing, tipografia como variáveis", "Migrar de Bootstrap/SASS para Tailwind incrementalmente", "CVA (class-variance-authority) para variantes de componente", "Shadcn/ui como padrão de design system com Tailwind"], "res": [{"i": "📖", "l": "Tailwind CSS", "t": "online", "u": "https://tailwindcss.com/docs"}, {"i": "📦", "l": "shadcn/ui", "t": "tool", "u": "https://ui.shadcn.com/"}, {"i": "📦", "l": "CVA", "t": "tool", "u": "https://cva.style/docs"}]}, {"icon": "♿", "title": "Acessibilidade & Error Boundaries", "desc": "ARIA, navegação por teclado, foco, Radix UI, Error Boundaries.", "checks": ["Semântica HTML e ARIA roles", "Navegação completa por teclado", "Gerenciamento de foco em modals", "Radix UI como base acessível", "Axe DevTools no CI", "Error Boundaries com fallback por feature"], "res": [{"i": "♿", "l": "Radix UI", "t": "online", "u": "https://www.radix-ui.com/"}]}], "project": {"name": "ui-kit — Design System com Radix UI + Tailwind + Storybook", "desc": "<strong>Design system interno</strong> com API pensada, acessibilidade real e documentação. Componentes headless com Radix, estilizados com Tailwind, documentados no Storybook.\n<div class=\"pb-tree\"><span class=\"dir\">ui-kit/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"dir\">components/</span>\n│   │   ├── <span class=\"dir\">Button/</span>      <span class=\"cmt\"># Button.tsx, Button.stories.tsx, Button.test.tsx</span>\n│   │   ├── <span class=\"dir\">Modal/</span>\n│   │   ├── <span class=\"dir\">Dropdown/</span>\n│   │   ├── <span class=\"dir\">Toast/</span>\n│   │   ├── <span class=\"dir\">Table/</span>\n│   │   ├── <span class=\"dir\">Tabs/</span>\n│   │   ├── <span class=\"dir\">Input/</span>\n│   │   ├── <span class=\"dir\">Form/</span>\n│   │   ├── <span class=\"dir\">Badge/</span>\n│   │   ├── <span class=\"dir\">Accordion/</span>\n│   │   ├── <span class=\"dir\">Combobox/</span>\n│   │   └── <span class=\"dir\">DatePicker/</span>\n│   ├── <span class=\"f\">tokens.css</span>  <span class=\"cmt\"># design tokens (cores, spacing)</span>\n│   └── <span class=\"f\">index.ts</span>\n├── <span class=\"dir\">.storybook/</span>\n├── <span class=\"f\">tsup.config.ts</span>\n└── <span class=\"f\">package.json</span></div>", "goals": [{"i": "🧩", "t": "12+ c on-a11y</code> para ver violações em tempo real. Cada componente deve funcionar com: Tab (navegar), Enter/Space (ativar), Escape (fechar), Arrow keys (navegar dentro). Testar: <code>axe(document.body)</code> no test.", "<strong>Teste de comportamento:</strong>\n<div class=\"pb-cmd\">test('modal opens and closes with Escape', async () =&gt; {\n  render(&lt;Modal trigger={&lt;button&gt;Open&lt;/button&gt;}&gt;Content&lt;/Modal&gt;);\n  await userEvent.click(screen.getByText('Open'));\n  expect(screen.getByText('Content')).toBeVisible();\n  await userEvent.keyboard('{Escape}');\n  expect(screen.queryByText('Content')).not.toBeInTheDocument();\n});</div>", "<strong>Critério de \"done\":</strong> Storybook roda com todos os componentes, <code>pnpm test</code> passa, axe-core 0 violations, importar <code>import { Button } from 'ui-kit/Button'</code> funciona com autocomplete."]}, "refs": [{"e": "📘", "l": "React docs", "u": "https://react.dev/"}, {"e": "📘", "l": "TanStack Query", "u": "https://tanstack.com/query/latest"}, {"e": "♿", "l": "Radix UI", "u": "https://www.radix-ui.com/"}, {"e": "🎓", "l": "Epic React", "u": "https://epicreact.dev/"}]}, {"id": "front", "label": "FASE 09", "short": "Frontend Produção", "icon": "🎨", "dur": "2–3 semanas", "tag": "escala real", "color": "#f472b6", "numBg": "#1a0812", "numBd": "#2a1020", "title": "Frontend Avançado de Produção", "desc": "Frontend em escala: Next.js App Router, performance mensurável, PWA, i18n e as decisões que separam produtos lentos dos rápidos.", "topics": [{"icon": "▲", "title": "Next.js App Router", "desc": "RSC, Client Components, Server Actions, Streaming, ISR, PPR. Migração do Pages Router.", "checks": ["Server Components: modelo mental completo", "Client Components: minimizar bundle", "Server Actions: mutations sem API route", "Streaming com Suspense boundaries", "ISR com revalidatePath / revalidateTag", "Middleware para auth e i18n", "Migrar Pages Router → App Router: coexistência e estratégia", "next/image, \">// app/[locale]/products/page.tsx</span>\nexport default async function ProductsPage() {\n  const products = await db.product.findMany(); <span class=\"cmt\">// roda no server</span>\n  return (\n    &lt;div&gt;\n      {products.map(p =&gt; &lt;ProductCard key={p.id} product={p} /&gt;)}\n      &lt;Suspense fallback={&lt;ReviewsSkeleton /&gt;}&gt;\n        &lt;Reviews /&gt; <span class=\"cmt\">{/* streaming: aparece quando pronto */}</span>\n      &lt;/Suspense&gt;\n    &lt;/div&gt;\n  );\n}</div>", "<strong>Server Action — adicionar ao carrinho:</strong>\n<div class=\"pb-cmd\">'use server';\nexport async function addToCart(productId: string) {\n  const session = await getSession();\n  await db.cart.upsert({ ... });\n  revalidateTag('cart');\n}</div>", "<strong>Lighthouse CI config:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// lighthouserc.js</span>\nmodule.exports = {\n  ci: {\n    assert: {\n      assertions: {\n        'largest-contentful-paint': ['error', { maxNumericValue: 2500 }],\n        'cumulative-layout-shift': ['error', { maxNumericValue: 0.1 }],\n      }\n    }\n  }\n};</div>", "<strong>Critério de \"done\":</strong> <code>pnpm build</code> sem erros, Lighthouse CI passa no GitHub Actions, i18n funciona sem flash, E2E cobre fluxo completo de compra, PWA funciona offline para páginas já visitadas."]}, "refs": [{"e": "📘", "l": "Next.js App Router", "u": "https://nextjs.org/docs/app"}, {"e": "📊", "l": "web.dev Performance", "u": "https://web.dev/performance/"}, {"e": "🎭", "l": "Playwright", "u": "https://playwright.dev/"}]}, {"id": "mono", "label": "FASE 10", "short": "Escala Frontend", "icon": "🏢", "dur": "2–3 semanas", "tag": "múltiplos produtos", "color": "#f97316", "numBg": "#1a0e08", "numBd": "#2a1808", "title": "Monorepo, Micro-frontends & Escala Frontend", "desc": "Quando a empresa tem <strong>landing page + booking system + dashboard interno</strong> e tudo precisa compartilhar componentes, tipos e deploy — este é o momento. Esta fase r  class=\"dir\">apps/</span>\n│   ├── <span class=\"dir\">storefront/</span>    <span class=\"cmt\"># Next.js público (landing + booking)</span>\n│   └── <span class=\"dir\">dashboard/</span>     <span class=\"cmt\"># Next.js admin (gestão interna)</span>\n├── <span class=\"dir\">packages/</span>\n│   ├── <span class=\"dir\">ui/</span>            <span class=\"cmt\"># shared components (Button, Modal, Table)</span>\n│   ├── <span class=\"dir\">types/</span>         <span class=\"cmt\"># shared TypeScript types</span>\n│   ├── <span class=\"dir\">utils/</span>         <span class=\"cmt\"># shared utilities</span>\n│   └── <span class=\"dir\">config/</span>        <span class=\"cmt\"># shared ESLint, TS, Tailwind configs</span>\n├── <span class=\"f\">turbo.json</span>\n├── <span class=\"f\">pnpm-workspace.yaml</span>\n├── <span class=\"f\">.github/workflows/ci.yml</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "📦", "t": "Turborepo com pnpm workspaces: 2 apps + 4 shared packages"}, {"i": "🧩", "t": "Shared UI lib com 5+ componentes usados em ambas as apps"}, {"i": "🚀", "t": "Deploy independente: storefront e dashboard deployam separadamente"}, {"i": "⚡", "t": "CI com affected builds: mudança em packages/ui roda testes das 2 apps"}, {"i": "📖", "t": "README com diagrama de dependências entre packages"}], "dels": ["Turborepo + pnpm: turbo.json com pipeline build→lint→test, dependências corretas", "packages/ui com 5+ componentes compartilhados (Button, Input, Modal, Table, Toast)", "packages/types com tipos de domínio: User, Booking, Property, Payment", "Ambas as apps importam de @mono/ui e @mono/types com TypeScript funcionando", "CI: affected builds — mudança em packages/utils roda apenas testes que dependem dele", "Deploy independente: storefront deploya sem afetar dashboard e vice-versa", "README com diagrama mostrando: quais packages cada app importa"], "tips": ["<strong>Setup mínimo do monorepo:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\"># pnpm-workspace.yaml</span>\npackages:\n  - \"apps/*\"\n  - \"packages/*\"\n\n<span class=\"cmt\"># turbo.json</span>\n{\n  \"pipeline\": {\n    \"build\": { \"dependsOn\": [\"^build\"] },\n    \"lint\": {},\n    \"test\": { \"dependsOn\": [\"build\"] }\n  }\n}</div>", "<strong>Shared package — package.json:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// packages/ui/package.json</span>\n{\n  \"name\": \"@mono/ui\",\n  \"main\": \"./src/index.ts\",\n  \"types\": \"./src/index.ts\",\n  \"dependencies\": { \"react\": \"workspace:*\" }\n}\n<span class=\"cmt\">// Na app: pnpm add @mono/ui --workspace</span></div>", "<strong>Critério de \"done\":</strong> <code>pnpm build</code> builda tudo, mudança em packages/ui dispara build das 2 apps, deploy independente funciona, TypeScript resolve tipos entre packages."], "refs": [{"i": "🔧", "l": "Turborepo — getting started", "t": "online", "u": "https://turbo.build/repo/docs"}, {"i": "📖", "l": "Monorepo Handbook", "t": "online", "u": "https://turbo.build/repo/docs/handbook"}, {"i": "📖", "l": "Vercel Monorepos", "t": "online", "u": "https://vercel.com/docs/monorepos"}, {"i": "📖", "l": "Module Federation", "t": "online", "u": "https://module-federation.io/"}]}, "refs": [{"e": "🔧", "l": "Turborepo", "u": "https://turbo.build/"}, {"e": "🔧", "l": "Nx", "u": "https://nx.dev/"}, {"e": "📖", "l": "Micro Frontends — Fowler", "u": "https://martinfowler.com/articles/micro-frontends.html"}, {"e": "📖", "l": "Module Federation", "u": "https://module-federation.io/"}, {"e": "📖", "l": "Vercel Monorepos", "u": "https://vercel.com/docs/monorepos"}, {"e": "📦", "l": "Changesets", "u": "https://github.com/changesets/changesets"}]}, {"id": "test", "label": "FASE 11", "short": "Testes & Qualidade", "icon": "🧪", "dur": "2 semanas", "tag": "qualidade real", "color": "#34d399", "numBg": "#081a10", "numBd": "#0a2a16", "title": "Testes Avançados & Qualidade", "desc": "Testes que realmente protegem. Sênior vai além de cobertura: testa contratos, pr eaterThan(0);\n    }\n  ));\n});</div>", "<strong>Stryker — rodar e interpretar:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> npx stryker run\n<span class=\"cmt\"># Resultado:</span>\nMutation score: 82.4% (412 killed, 88 survived, 0 timeout)\n<span class=\"cmt\"># Cada \"survived\" = um bug que seus testes NÃO detectariam</span>\n<span class=\"cmt\"># Abrir reports/mutation/html/index.html para ver quais mutantes sobreviveram</span></div>", "<strong>Pact — consumer test:</strong>\n<div class=\"pb-cmd\">const pact = new PactV3({ consumer: 'frontend', provider: 'order-api' });\npact.addInteraction({\n  uponReceiving: 'a request for product 42',\n  withRequest: { method: 'GET', path: '/products/42' },\n  willRespondWith: {\n    status: 200,\n    body: { id: '42', name: like('Widget'), price: like(9.99) }\n  }\n});</div>", "<strong>Critério de \"done\":</strong> Stryker ≥ 80%, fast-check descobre pelo menos 1 edge case que testes manuais perderam, Pact roda no CI entre 2 serviços, E2E cobre fluxo crítico com acessibilidade."]}, "refs": [{"e": "🧬", "l": "Stryker Mutator", "u": "https://stryker-mutator.io/"}, {"e": "📘", "l": "fast-check", "u": "https://fast-check.dev/"}, {"e": "🤝", "l": "Pact", "u": "https://docs.pact.io/"}, {"e": "🎭", "l": "Playwright", "u": "https://playwright.dev/"}, {"e": "🐳", "l": "Testcontainers", "u": "https://testcontainers.com/"}]}, {"id": "ops", "label": "FASE 12", "short": "Segurança & Infra", "icon": "🔭", "dur": "3–4 semanas", "tag": "produção real", "color": "#fbbf24", "numBg": "#1a1408", "numBd": "#2a2008", "title": "Segurança, Observabilidade & Infraestrutura", "desc": "Segurança real, observabilidade autônoma em prod, cloud e CI/CD maduros.", "topics": [{"icon": "🔐", "title": "Segurança Avançada", "desc": "OWASP, JWT rotation, OAuth2 PKCE, Passkeys, supply chain.", "checks": ["OWASP Top 10 aplicado a Node.js", "JWT: refresh rotation + blacklist Redis", "OAuth2 + PKCE para SPAs", "Argon2/bcrypt para hashing", "Passkeys / Web
