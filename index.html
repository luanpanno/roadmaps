<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — Full Stack & Low-Level</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800;900&family=Epilogue:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--bg2:#0a0d17;--surface:#0e1222;--surface2:#131830;--surface3:#1a2038;--border:#1c2340;--border2:#252c52;--text:#d4daf0;--text2:#8690b8;--text3:#4e567a;--white:#ecf0ff;--accent:210;--c:hsl(var(--accent),80%,60%);--c-dim:hsl(var(--accent),50%,38%);--c-glow:hsla(var(--accent),90%,55%,.07);--c-surface:hsla(var(--accent),75%,50%,.06);--c-border:hsla(var(--accent),60%,50%,.18);--radius:10px}
[data-tab=lowlevel]{--accent:155}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;min-height:100vh;overflow-x:hidden;transition:--accent .4s}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(hsla(var(--accent),50%,50%,.015) 1px,transparent 1px),linear-gradient(90deg,hsla(var(--accent),50%,50%,.015) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}

/* ── TAB BAR ── */
.tab-bar{position:sticky;top:0;z-index:200;background:rgba(6,8,16,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0;height:48px}
.tab-btn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--text3);background:none;border:none;cursor:pointer;padding:14px 20px;position:relative;transition:color .25s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--white)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--c);border-radius:2px;box-shadow:0 0 10px var(--c)}
.tab-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tab-spacer{flex:1}
.tab-progress{display:flex;align-items:center;gap:10px}
.tab-prog-ring{width:28px;height:28px;position:relative}
.tab-prog-ring svg{transform:rotate(-90deg)}
.tab-prog-ring circle{fill:none;stroke-width:3}
.tab-prog-ring .bg{stroke:var(--surface3)}
.tab-prog-ring .fg{stroke:var(--c);stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.tab-prog-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--c)}
.tab-prog-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}

/* ── LAYOUT ── */
.wrap{max-width:1060px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.tab-content{display:none}.tab-content.active{display:block}

/* ── HEADER ── */
.hero{padding:56px 0 40px}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:3.5px;text-transform:uppercase;color:var(--c);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:24px;height:1px;background:var(--c);box-shadow:0 0 8px var(--c)}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(34px,6vw,62px);font-weight:900;line-height:.93;letter-spacing:-2px;color:var(--white);margin-bottom:16px}
.hero h1 em{font-style:normal;color:var(--c);text-shadow:0 0 30px hsla(var(--accent),90%,55%,.3)}
.hero-desc{font-size:14px;color:var(--text2);max-width:580px;line-height:1.8;margin-bottom:22px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:0 0 36px}
.stat-cell{background:var(--surface);padding:18px 16px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--white);margin-bottom:2px}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}

/* ── NAV ── */
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:36px}
.nav a{font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);color:var(--text3);text-decoration:none;transition:all .2s;white-space:nowrap}
.nav a:hover{color:var(--white);border-color:var(--c-border);background:var(--c-surface)}

/* ── PHASE ── */
.phase{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .3s,box-shadow .3s;animation:su .45s ease both}
.phase:hover{border-color:var(--border2)}
.phase.open{border-color:var(--c-border);box-shadow:0 0 40px var(--c-glow)}
.ph-head{display:flex;align-items:stretch;cursor:pointer;user-select:none;background:var(--surface);transition:background .2s}
.phase.open .ph-head{background:var(--surface2)}
.ph-bar{width:4px;flex-shrink:0}
.ph-inner{flex:1;display:flex;align-items:center;gap:14px;padding:16px 20px}
.ph-badge{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:4px;flex-shrink:0}
.ph-icon{font-size:20px;flex-shrink:0}
.ph-meta{flex:1;min-width:0}
.ph-title{font-family:'Syne',sans-serif;font-size:15.5px;font-weight:700;color:var(--white);margin-bottom:3px;letter-spacing:-.2px}
.ph-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap}
.ph-right{text-align:right;flex-shrink:0;min-width:44px}
.ph-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--white);transition:color .3s}
.ph-pct.done{color:var(--c)}
.ph-cnt{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3)}
.ph-toggle{font-size:12px;color:var(--text3);transition:transform .3s;flex-shrink:0;margin-left:4px}
.phase.open .ph-toggle{transform:rotate(180deg)}

/* ── PHASE BODY ── */
.ph-body{display:none;background:var(--bg2);padding:24px 20px 28px;border-top:1px solid var(--border)}
.phase.open .ph-body{display:block;animation:fi .25s ease}
.ph-desc{background:var(--surface);border-radius:6px;padding:14px 18px;margin-bottom:20px;font-size:12.5px;color:var(--text2);line-height:1.75;border-left:3px solid}
.ph-desc strong{color:var(--text);font-style:normal}
.ph-desc code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface3);padding:1px 5px;border-radius:3px;color:var(--white)}
.ph-prog{height:2px;background:var(--surface3);margin-bottom:20px;border-radius:2px;overflow:hidden}
.ph-prog-fill{height:100%;border-radius:2px;transition:width .4s ease;width:0}

/* ── TOPICS GRID ── */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-bottom:20px}

/* ── TOPIC CARD ── */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s,transform .15s}
.tc:hover{transform:translateY(-1px);border-color:var(--border2)}
.tc-top{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;gap:9px}
.tc-ico{font-size:16px;flex-shrink:0;margin-top:2px}
.tc-title{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;color:var(--white);margin-bottom:2px;line-height:1.3}
.tc-desc{font-size:11px;color:var(--text2);line-height:1.55}
.cl{padding:10px 14px;border-bottom:1px solid var(--border)}
.cl-label{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:7px}
.ci{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;cursor:pointer;padding:2px 0;transition:opacity .15s}
.ci:hover{opacity:.78}
.ci:last-child{margin-bottom:0}
.cb{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1.5px;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:7.5px;color:transparent;font-weight:900}
.ci.done .cb{border-color:transparent;color:var(--bg)}
.ci.done .ct{text-decoration:line-through;opacity:.3}
.ct{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text2);line-height:1.5}
.tc-res{padding:8px 14px;display:flex;gap:4px;flex-wrap:wrap}
.rc{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:2.5px 7px;border-radius:3px;display:inline-flex;align-items:center;gap:3px;font-weight:500;text-decoration:none;transition:opacity .2s;letter-spacing:.2px}
.rc:hover{opacity:.7}
.rc.book{background:#1a1208;color:#ffaa44;border:1px solid #2a1e0a}
.rc.online{background:#081a10;color:#44cc77;border:1px solid #0a2a16}
.rc.tool{background:#08101a;color:#44aaff;border:1px solid #0a1a2a}
.rc.video{background:#180818;color:#cc66ff;border:1px solid #280a28}
.rc.course{background:#1a0818;color:#ff66aa;border:1px solid #2a0a20}

/* ── PROJECT BOX ── */
.pb{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-top:6px}
.pb-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.pb-badge{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:var(--surface3);border:1px solid var(--border2)}
.pb-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white)}
.pb-body{padding:16px 18px}
.pb-desc{font-size:12.5px;color:var(--text2);line-height:1.75;margin-bottom:14px}
.pb-goals{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-bottom:14px}
.pb-goal{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text2);line-height:1.45;display:flex;gap:7px}
.pb-goal-ico{flex-shrink:0;font-size:12px}
.pb-cl-title{font-family:'JetBrains Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.pi{display:flex;align-items:flex-start;gap:9px;margin-bottom:6px;cursor:pointer}
.pi-box{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;font-weight:900}
.pi.done .pi-box{border-color:transparent;color:var(--bg)}
.pi.done .pi-text{opacity:.3;text-decoration:line-through}
.pi-text{font-size:12px;color:var(--text);line-height:1.5}

/* ── PHASE RESOURCES ── */
.ph-res{margin-top:14px;padding:14px 16px;border-radius:8px;background:rgba(255,255,255,.012);border:1px solid var(--border)}
.ph-res-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.ph-res-list{display:flex;flex-direction:column;gap:4px}
.ph-res-item{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.ph-res-item a{color:hsl(calc(var(--accent)+15),50%,62%);text-decoration:none;border-bottom:1px solid hsla(var(--accent),40%,50%,.18);transition:all .2s}
.ph-res-item a:hover{color:hsl(calc(var(--accent)+15),55%,72%);border-color:hsla(var(--accent),40%,50%,.45)}

/* ── TIPS ── */
.tips{margin:48px 0;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.tips-ey{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.tips-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);margin-bottom:24px;letter-spacing:-.3px}
.tips-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.tip{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.tip-ico{font-size:20px;margin-bottom:8px}
.tip h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:5px}
.tip p{font-size:11px;color:var(--text2);line-height:1.7}

/* ── NEXT STEPS ── */
.next{margin:0 0 48px;padding:32px;background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border2);border-radius:var(--radius);position:relative;overflow:hidden}
.next::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,hsla(var(--accent),80%,50%,.06),transparent 70%);pointer-events:none}
.next-ey{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.next-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);margin-bottom:8px;letter-spacing:-.3px}
.next-desc{font-size:12.5px;color:var(--text2);line-height:1.7;margin-bottom:20px;max-width:600px}
.next-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.next-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .2s,transform .15s}
.next-card:hover{border-color:var(--c-border);transform:translateY(-1px)}
.next-card-ico{font-size:22px;margin-bottom:8px}
.next-card h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px}
.next-card p{font-size:10.5px;color:var(--text2);line-height:1.65;margin-bottom:8px}
.next-card-tags{display:flex;gap:4px;flex-wrap:wrap}
.next-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;background:var(--c-surface);border:1px solid var(--c-border);color:var(--c)}

/* ── BOOKS ── */
.books{margin-bottom:48px}
.books-ey{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.books-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);letter-spacing:-.3px;margin-bottom:18px}
.books-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px}
.bk{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;gap:10px;transition:border-color .2s}
.bk:hover{border-color:var(--border2)}
.bk-spine{width:6px;height:50px;border-radius:2px;flex-shrink:0}
.bk-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px;line-height:1.25}
.bk-author{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:5px}
.bk-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;display:inline-block}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:32px 0;text-align:center}
footer p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}

/* ── ANIMS ── */
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.phase:nth-child(1){animation-delay:.03s}.phase:nth-child(2){animation-delay:.06s}.phase:nth-child(3){animation-delay:.09s}.phase:nth-child(4){animation-delay:.12s}.phase:nth-child(5){animation-delay:.15s}.phase:nth-child(6){animation-delay:.18s}.phase:nth-child(7){animation-delay:.21s}.phase:nth-child(8){animation-delay:.24s}.phase:nth-child(9){animation-delay:.27s}.phase:nth-child(10){animation-delay:.30s}.phase:nth-child(11){animation-delay:.33s}.phase:nth-child(12){animation-delay:.36s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#1a2040;border-radius:99px}
@media(max-width:640px){.tg{grid-template-columns:1fr}.pb-goals{grid-template-columns:1fr}.ph-inner{padding:12px 14px;gap:10px}.ph-badge{display:none}h1{font-size:34px!important}.stats{grid-template-columns:repeat(3,1fr)}.tab-prog-text{display:none}.tab-btn{padding:12px 14px;font-size:12px}.tips-g,.next-g{grid-template-columns:1fr}.books-g{grid-template-columns:1fr 1fr}}
</style>
</head>
<body data-tab="webdev">

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('webdev')">⚡ Full Stack WebDev</button>
  <div class="tab-sep"></div>
  <button class="tab-btn" onclick="switchTab('lowlevel')">🔧 Low-Level</button>
  <div class="tab-spacer"></div>
  <div class="tab-progress">
    <div class="tab-prog-ring">
      <svg viewBox="0 0 28 28"><circle class="bg" cx="14" cy="14" r="11"/><circle class="fg" id="progRing" cx="14" cy="14" r="11" stroke-dasharray="69.12" stroke-dashoffset="69.12"/></svg>
      <span class="tab-prog-pct" id="progPct">0%</span>
    </div>
    <span class="tab-prog-text" id="progText">0 / 0 itens</span>
  </div>
</div>

<div class="wrap">
  <div class="tab-content active" id="tab-webdev"></div>
  <div class="tab-content" id="tab-lowlevel"></div>
</div>

<script>

rchitecture + DDD", "desc": "Você vai construir um módulo de pedidos para e-commerce aplicando <strong>Clean Architecture e Domain-Driven Design do zero</strong> — sem framework de DI, só TypeScript puro. O desafio real é manter as camadas honestamente separadas: o domínio não conhece Express, o banco de dados não vaza para os Use Cases.<br><br>O teste definitivo é este: você vai conseguir trocar o repositório Prisma por um repositório em memória sem mudar uma linha do domínio? Se sim, acertou. Esse projeto é o que separa quem sabe o conceito de quem sabe aplicar.", "goals": [{"i": "🧱", "t": "Domain/Application/Infra completamente isolados — domínio não importa nada de fora"}, {"i": "🗺️", "t": "Pelo menos 3 Value Objects (Money, OrderStatus, Address) e 2 Aggregate Roots (Order, Customer)"}, {"i": "🔌", "t": "Swap de repositório: Prisma → InMemory sem alterar Use Cases (teste de isolamento)"}, {"i": "📄", "t": "ADR documentando decisões de arquitetura: por que essas camadas, por que esses objetos"}, {"i": "🧪", "t": "Cobertura ≥ 90% nos testes de domínio sem nenhuma dependência de infraestrutura"}], "dels": ["Estrutura de pastas demonstrando separação Domain / Application / Infrastructure / Presentation", "3+ Value Objects imutáveis com validação interna (Money com precisão decimal, Address com validação de CEP, OrderStatus como state machine)", "2+ Aggregate Roots com invariantes de negócio (Order não pode ter 0 itens, Customer não pode ter email inválido)", "Use Cases implementados com injeção de dependência via interface (não classe concreta)", "Domain Events publicados quando Order muda de status, consumidos por outro módulo", "Testes de domínio ≥ 90% cobertura usando repositório InMemory, sem banco, sem HTTP", "ADR (Architecture Decision Record) documentando as principais decisões do projeto"], "refs": [{"i": "📕", "l": "Clean Architecture — Robert C. Martin", "t": "book", "u": "https://www.amazon.com/Clean-Architecture-Craftsmans-Software-Structure/dp/0134494164"},  "Learn-C.org — tutorial interativo gratuito", "t": "online", "u": "https://www.learn-c.org/"}, {"i": "📖", "l": "K&R — The C Programming Language (Caps 1–4)", "t": "book"}, {"i": "🌐", "l": "Makefiletutorial.com — guia visual de Makefile", "t": "online", "u": "https://makefiletutorial.com/"}, {"i": "🔧", "l": "Compiler Explorer — ver Assembly gerado pelo seu C", "t": "tool", "u": "https://godbolt.org/"}], "tips": ["Comece pelo <strong>CS50x de Harvard</strong> (semanas 1-2). O ambiente facilita o primeiro contato antes de usar gcc diretamente.", "Para cada utilitário, escreva <strong>primeiro no papel</strong> o que a main() vai fazer. Implemente função por função, testando cada uma.", "O Makefile é essencial — não compile manualmente. Pesquise '<strong>Makefile tutorial</strong>' no makefiletutorial.com.", "Para a sessão GDB, <strong>introduza um bug de propósito</strong> (ex: off-by-one). Depois use break, next, print para encontrar. Documente."]}, "refs": [{"e": "🌐", "l": "CS50x — Harvard (gratuito)", "u": "https://cs50.harvard.edu/x/"}, {"e": "🌐", "l": "Learn-C.org — tutorial interativo", "u": "https://www.learn-c.org/"}, {"e": "📖", "l": "K&R — The C Programming Language", "u": "https://www.amazon.com/Programming-Language-2nd-Brian-Kernighan/dp/0131103628"}, {"e": "🌐", "l": "Makefiletutorial.com", "u": "https://makefiletutorial.com/"}]}, {"id": "ptrs", "label": "FASE 03", "short": "Ponteiros & Memória", "icon": "🎯", "dur": "4–6 semanas", "tag": "o grande salto", "color": "#39ff8f", "numBg": "#0a1a10", "numBd": "#1a3020", "title": "Ponteiros & Memória Dinâmica — Entendendo Endereços", "desc": "Aqui é o ponto onde C se diferencia de tudo que você conhece. <strong>Ponteiros não são difíceis — são diferentes.</strong> Nesta fase você vai aprender a usar ponteiros e malloc/free com confiança antes de fazer qualquer coisa avançada. O foco é construir intuição com projetos práticos, não com teoria abstrata.", "topics": [{"icon": "🎯", "title": "Ponteiros — Do Básico ao Confortável", "desc": "Endereços, dereferência, ponteiros para ponteiros, NULL, void*.", "checks": ["Entender o que é um endereço de memória e o operador & (address-of)", "Dereferência com * — acessar o valor apontado", "Ponteiros e arrays: por que arr[i] é *(arr + i)", "Ponteiros para ponteiros (**pp) — quando e por que usar", "NULL como valor especial — sempre checar antes de derreferenciar", "void* como ponteiro genérico — casting para tipo correto", "Aritmética de ponteiros: p++ avança sizeof(*p) bytes"], "res": [{"i": "📖", "l": "K&R C — Cap 5 (Ponteiros)", "t": "book"}, {"i": "🌐", "l": "cdecl.org — decodificar declarações", "t": "online", "u": "https://cdecl.org/"}, {"i": "🌐", "l": "C Pointer Tutorial — Programiz", "t": "online", "u": "https://www.programiz.com/c-programming/c-pointers"}]}, {"icon": "🗂️", "title": "Stack vs Heap — Memória Manual", "desc": "malloc, calloc, realloc, free. Stack frames automáticos vs heap explícito.", "checks": ["Entender stack: variáveis locais, automático, limitado (~8MB)", "Entender heap: malloc retorna ponteiro, você controla o lifetime", "malloc + free: alocar e liberar memória manualmente", "calloc: alocar e zerar memória (útil para arrays)", "realloc: expandir/encolher bloco existente sem perder dados", "Por que free não zera o ponteiro — setar para NULL depois de liberar", "Erros clássicos: use-after-free, double-free, memory leak"], "res": [{"i": "📖", "l": "Modern C — Cap 11 (Memory)", "t": "book", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"i": "🔧", "l": "Valgrind — detectar leaks", "t": "tool", "u": "https://valgrind.org/"}]}, {"icon": "📋", "title": "Structs com Ponteiros", "desc": "Structs alocadas no heap, linked structures, struct dentro de struct.", "checks": ["Alocar struct no heap com malloc e acessar com ->", "Struct que contém ponteiro para outro struct (linked)", "Passar struct por ponteiro para função (evitar cópia)", "Liberar struct com campos que também foram alocados (deep free)", "typedef struct Node { int val; struct Node *next; } — self-referencing"], "res": [{"i": "📖", "l": "K&R C — Cap 6 (Structures)", "t": "book"}]}, {"icon": "🔗", "title": "Linked List — Seu Primeiro Projeto de Memória", "desc": "Implementar linked list do zero: insert, delete, search, print, free.", "checks": ["Linked list singly: criar, inserir no início e no final", "Remover nó por valor — tratar caso de remover a head", "Buscar nó por valor e retornar ponteiro (ou NULL)", "Imprimir a lista inteira percorrendo com while(current != NULL)", "Liberar a lista inteira: percorrer e free cada nó", "Testar com Valgrind: zero leaks, zero errors após free_list()"], "res": [{"i": "🌐", "l": "Visualgo — Linked List", "t": "online", "u": "https://visualgo.net/en/list"}, {"i": "🔧", "l": "Valgrind", "t": "tool", "u": "https://valgrind.org/"}]}, {"icon": "📦", "title": "Dynamic Array (Vector)", "desc": "Array que cresce automaticamente com realloc — como o Array.push() do JS.", "checks": ["Struct com data (ponteiro), size (quantos itens) e capacity (quantos cabem)", "Push: se size == capacity, dobrar capacity com realloc", "Pop: retornar último elemento e decrementar size", "Get e Set por índice com bounds checking", "Free: liberar o array interno e a struct", "Entender amortized O(1) do push com doubling strategy"], "res": [{"i": "🌐", "l": "Dynamic Array — Wikipedia", "t": "online", "u": "https://en.wikipedia.org/wiki/Dynamic_array"}]}, {"icon": "🗃️", "title": "Hash Table — Estrutura Fundamental", "desc": "Implementar hash table com chaining ou open addressing.", "checks": ["Hash function simples para strings (djb2 ou FNV-1a)", "Resolução de colisão: chaining com linked list", "Operações: put, get, delete, contains", "Resize: quando load factor > 0.75, dobrar e rehash", "Liberar toda a tabela: percorrer buckets e free cada entry", "Testar com Valgrind: inserir 1000 items, deletar, free — zero leaks"], "res": [{"i": "🌐", "l": "Visualgo — Hash Table", "t": "online", "u": "https://visualgo.net/en/hashtable"}]}], "project": {"name": "c-collections — Biblioteca de Estruturas de Dados em C", "desc": "Você vai construir uma <strong>biblioteca de estruturas de dados genéricas em C</strong> — linked list, dynamic array, hash table e stack — todas usando ponteiros e malloc/free corretamente. O foco não é performance ou elegância, é <strong>confiança com memória manual</strong>.<br><br>Este é o projeto que vai transformar ponteiros de 'coisa assustadora' em 'ferramenta que eu uso naturalmente'. Cada estrutura segue o mesmo padrão: criar, usar, destruir — e Valgrind tem que mostrar <strong>zero leaks</strong> em todas.", "goals": [{"i": "🔗", "t": "Linked list genérica com void* — insert, delete, search, free"}, {"i": "📦", "t": "Dynamic array com realloc e doubling — push, pop, get, free"}, {"i": "🗃️", "t": "Hash table com chaining — put, get, delete, resize, free"}, {"i": "📚", "t": "Stack baseada em array — push, pop, peek, is_empty"}, {"i": "🧪", "t": "Zero leaks em TODAS as estruturas: Valgrind --leak-check=full"}], "dels": ["Linked list: insert_front, insert_back, remove, find, print, destroy — testada com 1000+ elementos", "Dynamic array: push, pop, get, set, resize — capacity dobra automaticamente", "Hash table: put, get, delete, contains, resize quando load > 0.75 — testada com colisões", "Stack: push, pop, peek, is_empty — testada com underflow e overflow", "Makefile com targets: build, test, valgrind (roda todos os testes com Valgrind)", "Valgrind limpo em TODOS os testes: zero definitely lost, zero indirectly lost", "README com diagrama de memória de cada estrutura (pode ser ASCII art)"], "tips": ["Comece pela <strong>linked list</strong> — é a estrutura mais simples que usa malloc/free e ponteiros. Se conseguir implementar linked list sem leaks, o resto é variação.", "Para tornar as estruturas <strong>genéricas</strong>, use <code>void*</code> para os dados. O usuário passa o dado como ponteiro e a lib armazena sem saber o tipo. Pesquise 'generic data structure in C void pointer'.", "Antes de implementar, <strong>desenhe a memória no papel</strong>. Desenhe os boxes (heap blocks) com setas (ponteiros) entre eles. Isso previne 80% dos bugs de ponteiro.", "Para o Makefile, adicione um target <code>valgrind</code>: <code>valgrind --leak-check=full --show-reachable=yes --error-exitcode=1 ./test</code>. Se der leak, o make falha.", "Teste <strong>edge cases</strong>: lista vazia, remover elemento que não existe, hash table com todas as chaves no mesmo bucket, stack vazia fazendo pop.", "Para a hash table, comece com <strong>chaining (linked list em cada bucket)</strong> — é mais fácil de debugar que open addressing. Depois, se quiser, implemente open addressing como bônus."], "refs": [{"i": "🌐", "l": "Visualgo — visualização de estruturas", "t": "online", "u": "https://visualgo.net/"}, {"i": "📖", "l": "K&R — Cap 5 e 6 (Ponteiros e Structs)", "t": "book"}, {"i": "🔧", "l": "Valgrind — ferramenta essencial de verificação", "t": "tool", "u": "https://valgrind.org/"}, {"i": "📖", "l": "Modern C — Jens Gustedt", "t": "book", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"i": "🌐", "l": "CS50 Week 5 — Data Structures", "t": "online", "u": "https://cs50.harvard.edu/x/"}]}, "refs": [{"e": "📖", "l": "K&R — The C Programming Language"}, {"e": "📖", "l": "Modern C — Gustedt", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"e": "🔧", "l": "Valgrind", "u": "https://valgrind.org/"}, {"e": "🌐", "l": "cdecl.org", "u": "https://cdecl.org/"}, {"e": "🌐", "l": "CS50 Week 5 — Data Structures", "u": "https://cs50.harvard.edu/x/"}]}, {"id": "c", "label": "FASE 04", "short": "C Avançado & Sistemas", "icon": "⚙️", "dur": "5–7 semanas", "tag": "pensar como o computador", "color": "#22d3ee", "numBg": "#08181e", "numBd": "#10282e", "title": "C Avançado — Representação, Toolchain & Alocação", "desc": "Agora que você está confortável com ponteiros e malloc, é hora de entender <strong>como dados são representados na memória</strong>, como o compilador transforma seu código em binário, e como o próprio malloc funciona por dentro. Esta fase é o que diferencia alguém que usa C de alguém que <strong>pensa em C</strong>.", "topics": [{"icon": "📐", "title": "Structs, Unions e Alinhamento", "desc": "Padding, alinhamento por tipo, bitfields, como dados são fisicamente organizados.", "checks": ["sizeof() para inspecionar padding entre campos", "Reordenar campos de struct para minimizar padding", "__attribute__((packed)) e quando NÃO usar", "Tagged union (enum + union) para tipos variantes", "Bitfields para flags compactas em protocolos"], "res": [{"i": "📖", "l": "Modern C — Cap 12", "t": "book"}]}, {"icon": "🔢", "title": "Representação de Dados — Bits e Bytes", "desc": "Two's complement, IEEE 754, endianness, bitwise operators.", "checks": ["Two's complement: como -1 é representado e por que overflow funciona assim", "IEEE 754 floats: por que 0.1 + 0.2 != 0.3 — inspecionar bits com union", "Endianness: big-endian vs little-endian — detectar em C", "Bitwise operators: AND, OR, XOR, NOT, shifts — usar para flags e masks", "Implementar set_bit, clear_bit, toggle_bit, check_bit", "Converter entre host byte order e network byte order (htonl, ntohl)"], "res": [{"i": "📖", "l": "CS:APP Cap 2", "t": "book"}, {"i": "🌐", "l": "float.exposed", "t": "online", "u": "https://float.exposed/"}]}, {"icon": "🔀", "title": "Function Pointers e Callbacks", "desc": "Ponteiros para funções, dispatch tables, polimorfismo em C, qsort.", "checks": ["Sintaxe de function pointer: int (*fn)(int, int)", "Usar qsort() com comparador customizado", "Dispatch table: array de function pointers para state machine", "Callbacks com void* para contexto genérico", "Implementar sistema pub/sub simples com function pointers"], "res": [{"i": "📖", "l": "K&R C — Cap 5.11", "t": "book"}, {"i": "🌐", "l": "cdecl.org", "t": "online", "u": "https://cdecl.org/"}]}, {"icon": "⚙️", "title": "Toolchain Completa: Preprocessador, Linker, ELF", "desc": "O processo completo: preprocessador → compilador → assembler → linker → binário ELF.", "checks": ["Preprocessador: #define, #ifdef, include guards, macros com argumentos", "Compilar com -E para ver saída do preprocessador", "Linking estático (.a) vs dinâmico (.so) — criar ambos", "Usar objdump -d e readelf para inspecionar binários", "Entender o formato ELF: headers, sections (.text, .data, .bss, .rodata)", "nm para listar símbolos e entender name mangling"], "res": [{"i": "🔧", "l": "gcc manpage", "t": "tool"}, {"i": "📖", "l": "CS:APP Cap 7 (Linking)", "t": "book", "u": "https://csapp.cs.cmu.edu/"}]}, {"icon": "🐛", "title": "Debugging Avançado: GDB, ASan, UBSan", "desc": "Breakpoints condicionais, watchpoints, sanitizers, debugging de produção.", "checks": ["GDB: breakpoints condicionais (break if count > 100)", "GDB: watchpoints para detectar quando variável muda valor", "GDB: backtrace em segfault — encontrar a linha exata", "AddressSanitizer (-fsanitize=address): detectar buffer overflow e use-after-free", "UndefinedBehaviorSanitizer (-fsanitize=undefined): detectar UB silencioso", "Valgrind --leak-check=full --track-origins=yes para leaks complexos"], "res": [{"i": "🔧", "l": "GDB docs", "t": "tool", "u": "https://sourceware.org/gdb/current/onlinedocs/gdb/"}, {"i": "🔧", "l": "ASan docs — Google", "t": "online", "u": "https://github.com/google/sanitizers/wiki/AddressSanitizer"}]}, {"icon": "🏗️", "title": "Projeto de Alocador: Preparação Conceitual", "desc": "Entender como malloc funciona antes de implementar: free list, headers, coalescing.", "checks": ["Entender sbrk() e mmap() — como o OS entrega memória ao processo", "Block header: metadados antes de cada bloco (size, is_free, ponteiros)", "Free list: lista ligada de blocos disponíveis", "Estratégias de busca: first-fit, best-fit, worst-fit — trade-offs", "Coalescing: mergear blocos livres adjacentes para evitar fragmentação", "Alinhamento: por que endereços devem ser múltiplos de 8 ou 16"], "res": [{"i": "📖", "l": "K&R — Cap 8.7 (Storage Allocator)", "t": "book"}, {"i": "🌐", "l": "glibc malloc internals", "t": "online", "u": "https://sourceware.org/glibc/wiki/MallocInternals"}]}], "project": {"name": "my_malloc — Alocador de Memória do Zero", "desc": "Você vai implementar <code>my_malloc()</code> e <code>my_free()</code> em C puro — o projeto que transforma conceitos abstratos em concreto. Depois de fazer isso, você vai olhar para <code>Buffer.alloc()</code> no Node.js e entender exatamente o que acontece por baixo.<br><br>A diferença crucial é que na fase anterior você <strong>usou</strong> malloc. Aqui você vai <strong>construir</strong> o malloc. A preparação conceitual no último tópico desta fase existe justamente para que você não comece do zero — você já vai saber o que é free list e coalescing antes de escrever a primeira linha.", "goals": [{"i": "📦", "t": "Header de bloco com size, flags de uso e ponteiros para next/prev"}, {"i": "🔗", "t": "Free list duplamente ligada com busca first-fit"}, {"i": "🔀", "t": "Coalescing de blocos livres adjacentes"}, {"i": "📏", "t": "Alinhamento de 16 bytes para todos os blocos"}, {"i": "🧪", "t": "Zero leaks e zero erros no Valgrind em stress test de 10.000 operações"}], "dels": ["my_malloc(size_t size): aloca bloco com header, retorna ponteiro alinhado a 16 bytes", "my_free(void *ptr): libera bloco, marca como livre, faz coalescing com vizinhos", "my_realloc(void *ptr, size_t new_size): expande in-place se possível, senão aloca novo + copia", "my_calloc(size_t n, size_t size): aloca e zera, detectando overflow em n*size", "Suite de testes com 10.000+ operações aleatórias — zero leaks no Valgrind", "README com diagrama explicando: formato do header, estrutura da free list, estratégia de coalescing"], "tips": ["Comece pelo <strong>K&R Capítulo 8.7</strong> que implementa um alocador simples. Leia, desenhe no papel, e depois escreva sua versão.", "A struct do header deve ser algo como: <code>struct block { size_t size; int free; struct block *next; struct block *prev; }</code>. Coloque-a <strong>antes</strong> de cada bloco retornado ao usuário.", "Comece com <strong>sbrk()</strong> para obter memória — é mais simples que mmap. Peça chunks grandes (ex: 4096 bytes) e subdivida internamente.", "Implemente first-fit primeiro (percorre a free list e retorna o primeiro bloco que cabe). Best-fit pode ficar como melhoria futura.", "O coalescing é a parte mais difícil. Quando free() é chamado, cheque: <strong>bloco anterior livre?</strong> Merge. <strong>Bloco seguinte livre?</strong> Merge. <strong>Ambos?</strong> Merge os três.", "Rode <code>valgrind --leak-check=full --show-reachable=yes</code> depois de CADA feature nova. Não acumule — é muito mais fácil debugar leak de 1 feature do que de 5."], "refs": [{"i": "📖", "l": "K&R — Cap 8.7 (storage allocator)", "t": "book"}, {"i": "🌐", "l": "Writing a Memory Allocator", "t": "online", "u": "https://dmitrynesteruk.com/programming/2022/10/20/writing-a-memory-allocator.html"}, {"i": "🌐", "l": "glibc malloc internals", "t": "online", "u": "https://sourceware.org/glibc/wiki/MallocInternals"}, {"i": "🔧", "l": "Valgrind", "t": "tool", "u": "https://valgrind.org/"}, {"i": "📖", "l": "CS:APP — Cap 9 (Virtual Memory)", "t": "book", "u": "https://csapp.cs.cmu.edu/"}]}, "refs": [{"e": "📖", "l": "K&R — The C Programming Language"}, {"e": "📖", "l": "Modern C — Gustedt", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"e": "📖", "l": "CS:APP", "u": "https://csapp.cs.cmu.edu/"}, {"e": "🔧", "l": "Valgrind", "u": "https://valgrind.org/"}, {"e": "🌐", "l": "float.exposed", "u": "https://float.exposed/"}]}, {"id": "asm", "label": "FASE 05", "short": "Assembly & CPU", "icon": "🧮", "dur": "6–8 semanas", "tag": "núcleo low-level", "color": "#3b9eff", "numBg": "#08122a", "numBd": "#10203a", "title": "Assembly, CPU e Performance", "desc": "Não é sobre escrever Assembly — é sobre <strong>ler o que o compilador gera</strong> e entender custos de abstrações. Compiler Explorer será sua ferramenta favorita.", "topics": [{"icon": "🧮", "title": "x86-64 Assembly", "desc": "Registradores, modos de endereçamento, instruções básicas.", "checks": ["16 registradores x86-64", "Hello World em NASM puro", "Loop for em ASM", "6 modos de endereçamento"], "res": [{"i": "🌐", "l": "nasm.us", "t": "online", "u": "https://www.nasm.us/"}]}, {"icon": "📚", "title": "Stack Frames e Calling Conv.", "desc": "System V AMD64 ABI, prologue/epilogue, red zone.", "checks": ["Stack frame completo no papel", "Função C chamada por ASM", "Recursão e stack overflow", "GDB: rbp/rsp durante call"], "res": [{"i": "📖", "l": "CS:APP Cap 3", "t": "book"}]}, {"icon": "🔬", "title": "Compiler Explorer", "desc": "ASM gerado, flags -O0 a -O3, inlining, auto-vectorization.", "checks": ["-O0 vs -O3 no Godbolt", "Loop unrolling", "SIMD auto-vectorization", "volatile para evitar otimizações"], "res": [{"i": "🌐", "l": "godbolt.org", "t": "online", "u": "https://godbolt.org/"}]}, {"icon": "⚡", "title": "Cache & CPU Internals", "desc": "L1/L2/L3, cache lines 64B, locality, prefetching, false sharing.", "checks": ["Medir latência L1/L2/RAM", "Row vs column major benchmark", "False sharing em structs", "perf stat cache-misses"], "res": [{"i": "📖", "l": "What Every Programmer Should Know About Memory", "t": "book", "u": "https://people.freebsd.org/~lstewart/articles/cpumemory.pdf"}]}, {"icon": "🚀", "title": "Pipeline e Branch Prediction", "desc": "Out-of-order execution, speculative, branchless programming.", "checks": ["Com e sem branch + perf", "max(a,b) branchless com CMOV", "Spectre em alto nível"], "res": [{"i": "📖", "l": "Agner Fog Microarchitecture", "t": "book", "u": "https://www.agner.org/optimize/"}]}, {"icon": "🛡️", "title": "SIMD — SSE/AVX", "desc": "XMM (128-bit), YMM (256-bit), operações vetoriais.", "checks": ["_mm_add_ps para 4 floats", "Dot product scalar vs SIMD", "Alinhamento para SIMD"], "res": [{"i": "🌐", "l": "Intel Intrinsics Guide", "t": "online", "u": "https://www.intel.com/content/www/us/en/docs/intrinsics-guide/index.html"}]}, {"icon": "🔓", "title": "Segurança de Memória", "desc": "Buffer overflows, stack canaries, ASLR, DEP/NX.", "checks": ["Buffer overflow simples (ASLR off)", "Stack canaries", "ASLR com /proc/self/maps", "-fno-stack-protector e comparar"], "res": [{"i": "🌐", "l": "overthewire.org", "t": "online", "u": "https://overthewire.org/wargames/"}]}], "project": {"name": "perf-profiler — Framework de Microbenchmark com Análise de Cache", "desc": "Você vai construir um <strong>framework de microbenchmark em C</strong> usando o contador de ciclos RDTSC (Read Time-Stamp Counter) do processador para medir operações com precisão de nanosegundos — e então usar esse framework para provar empiricamente como cache misses destroem performance.<br><br>O insight central: uma operação que leva 1ns com L1 cache hit pode levar 200ns com RAM access. Esse projeto é onde você transforma o conhecimento teórico de cache lines e memory locality em números reais que você mediu na sua máquina.", "goals": [{"i": "⏱", "t": "Timer RDTSC calibrado: overhead medido, warmup de cache antes de cada benchmark"}, {"i": "📊", "t": "Output CSV + script Python/gnuplot para gerar gráficos automaticamente"}, {"i": "🔬", "t": "Verificação com perf stat: cache-misses, branch-misses, IPC por benchmark"}, {"i": "🧮", "t": "Benchmark SIMD: dot product scalar vs SSE/AVX com speedup documentado"}, {"i": "📝", "t": "Análise escrita explicando cada resultado com base em latências de cache (L1/L2/L3/RAM)"}], "dels": ["Timer de alta precisão com RDTSC: serialização com CPUID, calibração contra clock_gettime, overhead medido", "Benchmark 1 — Memory Access Patterns: array traversal row-major vs column-major (NxN matrix), medindo latência por acesso", "Benchmark 2 — Sorting: insertion sort vs merge sort vs qsort para arrays de 100, 1k, 10k, 100k elementos", "Benchmark 3 — Struct Layout: comparar struct com padding vs packed, demonstrando custo de misalignment", "Benchmark 4 — Scalar vs SIMD: soma de 1 milhão de floats com loop vs _mm256_add_ps (AVX)", "Output CSV com: nome do benchmark, N, ciclos_min, ciclos_median, ciclos_p99, cache_misses (via perf_event)", "Análise em Markdown: cada resultado explicado com base nas latências teóricas de cache (L1=4cy, L2=12cy, L3=40cy, RAM=200cy)"], "refs": [{"i": "📖", "l": "What Every Programmer Should Know About Memory — Drepper", "t": "online", "u": "https://people.freebsd.org/~lstewart/articles/cpumemory.pdf"}, {"i": "🌐", "l": "Compiler Explorer — godbolt.org", "t": "online", "u": "https://godbolt.org/"}, {"i": "📖", "l": "Agner Fog — Optimizing Software in C++", "t": "online", "u": "https://www.agner.org/optimize/"}, {"i": "🌐", "l": "Intel Intrinsics Guide — referência SIMD", "t": "online", "u": "https://www.intel.com/content/www/us/en/docs/intrinsics-guide/index.html"}, {"i": "📖", "l": "CS:APP — Cap 5 (Optimizing Program Performance)", "t": "book", "u": "https://csapp.cs.cmu.edu/"}], "tips": ["Não tente escrever Assembly complexo. O objetivo é <strong>ler</strong>. Use <strong>godbolt.org</strong> para escrever C e ver o ASM lado a lado.", "Para o benchmark de cache, comece com <strong>array de 100MB</strong> e itere de formas diferentes: sequencial, stride 64B, stride 4096B, aleatório.", "Para SIMD, use a <strong>Intel Intrinsics Guide</strong>. Comece com <code>_mm_add_ps</code>. A versão SIMD deve ser ~4x mais rápida que o loop.", "O script Python para gráficos pode ser simples: leia o CSV, gere barras com matplotlib. 10 linhas são suficientes."]}, "refs": [{"e": "📖", "l": "CS:APP", "u": "https://csapp.cs.cmu.edu/"}, {"e": "🌐", "l": "Compiler Explorer", "u": "https://godbolt.org/"}, {"e": "📖", "l": "Agner Fog Optimization", "u": "https://www.agner.org/optimize/"}, {"e": "🌐", "l": "Intel Intrinsics", "u": "https://www.intel.com/content/www/us/en/docs/intrinsics-guide/index.html"}]}, {"id": "os", "label": "FASE 06", "short": "Sistemas Operacionais", "icon": "🐧", "dur": "7–9 semanas", "tag": "conecta com Node.js", "color": "#ff6b35", "numBg": "#1a0e08", "numBd": "#2a1808", "title": "Sistemas Operacionais — O Kernel por Baixo do Node.js", "desc": "Todo <code>fs.readFile()</code>, todo <code>net.createServer()</code> faz uma syscall. Você vai entender <strong>exatamente</strong> como o event loop funciona — as syscalls por baixo.", "topics": [{"icon": "🐧", "title": "Syscalls Linux", "desc": "User space → kernel, strace, as 10 syscalls mais comuns.", "checks": ["strace em node app.js", "Syscall diretamente em assembly", "Número de syscall no rax", "/proc/PID/maps de processo Node"], "res": [{"i": "📖", "l": "TLPI Cap 3-4", "t": "book"}, {"i": "🔧", "l": "strace", "t": "tool"}]}, {"icon": "🧵", "title": "Processos e Threads", "desc": "fork/exec/wait, pthreads, mutexes, por que Node é single-threaded.", "checks": ["Produtor-consumidor pthreads", "Introduzir e detectar race condition", "Zombie process", "Thread pool básico em C", "Helgrind para data races"], "res": [{"i": "📖", "l": "OSTEP Part 2", "t": "book", "u": "https://pages.cs.wisc.edu/~remzi/OSTEP/"}]}, {"icon": "💾", "title": "Memória Virtual", "desc": "Páginas 4KB, TLB, CoW, mmap, hugetlbfs.", "checks": ["mmap() para memory-map arquivo", "/proc/PID/smaps", "IPC via mmap compartilhado", "mlock() e por que Redis usa"], "res": [{"i": "📖", "l": "OSTEP Cap 13-23", "t": "book", "u": "https://pages.cs.wisc.edu/~remzi/OSTEP/"}]}, {"icon": "🌐", "title": "I/O Assíncrono: select→poll→epoll", "desc": "Evolução do I/O multiplexing. Como libuv usa epoll.", "checks": ["Echo server com select()", "Reescrever com epoll", "O(n) select vs O(1) epoll", "Ler libuv source (uv__io_poll)"], "res": [{"i": "🌐", "l": "libuv source", "t": "online", "u": "https://github.com/libuv/libuv"}]}, {"icon": "📡", "title": "Signals, Pipes e IPC", "desc": "SIGTERM, SIGKILL, pipes, Unix domain sockets, shared memory.", "checks": ["Graceful shutdown SIGTERM", "Pipe pai → filho", "Unix domain socket", "Shared memory + semáforos"], "res": [{"i": "📖", "l": "TLPI Cap 44-48", "t": "book"}]}, {"icon": "📁", "title": "Filesystems e VFS", "desc": "Inodes, journaling, fsync, /proc, /sys.", "checks": ["stat() para metadados", "rename() é atômico", "inotify para monitorar mudanças", "File descriptor table"], "res": [{"i": "📖", "l": "TLPI Cap 4-5", "t": "book"}]}, {"icon": "💫", "title": "io_uring e Containers", "desc": "I/O moderno: SQ/CQ ring buffers. Containers: namespaces e cgroups.", "checks": ["Arquivo com io_uring + liburing", "Modelo SQ/CQ e zero syscalls", "Namespace PID com unshare", "Mini-container em C com clone()", "Inspecionar namespaces Docker"], "res": [{"i": "🌐", "l": "Lord of the io_uring", "t": "online", "u": "https://unixism.net/loti/"}, {"i": "▶", "l": "Liz Rice — Containers From Scratch", "t": "video", "u": "https://www.youtube.com/watch?v=8fi7uSYlOdc"}]}], "project": {"name": "mini-eventloop — Event Loop em C Inspirado no libuv", "desc": "Você vai construir um <strong>event loop em C</strong> usando epoll — o mesmo mecanismo que o libuv usa por baixo do Node.js. O objetivo não é criar uma biblioteca de produção, mas ter o momento de clareza onde você olha para o Node.js e pensa: <em>'Ah, é exatamente isso que está acontecendo quando chamo fs.readFile().'</em><br><br>Ao final, você vai poder abrir o código fonte do libuv e entender linha por linha o que está acontecendo em <code>uv__io_poll()</code>. Esse é o aha moment da fase de sistemas operacionais.", "goals": [{"i": "🔄", "t": "Loop principal com epoll_wait() tratando eventos de I/O, timers e tasks"}, {"i": "🌐", "t": "Echo server TCP suportando 100+ conexões simultâneas sem threads"}, {"i": "⏰", "t": "Timer com min-heap: setTimeout e setInterval com precisão de ±5ms"}, {"i": "🧵", "t": "Thread pool com pthreads para operações bloqueantes (como fs.readFile do Node.js)"}, {"i": "📋", "t": "Diagrama mapeando cada parte do seu código para a fase correspondente do libuv"}], "dels": ["Loop principal: epoll_wait() como núcleo, com wakeup pipe para acordar de fora da thread principal", "TCP echo server não-bloqueante: aceita conexões, lê/escreve de forma assíncrona, suporta 100+ clientes simultâneos", "Timer system com min-heap: registrar timers, disparar callbacks ordenados por tempo, recalcular timeout do epoll", "Thread pool com fila de tarefas: enviar trabalho bloqueante para thread pool e receber resultado via callback no loop principal", "HTTP parser básico integrado: parsear método e path, responder com arquivo estático de /public/", "Diagrama visual (ASCII ou draw.io) mapeando: uv__io_poll → epoll_wait, uv_timer_t → min-heap, uv__work → thread pool"], "refs": [{"i": "🌐", "l": "libuv source code — github.com/libuv/libuv", "t": "online", "u": "https://github.com/libuv/libuv"}, {"i": "📖", "l": "OSTEP — Operating Systems: 3 Easy Pieces (gratuito)", "t": "online", "u": "https://pages.cs.wisc.edu/~remzi/OSTEP/"}, {"i": "📖", "l": "The Linux Programming Interface — Michael Kerrisk", "t": "book", "u": "https://man7.org/tlpi/"}, {"i": "🌐", "l": "Lord of the io_uring — io_uring tutorial", "t": "online", "u": "https://unixism.net/loti/"}, {"i": "▶", "l": "Liz Rice — Containers From Scratch (YouTube)", "t": "video", "u": "https://www.youtube.com/watch?v=8fi7uSYlOdc"}], "tips": ["Comece pelo <strong>echo server com select()</strong> — é o mais simples. Depois reescreva com epoll e compare o código.", "Para o timer, pesquise '<strong>min-heap in C</strong>'. O epoll_wait aceita timeout — use o próximo timer para calcular quanto esperar.", "O thread pool precisa de: <strong>array de pthreads</strong>, <strong>fila com mutex</strong>, <strong>condition variable</strong>. Pesquise 'C thread pool implementation'.", "O diagrama de mapeamento para libuv é o entregável mais importante. Abra o <strong>source do libuv</strong> e encontre: uv__io_poll, uv_timer_t, uv__work."]}, "refs": [{"e": "📖", "l": "TLPI — Kerrisk", "u": "https://man7.org/tlpi/"}, {"e": "📖", "l": "OSTEP (gratuito)", "u": "https://pages.cs.wisc.edu/~remzi/OSTEP/"}, {"e": "🌐", "l": "libuv source", "u": "https://github.com/libuv/libuv"}, {"e": "🌐", "l": "Lord of the io_uring", "u": "https://unixism.net/loti/"}]}, {"id": "net", "label": "FASE 07", "short": "Redes & Protocolos", "icon": "🔌", "dur": "5–7 semanas", "tag": "do socket ao HTTP", "color": "#bf5fff", "numBg": "#160a22", "numBd": "#241030", "title": "Redes de Computadores e Protocolos", "desc": "O que acontece quando <code>fetch()</code> é chamado — desde <code>connect()</code> até TCP handshake, HTTP request e keep-alive.", "topics": [{"icon": "🔌", "title": "Sockets BSD", "desc": "TCP e UDP, options, Wireshark.", "checks": ["Echo server TCP em C", "Cliente/servidor UDP", "Wireshark para pacotes", "TIME_WAIT e SO_REUSEADDR"], "res": [{"i": "📖", "l": "Beej's Guide", "t": "online", "u": "https://beej.us/guide/bgnet/"}]}, {"icon": "🤝", "title": "TCP Internals", "desc": "Handshake, sliding window, congestion control.", "checks": ["TCP handshake no Wireshark", "MSS e window size", "TCP_NODELAY no Node.js", "Packet loss e retransmissão"], "res": [{"i": "📖", "l": "TCP/IP Illustrated", "t": "book"}]}, {"icon": "🌐", "title": "HTTP/1.1, HTTP/2, HTTP/3", "desc": "Parser HTTP, keep-alive, multiplexing, QUIC.", "checks": ["Parser HTTP/1.1 em C", "Arquivo estático sem lib", "HTTP/2 vs head-of-line blocking", "HTTP/3 QUIC: 0-RTT, no HOL"], "res": [{"i": "📖", "l": "HTTP/3 Explained", "t": "online", "u": "https://http3-explained.haxx.se/"}]}, {"icon": "🔐", "title": "TLS/SSL", "desc": "TLS 1.3, certificados, PKI, OpenSSL.", "checks": ["TLS handshake no Wireshark", "CA + certificado com openssl", "TLS no servidor TCP"], "res": [{"i": "📖", "l": "Bulletproof TLS", "t": "book"}]}, {"icon": "📦", "title": "DNS e Camadas", "desc": "Resolver, ARP, OSI, roteamento IP.", "checks": ["DNS resolver UDP em C", "dig/nslookup", "ARP com tcpdump"], "res": [{"i": "📖", "l": "Computer Networks (Tanenbaum)", "t": "book"}]}, {"icon": "🔃", "title": "WebSocket e Zero-Copy", "desc": "Handshake, framing, sendfile, splice.", "checks": ["WebSocket handshake em C", "Parsear frames WS", "sendfile vs read+write", "splice entre FDs"], "res": [{"i": "🌐", "l": "RFC 6455", "t": "online", "u": "https://datatracker.ietf.org/doc/html/rfc6455"}]}], "project": {"name": "http-server — Servidor HTTP/1.1 em C do Zero com sockets e epoll", "desc": "Você vai construir um <strong>servidor HTTP/1.1 completo em C</strong> usando apenas sockets BSD e epoll — sem nenhuma biblioteca de terceiros. Nada de libevent, libuv ou libmicrohttpd. O objetivo é entender exatamente o que acontece em cada byte que trafega entre cliente e servidor.<br><br>Ao final, você vai conseguir ver no Wireshark o TCP handshake, o HTTP request em texto puro, o keep-alive mantendo a conexão, e entender por que o Node.js consegue lidar com tantas conexões simultâneas sem threads.", "goals": [{"i": "📝", "t": "Parser HTTP/1.1: método, path, versão, headers, body — sem biblioteca"}, {"i": "📁", "t": "Serving de arquivos estáticos com Content-Type correto (HTML, CSS, JS, PNG, JSON)"}, {"i": "🔄", "t": "Keep-alive: reutilização de conexão TCP visível no Wireshark"}, {"i": "🚦", "t": ">10.000 req/s medidos com wrk em arquivo pequeno (conexões múltiplas)"}, {"i": "⚡", "t": "Modo epoll para I/O multiplexing: 100+ conexões simultâneas sem threads"}], "dels": ["Socket TCP não-bloqueante com epoll: aceitar e manter 100+ conexões simultâneas em thread única", "Parser HTTP/1.1 do zero: parsear request-line, headers (case-insensitive), body com Content-Length", "Serving de arquivos estáticos com mmap() para zero-copy e Content-Type inferido por extensão", "Keep-alive com Connection: keep-alive e timeout de conexão ociosa", "Respostas corretas: 200 OK, 301 Redirect, 400 Bad Request, 404 Not Found, 500 Internal Server Error", "Benchmark com wrk: documentar req/s, latência p50/p99 com 10/100/1000 conexões simultâneas", "Capture Wireshark mostrando TCP handshake + HTTP request/response + keep-alive em uma conexão"], "refs": [{"i": "📖", "l": "Beej's Guide to Network Programming", "t": "online", "u": "https://beej.us/guide/bgnet/"}, {"i": "📖", "l": "HTTP/1.1 RFC 9112 — especificação oficial", "t": "online", "u": "https://www.rfc-editor.org/rfc/rfc9112"}, {"i": "🔧", "l": "Wireshark — analisar pacotes de rede", "t": "tool", "u": "https://www.wireshark.org/"}, {"i": "🔧", "l": "wrk — benchmark de HTTP", "t": "tool", "u": "https://github.com/wg/wrk"}, {"i": "🌐", "l": "RFC 6455 — WebSocket Protocol", "t": "online", "u": "https://datatracker.ietf.org/doc/html/rfc6455"}], "tips": ["Comece com <strong>Beej's Guide</strong> — melhor recurso para sockets BSD. Siga os exemplos do capítulo 6.", "Para o parser HTTP, leia a <strong>RFC 9112</strong>. Parseie: request-line, headers até \\r\\n\\r\\n.", "Use <strong>mmap()</strong> para servir arquivos — zero-copy, muito mais rápido que read()+write().", "Instale <strong>wrk</strong> para benchmark: <code>wrk -t4 -c100 -d10s http://localhost:8080/</code>. Documente com 10, 100, 1000 conexões.", "Para o Wireshark, use filtro <code>tcp.port == 8080</code>. Procure SYN→SYN-ACK→ACK e o HTTP request em texto puro."]}, "refs": [{"e": "📖", "l": "Beej's Guide to Network Programming", "u": "https://beej.us/guide/bgnet/"}, {"e": "📖", "l": "HTTP/3 Explained", "u": "https://http3-explained.haxx.se/"}, {"e": "🌐", "l": "RFC 6455 — WebSocket", "u": "https://datatracker.ietf.org/doc/html/rfc6455"}, {"e": "🔧", "l": "Wireshark", "u": "https://www.wireshark.org/"}]}, {"id": "cpp", "label": "FASE 08", "short": "C++ Moderno", "icon": "⚙️", "dur": "8–10 semanas", "tag": "ponte para sistemas", "color": "#00d4ff", "numBg": "#08181e", "numBd": "#10282e", "title": "C++ Moderno — Performance com Abstração", "desc": "C++ do V8, Chrome e LLVM. Seu TypeScript faz <strong>muito mais sentido</strong> quando você entender RAII e ownership.", "topics": [{"icon": "🧠", "title": "RAII e Smart Pointers", "desc": "Construtores/destrutores, Rule of Five, unique_ptr, shared_ptr, move semantics.", "checks": ["RAII para file descriptor", "Rule of Five completa", "Substituir new/delete por smart pointers", "Move constructor zero-cost no Godbolt", "weak_ptr para evitar cycles"], "res": [{"i": "📖", "l": "Effective Modern C++", "t": "book"}, {"i": "🌐", "l": "godbolt.org", "t": "online", "u": "https://godbolt.org/"}]}, {"icon": "📦", "title": "Templates e STL", "desc": "Function/class templates, concepts, vector/map internals, iterators.", "checks": ["Hashmap com open addressing", "Template com concepts C++20", "Range-based for customizado", "Por que push_back invalida iterators"], "res": [{"i": "▶", "l": "CppCon talks", "t": "video", "u": "https://www.youtube.com/c/CppCon"}]}, {"icon": "⚙️", "title": "Concorrência e Memory Model", "desc": "std::thread, atomic, memory ordering, lock-free, coroutines.", "checks": ["Spin lock com atomic_flag", "Lock-free queue SPSC", "Relaxed ordering perigoso", "Generator com co_yield (C++20)", "constexpr e compile-time computation"], "res": [{"i": "📖", "l": "C++ Concurrency in Action", "t": "book"}]}, {"icon": "🔗", "title": "Node.js Native Addons", "desc": "N-API, binding JS↔C++, custom allocators.", "checks": ["Addon que expõe função para Node.js", "Tipos complexos JS ↔ C++", "Benchmark addon vs JS puro", "Pool allocator para objetos fixos", "Arena allocator com bump pointer"], "res": [{"i": "🌐", "l": "N-API docs", "t": "online", "u": "https://nodejs.org/api/n-api.html"}]}, {"icon": "🚨", "title": "Error Handling e Build Systems", "desc": "Exceptions vs error codes, RAII para cleanup, CMake como build system moderno.", "checks": ["Exceptions: try/catch, noexcept, RAII para cleanup garantido", "Error codes vs exceptions — quando usar cada abordagem", "std::expected (C++23) ou Result pattern em C++", "CMake básico: CMakeLists.txt, targets, link libraries", "CMake: find_package, FetchContent para dependências externas"], "res": [{"i": "🌐", "l": "CMake Tutorial", "t": "online", "u": "https://cmake.org/cmake/help/latest/guide/tutorial/"}]}], "project": {"name": "node-lz4 — Native Addon de Compressão LZ4 para Node.js", "desc": "Você vai criar um <strong>módulo nativo para Node.js</strong> que expõe compressão/descompressão LZ4 via N-API (Node.js API estável), integrando código C++ de performance com o mundo JavaScript.<br><br>Esse projeto representa a ponte entre os dois mundos que você estudou. A API JavaScript é ergonômica (Promise-based, TypeScript types), mas por baixo roda C++ puro com controle total de memória. Você vai entender por que módulos como <code>sharp</code>, <code>bcrypt</code> e <code>@serialport/bindings-cpp</code> existem — e quando faz sentido criar o seu.", "goals": [{"i": "🔧", "t": "Binding C++ via N-API: compress/decompress síncronos expondo Buffer JS → Buffer C++"}, {"i": "⚡", "t": "API assíncrona com AsyncWorker: não bloqueia o event loop durante compressão"}, {"i": "📊", "t": "Benchmark documentado: addon vs zlib nativo vs implementação JS pura (lz4js)"}, {"i": "📦", "t": "npm-ready com prebuilds para Linux/macOS/Windows via node-pre-gyp"}, {"i": "🧪", "t": "Testes cobrindo: round-trip (compress → decompress), dados corrompidos, buffers vazios"}], "dels": ["lz4_compress e lz4_decompress síncronos: aceitar Buffer JS, retornar Buffer JS com dados comprimidos/descomprimidos", "lz4CompressAsync e lz4DecompressAsync com AsyncWorker: retornar Promise, processar em thread pool sem bloquear event loop", "Binding correto de tipos: Node.js Buffer → C++ uint8_t*, tamanho, verificação de limites de buffer", "Tratamento de erros: dados inválidos para decompress, buffer de saída insuficiente — erros propagados como exceções JS", "Benchmark comparando: addon C++ vs zlib (Node built-in) vs lz4js (pure JS) para arquivos de 1KB, 100KB, 10MB", "TypeScript definitions (.d.ts) para a API pública do addon", "Testes unitários com Vitest/Jest cobrindo casos normais e de erro"], "refs": [{"i": "📖", "l": "N-API — Node.js Native Addons docs", "t": "online", "u": "https://nodejs.org/api/n-api.html"}, {"i": "🌐", "l": "node-addon-api function totalItems(t){const d=TABS[t];return d.phases.reduce((s,p)=>s+p.topics.reduce((ss,tp)=>ss+tp.checks.length,0)+(p.project?.dels?.length||0),0);}
function doneItems(t){return Object.values(state[t]).filter(Boolean).length;}
function phTotal(t,pid){const p=TABS[t].phases.find(x=>x.id===pid);return p.topics.reduce((s,tp)=>s+tp.checks.length,0)+(p.project?.dels?.length||0);}
function phDone(t,pid){let c=0;for(const k in state[t])if(state[t][k]&&k.startsWith(pid+'-'))c++;return c;}

function updateGlobal(){const t=totalItems(activeTab),d=doneItems(activeTab),pct=t?Math.round(d/t*100):0;const circ=69.12;document.getElementById('progRing').style.strokeDashoffset=circ-(circ*pct/100);document.getElementById('progPct').textContent=pct+'%';document.getElementById('progText').textContent=d+' / '+t+' itens';}
function updatePhase(tab,pid){const d=phDone(tab,pid),t=phTotal(tab,pid),pct=t?Math.round(d/t*100):0;const pf=document.getElementById(tab+'-pf-'+pid);if(pf)pf.style.width=pct+'%';const pp=document.getElementById(tab+'-ppct-'+pid);if(pp){pp.textContent=pct+'%';pp.classList.toggle('done',pct===100);}const pc=document.getElementById(tab+'-pcnt-'+pid);if(pc)pc.textContent=d+'/'+t;}

function toggle(tab,key,el){state[tab][key]=!state[tab][key];el.classList.toggle('done',state[tab][key]);const box=el.querySelector('.cb,.pi-box');if(box){const phase=el.closest('.phase');box.style.background=state[tab][key]?(phase?phase.dataset.color:'var(--c)'):'';};updatePhase(tab,key.split('-')[0]);updateGlobal();saveState(tab);}
function saveState(t){try{localStorage.setItem(TABS[t].storageKey,JSON.stringify(state[t]));}catch(e){}}
function loadState(t){try{const s=localStorage.getItem(TABS[t].storageKey);if(s)Object.assign(state[t],JSON.parse(s));}catch(e){}}

function phaseIsOpen(tab,phaseId,isFirst){
try{var s=localStorage.getItem('rm_exp_'+tab);if(s){var m=JSON.parse(s);return m.hasOwnProperty(phaseId)?!!m[phaseId]:false;}}catch(e){}
return isFirst;
}
function persistExpand(){
['webdev','lowlevel'].forEach(function(tab){
var el=document.getElementById('tab-'+tab);if(!el)return;
var m={};el.querySelectorAll('.phase').forEach(function(p){
var pid=p.id.replace(tab+'-','');
if(p.classList.contains('open'))m[pid]=1;else m[pid]=0;
});
try{localStorage.setItem('rm_exp_'+tab,JSON.stringify(m));}catch(e){}
});
}
function renderTab(tab,cid){
const D=TABS[tab];const root=document.getElementById(cid);loadState(tab);
let h='<div class="hero"><div class="hero-eyebrow">'+D.eyebrow+'</div><h1>'+D.h1+'<br><em>'+D.h1em+'</em></h1><p class="hero-desc">'+D.desc+'</p></div>';
h+='<div class="stats"><div class="stat-cell"><div class="stat-val">'+D.phases.length+'</div><div class="stat-lbl">Fases</div></div><div class="stat-cell"><div class="stat-val">'+D.totalMonths+'</div><div class="stat-lbl">Estimativa</div></div><div class="stat-cell"><div class="stat-val">'+D.dailyHours+'</div><div class="stat-lbl">Por dia</div></div><div class="stat-cell"><div class="stat-val">'+totalItems(tab)+'</div><div class="stat-lbl">Itens</div></div></div>';
h+='<div class="nav">'+D.phases.map((p,i)=>'<a href="#'+tab+'-'+p.id+'">'+(i<9?'0':'')+(i+1)+' · '+p.short+'</a>').join('')+'</div>';
D.phases.forEach((phase,pi)=>{
h+='<div class="phase'+(phaseIsOpen(tab,phase.id,pi===0)?' open':'')+'" id="'+tab+'-'+phase.id+'" data-color="'+phase.color+'">';
h+='<div class="ph-head" ><div class="ph-bar" style="background:'+phase.color+'"></div><div class="ph-inner"><div class="ph-badge" style="background:'+phase.numBg+';color:'+phase.color+';border:1px solid '+phase.numBd+'">'+phase.label+'</div><div class="ph-icon">'+phase.icon+'</div><div class="ph-meta"><div class="ph-title">'+phase.title+'</div><div class="ph-sub"><span>⏱ '+phase.dur+'</span><span>📍 '+phase.tag+'</span></div></div><div class="ph-right"><div class="ph-pct" id="'+tab+'-ppct-'+phase.id+'">0%</div><div class="ph-cnt" id="'+tab+'-pcnt-'+phase.id+'">0/0</div></div><div class="ph-toggle">▼</div></div></div>';
h+='<div class="ph-body"><div class="ph-desc" style="border-left-color:'+phase.color+'">'+phase.desc+'</div>';
h+='<div class="ph-prog"><div class="ph-prog-fill" id="'+tab+'-pf-'+phase.id+'" style="background:'+phase.color+'"></div></div>';
h+='<div class="tg">';
phase.topics.forEach((tp,ti)=>{
h+='<div class="tc" style="border-top:2px solid '+phase.color+'"><div class="tc-top"><div class="tc-ico">'+tp.icon+'</div><div><div class="tc-title">'+tp.title+'</div><div class="tc-desc">'+tp.desc+'</div></div></div><div class="cl"><div class="cl-label">checklist</div>';
tp.checks.forEach((c,ci)=>{const key=phase.id+'-'+ti+'-'+ci;const dn=state[tab][key]?' done':'';h+='<div class="ci'+dn+'" data-key="'+key+'" data-tab="'+tab+'" data-ck="'+key+'"><div class="cb"'+(dn?' style="background:'+phase.color+'"':'')+'>✓</div><span class="ct">'+c+'</span></div>';});
h+='</div>';
if(tp.res?.length){h+='<div class="tc-res">';tp.res.forEach(r=>{h+=r.u?'<a class="rc '+r.t+'" href="'+r.u+'" target="_blank" rel="noopener">'+r.i+' '+r.l+'</a>':'<span class="rc '+r.t+'">'+r.i+' '+r.l+'</span>';});h+='</div>';}
h+='</div>';});
h+='</div>';
if(phase.project){const pr=phase.project;h+='<div class="pb" style="border-top:2px solid '+phase.color+'"><div class="pb-head"><div class="pb-badge" style="color:'+phase.color+'">🏗️ PROJETO</div><div class="pb-title">'+pr.name+'</div></div><div class="pb-body"><div class="pb-desc">'+pr.desc+'</div>';
if(pr.goals?.length){h+='<div class="pb-goals">'+pr.goals.map(g=>'<div class="pb-goal"><span class="pb-goal-ico">'+g.i+'</span>'+g.t+'</div>').join('')+'</div>';}
h+='<div class="pb-cl-title">entregas</div>';
(pr.dels||[]).forEach((d,di)=>{const key=phase.id+'-proj-'+di;const dn=state[tab][key]?' done':'';h+='<div class="pi'+dn+'" data-key="'+key+'" data-tab="'+tab+'" data-ck="'+key+'"><div class="pi-box"'+(dn?' style="background:'+phase.color+'"':'')+'>✓</div><span class="pi-text">'+d+'</span></div>';});
h+='</div></div>';}
if(phase.refs?.length){h+='<div class="ph-res"><div class="ph-res-lbl">📚 Referências</div><div class="ph-res-list">'+phase.refs.map(r=>'<div class="ph-res-item"><span>'+r.e+'</span>'+(r.u?'<a href="'+r.u+'" target="_blank" rel="noopener">'+r.l+'</a>':'<span>'+r.l+'</span>')+'</div>').join('')+'</div></div>';}
h+='</div></div>';});
if(D.tips){h+='<div class="tips"><div class="tips-ey">// dicas essenciais</div><div class="tips-h">Dicas que ninguém conta</div><div class="tips-g">'+D.tips.map(t=>'<div class="tip"><div class="tip-ico">'+t.icon+'</div><h4>'+t.title+'</h4><p>'+t.text+'</p></div>').join('')+'</div></div>';}
if(D.books){h+='<div class="books"><div class="books-ey">// biblioteca essencial</div><div class="books-h">Livros que não podem faltar</div><div class="books-g">'+D.books.map(b=>'<div class="bk"><div class="bk-spine" style="background:'+b.c+'"></div><div><div class="bk-title">'+b.t+'</div><div class="bk-author">'+b.a+'</div><span class="bk-tag" style="background:'+b.bg+';color:'+b.c+'">'+b.p+'</span></div></div>').join('')+'</div></div>';}
if(D.nextSteps){h+='<div class="next"><div class="next-ey">// e agora?</div><div class="next-h">Próximos Caminhos</div><div class="next-desc">'+D.nextSteps.desc+'</div><div class="next-g">';D.nextSteps.items.forEach(n=>{h+='<div class="next-card"><div class="next-card-ico">'+n.icon+'</div><h4>'+n.title+'</h4><p>'+n.desc+'</p><div class="next-card-tags">'+n.tags.map(t=>'<span class="next-tag">'+t+'</span>').join('')+'</div></div>';});h+='</div></div>';}
h+='<footer><p>// clique nos itens para marcar · '+D.phases.length+' fases · '+D.totalMonths+'</p></footer>';
root.innerHTML=h;D.phases.forEach(p=>updatePhase(tab,p.id));
}

renderTab('webdev','tab-webdev');
renderTab('lowlevel','tab-lowlevel');
var savedTab='webdev';try{savedTab=localStorage.getItem('rm_active_tab')||'webdev';}catch(e){}
switchTab(savedTab);
document.addEventListener('click',function(e){
  var ci=e.target.closest('[data-ck]');
  if(ci)toggle(ci.dataset.tab,ci.dataset.ck,ci);
  var ph=e.target.closest('.ph-head');
  if(ph){ph.parentElement.classList.toggle('open');persistExpand();}
});

</script>
</body>
</html>
