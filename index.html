 "<strong>Runbook template:</strong> <strong>Alerta:</strong> p99 > 500ms → <strong>Verificar:</strong> pg_stat_statements para queries lentas, Grafana Duration por endpoint → <strong>Ação:</strong> identificar endpoint, verificar EXPLAIN, adicionar índice ou cache → <strong>Escalar:</strong> se não resolver em 15min, escalar para on-call sênior.", "<strong>Critério de \"done\":</strong> Push na main deploya automaticamente, dashboards Grafana mostram métricas reais, alertas disparam em teste de carga, Snyk não encontra vulnerabilidades críticas, runbooks testados simulando incidente."]}, "refs": [{"e": "📕", "l": "The DevOps Handbook — Kim, Humble et al.", "u": "https://itrevolution.com/product/the-devops-handbook-second-edition/"}, {"e": "📘", "l": "OpenTelemetry", "u": "https://opentelemetry.io/docs/"}, {"e": "🎓", "l": "Grafana tutorials", "u": "https://grafana.com/tutorials/"}, {"e": "🛡️", "l": "OWASP Top 10", "u": "https://owasp.org/www-project-top-ten/"}, {"e": "📘", "l": "GitHub Actions", "u": "https://docs.github.com/en/actions"}]}, {"id": "algo", "label": "FASE 13", "short": "Algoritmos & DS", "icon": "🧮", "dur": "3–4 semanas", "tag": "interview-ready", "color": "#ec4899", "numBg": "#1a081a", "numBd": "#2a1028", "title": "Algoritmos, Estruturas de Dados & Problem Solving", "desc": "Entrevistas de sênior testam <strong>pensamento algorítmico e comunicação</strong>. Não é sobre decorar soluções — é sobre reconhecer patterns e resolver problemas na frente do entrevistador.", "topics": [{"icon": "📐", "title": "Complexidade & Análise", "desc": "Big-O, amortized analysis, space vs time trade-offs, benchmarking.", "checks": ["Big-O: O(1), O(log n), O(n), O(n log n), O(n²)", "Amortized analysis: por que array.push é O(1)", "Space complexity: quando memória importa mais que tempo", "Identificar complexidade de código no dia a dia", "Benchmarking prático: medir vs estimar"], "res": [{"i": "📖", "l": "Grokking Algorithms", "t": "book", "u": "https://www.manning.com/books/grokking-algorithms"}]}, {"icon": "🏗️", "title": "Estruturas de Dados Essenciais", "desc": "Arrays, linked lists, stacks, queues, hash tables, trees, heaps, graphs, tries.", "checks": ["Hash tables: implementar do zero, colisões, load factor", "Binary Search Tree: insert, search, delete, balanceamento", "Heaps: min-heap, max-heap, priority queue", "Graphs: adjacency list vs matrix, representação", "Tries: prefix tree para autocomplete", "Stack e Queue: implementar com array e linked list", "Quando usar cada estrutura: decision matrix"], "res": [{"i": "📖", "l": "Cracking the Coding Interview", "t": "book", "u": "https://www.amazon.com/Cracking-Coding-Interview-Programming-Questions/dp/0984782850"}]}, {"icon": "🔍", "title": "Algoritmos de Busca & Ordenação", "desc": "Binary search, merge sort, quick sort, topological sort, BFS, DFS.", "checks": ["Binary search e variações (lower/upper bound)", "Merge sort: divide and conquer, estável, O(n log n)", "Quick sort: partitioning, pivot choice, worst case", "BFS vs DFS: quando usar cada, implementar com fila/stack", "Topological sort para dependências (builds, tasks)", "Dijkstra para shortest path em grafos ponderados"], "res": [{"i": "🌐", "l": "visualgo.net", "t": "online", "u": "https://visualgo.net/"}]}, {"icon": "🧩", "title": "Patterns de Resolução de Problemas", "desc": "Two pointers, sliding window, dynamic programming, greedy, backtracking.", "checks": ["Two pointers: sorted arrays, palindromes, container with water", "Sliding window: subarray sum, longest substring", "Dynamic programming: top-down (memo) vs bottom-up (tabulation)", "Greedy: interval scheduling, activity selection", "Backtracking: permutations, combinations, N-queens", "Recursão: dividir problema, base case, stack overflow", "Bit manipulation: operações básicas, XOR tricks"], "res": [{"i": "🌐", "l": "NeetCode.io — Roadmap", "t": "online", "u": "https://neetcode.io/"}, {"i": "🌐", "l": "LeetCode Patterns", "t": "online", "u": "https://seanprashad.com/leetcode-patterns/"}]}, {"icon": "🎯", "title": "Estratégia de Prática & Entrevista", "desc": "Como praticar LeetCode de forma eficiente, comunicação durante entrevista, mock interviews.", "checks": ["NeetCode 150: lista curada por pattern", "Praticar por pattern, não por dificuldade aleatória", "Tempo máximo por problema: 25min Easy, 40min Medium", "Comunicar pensamento em voz alta enquanto resolve", "Escrever exemplos e edge cases antes de codar", "Analisar complexidade do próprio código ao final", "Fazer 5+ mock interviews (com amigo ou plataforma)"], "res": [{"i": "🌐", "l": "NeetCode 150", "t": "online", "u": "https://neetcode.io/practice"}, {"i": "🌐", "l": "Pramp — Mock interviews", "t": "online", "u": "https://www.pramp.com/"}]}], "project": {"name": "algo-journal — 100 Problemas Documentados por Pattern", "desc": "<strong>100 problemas de algoritmos organizados por pattern</strong> — não por dificuldade aleatória. Cada solução documentada com complexidade, edge cases e reflexão. Ao final: cheat sheet pessoal + 3 estruturas implementadas do zero + 5 mock interviews.\n<div class=\"pb-tree\"><span class=\"dir\">algo-journal/</span>\n├── <span class=\"dir\">problems/</span>\n│   ├── <span class=\"dir\">two-pointers/</span>       <span class=\"cmt\"># 15+ problemas</span>\n│   ├── <span class=\"dir\">sliding-window/</span>\n│   ├── <span class=\"dir\">binary-search/</span>\n│   ├── <span class=\"dir\">trees/</span>\n│   ├── <span class=\"dir\">graphs/</span>\n│   ├── <span class=\"dir\">dynamic-programming/</span>\n│   └── <span class=\"dir\">backtracking/</span>\n├── <span class=\"dir\">data-structures/</span>\n│   ├── <span class=\"f\">hashmap.ts</span>          <span class=\"cmt\"># open addressing</span>\n│   ├── <span class=\"f\">min-heap.ts</span>\n│   └── <span class=\"f\">trie.ts</span>             <span class=\"cmt\"># autocomplete</span>\n├── <span class=\"dir\">mock-interviews/</span>       <span class=\"cmt\"># feedback de cada mock</span>\n├── <span class=\"f\">cheatsheet.md</span>          <span class=\"cmt\"># patterns + templates</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "📊", "t": "100 problemas resolvidos, organizados por pattern"}, {"i": "🧩", "t": "15+ problemas por pattern: two pointers, sliding window, DP, graphs, trees"}, {"i": "🏗️", "t": "3 estruturas implementadas do zero em TypeScript (HashMap, MinHeap, Trie)"}, {"i": "🎯", "t": "5+ mock interviews com feedback documentado"}, {"i": "📝", "t": "Cheat sheet: tabela de patterns com 'quando usar' + template de código"}], "dels": ["Pastas por pattern: /two-pointers, /sliding-window, /dp, /graphs, /trees, /binary-search, /backtracking", "50+ problemas NeetCode 150 em TypeScript com comentários explicando cada decisão", "Cada solução: abordagem, complexidade O(), edge cases, alternativa considerada", "HashMap com open addressing, MinHeap com array, Trie para autocomplete — do zero", "5+ mock interviews: problema, solução, feedback, o que melhorar", "cheatsheet.md: tabela patterns + 'quando usar' + template + problemas clássicos"], "refs": [{"i": "🌐", "l": "NeetCode 150", "t": "online", "u": "https://neetcode.io/practice"}, {"i": "🌐", "l": "LeetCode Patterns", "t": "online", "u": "https://seanprashad.com/leetcode-patterns/"}, {"i": "📕", "l": "Grokking Algorithms", "t": "book", "u": "https://www.manning.com/books/grokking-algorithms"}, {"i": "🌐", "l": "Pramp — mock interviews", "t": "online", "u": "https://www.pramp.com/"}], "tips": ["<strong>Template de solução documentada:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// problems/two-pointers/container-with-most-water.ts</span>\n\n<span class=\"cmt\">/**\n * Pattern: Two Pointers (converging)\n * When to use: maximize/minimize area between two points\n *\n * Approach: Start pointers at edges, move the shorter one inward\n * Time: O(n), Space: O(1)\n * Edge cases: array length 2, all same height\n * Alternative: brute force O(n²) - compare every pair\n */</span>\nfunction maxArea(height: number[]): number {\n  let left = 0, right = height.length - 1, max = 0;\n  while (left &lt; right) {\n    const area = Math.min(height[left], height[right]) * (right - left);\n    max = Math.max(max, area);\n    if (height[left] &lt; height[right]) left++;\n    else right--;\n  }\n  return max;\n}</div>", "<strong>Siga o NeetCode 150</strong> na ordem: Arrays → Two Pointers → Sliding Window → Stack → Binary Search → Linked List → Trees → Tries → Heap → Backtracking → Graphs → DP. A ordem importa — cada categoria constrói sobre a anterior.", "<strong>Regra dos 25/40 minutos:</strong> Se travou por mais de 25min em Easy ou 40min em Medium, veja a solução. Entenda profundamente, feche, e reimplemente no dia seguinte. O objetivo é aprender patterns, não sofrer.", "<strong>Cheat sheet — formato por pattern:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">## Two Pointers</span>\n<span class=\"cmt\">**Quando usar:** array sorted, palindrome, container, pair sum</span>\n<span class=\"cmt\">**Template:**</span>\nlet left = 0, right = arr.length - 1;\nwhile (left &lt; right) {\n  <span class=\"cmt\">// process</span>\n  if (condition) left++;\n  else right--;\n}\n<span class=\"cmt\">**Problemas clássicos:** Two Sum II, Container Water, 3Sum</span></div>", "<strong>Critério de \"done\":</strong> 100 problemas resolvidos e documentados, 3 estruturas passam em testes, 5 mocks feitos, cheat sheet cobre todos os patterns estudados."]}, "refs": [{"e": "📕", "l": "Cracking the Coding Interview — McDowell", "u": "https://www.amazon.com/Cracking-Coding-Interview-Programming-Questions/dp/0984782850"}, {"e": "📖", "l": "Grokking Algorithms — Bhargava", "u": "https://www.manning.com/books/grokking-algorithms"}, {"e": "🌐", "l": "NeetCode.io", "u": "https://neetcode.io/"}, {"e": "🌐", "l": "LeetCode Patterns", "u": "https://seanprashad.com/leetcode-patterns/"}, {"e": "🌐", "l": "visualgo.net — Visualizações", "u": "https://visualgo.net/"}]}, {"id": "product", "label": "FASE 14", const LL={"eyebrow": "roadmap completo · sistemas & performance · edição definitiva", "h1": "Low-Level", "h1em": "Programming", "desc": "Guia estruturado para devs full stack que querem entender o que acontece por baixo do Node.js, do V8, e de todo JavaScript. Começa do zero — terminal, Linux, C básico — passa por ponteiros e memória com calma, e vai até Rust e sistemas operacionais.", "totalMonths": "~9 meses", "dailyHours": "1–3h", "storageKey": "rm_ll_v4", "phases": [{"id": "linux", "label": "FASE 01", "short": "Linux & Terminal", "icon": "🐧", "dur": "1–2 semanas", "tag": "ponto de partida real", "color": "#a3e635", "numBg": "#0e1a04", "numBd": "#1e3008", "title": "Linux, Terminal e Ambiente de Desenvolvimento", "desc": "Antes de escrever uma linha de C, você precisa se sentir em casa no terminal Linux. <strong>Todo dev low-level vive no terminal</strong> — compilar, debugar, inspecionar processos, navegar pelo sistema de arquivos. Essa fase elimina o atrito entre você e o ambiente.", "topics": [{"icon": "🖥️", "title": "Terminal Linux — Fundamentos", "desc": "Navegação, manipulação de arquivos, permissões, pipes e redirecionamento.", "checks": ["Navegar pelo sistema de arquivos (cd, ls, pwd, find, tree)", "Criar, mover, copiar e remover arquivos e diretórios (touch, mkdir, mv, cp, rm)", "Permissões: ler rwxr-xr-x, usar chmod e chown", "Pipes e redirecionamento: |, >, >>, 2>, /dev/null", "Variáveis de ambiente: export, $PATH, .bashrc vs .bash_profile", "Atalhos essenciais: Ctrl+C, Ctrl+Z, Ctrl+D, Tab completion, história (Ctrl+R)"], "res": [{"i": "🌐", "l": "The Missing Semester — MIT (gratuito)", "t": "online", "u": "https://missing.csail.mit.edu/"}, {"i": "🌐", "l": "OverTheWire: Bandit — jogo de terminal", "t": "online", "u": "https://overthewire.org/wargames/bandit/"}]}, {"icon": "🔧", "title": "Ferramentas Essenciais do Dev", "desc": "grep, sed, awk, sort, uniq, xargs — o canivete suíço do terminal.", "checks": ["grep: buscar texto em arquivos (-r, -n, -i, -E pa : "online", "u": "https://vim-adventures.com/"}]}, {"icon": "🔀", "title": "Git na Linha de Comando", "desc": "Controle de versão sem GUI — como devs low-level usam git no terminal.", "checks": ["init, clone, add, commit, push, pull — fluxo básico", "status, log --oneline, diff para inspecionar mudanças", "branch, checkout, merge — trabalhar com branches", "stash para guardar trabalho temporariamente", "Resolver conflitos de merge na linha de comando", "gitignore: não versionar binários compilados (*.o, ./build)"], "res": [{"i": "🌐", "l": "Pro Git Book (gratuito)", "t": "online", "u": "https://git-scm.com/book/pt-br/v2"}, {"i": "🌐", "l": "Oh My Git! — jogo visual de git", "t": "online", "u": "https://ohmygit.org/"}]}, {"icon": "🔍", "title": "Inspecionando o Sistema", "desc": "ps, top/htop, lsof, strace superficial — ver o que está rodando.", "checks": ["ps aux: listar todos os processos com PID, usuário e uso de recursos", "top / htop: monitorar CPU e memória em tempo real", "lsof -p PID: listar arquivos abertos por um processo", "df -h e du -sh: uso de disco", "free -h: uso de memória RAM e swap", "uname -a: ver versão do kernel e arquitetura"], "res": [{"i": "🌐", "l": "Linux Command Line Cheatsheet — ss64.com", "t": "online", "u": "https://ss64.com/bash/"}]}], "project": {"name": "dev-setup — Ambiente de Desenvolvimento Documentado", "desc": "Você vai <strong>configurar e documentar seu ambiente de desenvolvimento low-level do zero</strong> — como se estivesse escrevendo um guia para um colega que acabou de formatar o computador. Ao final, você terá um repositório Git com dotfiles versionados, script de instalação automática e cheatsheet pessoal. Este ambiente será usado em <strong>todas as fases seguintes</strong>.\n<div class=\"pb-tree\"><span class=\"dir\">dotfiles/</span>\n├── <span class=\"f\">.bashrc</span>        <span class=\"cmt\"># aliases, prompt, PATH</span>\n├── <span class=\"f\">.vimrc</span>         <span class=\"cmt\"># configuração mínima vim/nvim</span>\n├── <span class=\"f\">.gitconfig</span>     <span class=\"cmt\"># user, editor, aliases git</span>\n├── <span class=\"f\">.inputrc</span>       <span class=\"cmt\"># readline (autocomplete)</span>\n├── <span class=\"f\">install.sh</span>     <span class=\"cmt\"># bootstrap automático</span>\n├── <span class=\"f\">Makefile.tpl</span>   <span class=\"cmt\"># template Makefile para projetos C</span>\n├── <span class=\"f\">cheatsheet.md</span>  <span class=\"cmt\"># 30+ comandos categorizados</span>\n├── <span class=\"f\">bandit.md</span>      <span class=\"cmt\"># soluções OverTheWire Bandit</span>\n└── <span class=\"f\">README.md</span>      <span class=\"cmt\"># guia completo de configuração</span></div>", "goals": [{"i": "🐧", "t": "Linux nativo ou WSL2 funcional com gcc, make, gdb, valgrind, git, vim instalados e verificados"}, {"i": "📝", "t": "Dotfiles versionados no Git: .bashrc com aliases, prompt com git branch, PATH correto"}, {"i": "🔧", "t": "Script install.sh que configura tudo em máquina nova — testado em container Docker limpo"}, {"i": "📖", "t": "Cheatsheet pessoal com 30+ comandos categorizados com exemplos reais"}, {"i": "🎮", "t": "OverTheWire Bandit: 15 primeiros níveis completos com soluções documentadas"}], "dels": ["Ambiente funcional: gcc, make, gdb, valgrind, git, vim/nvim, python3 instalados (todos retornam versão sem erro)", ".bashrc com aliases (ll, gs, gc, gd, mk), prompt com branch do git, EDITOR=vim, PATH correto", "install.sh detecta distro (apt vs dnf), instala tudo, cria symlinks, imprime versões ao final", "Makefile.tpl com targets: all, run, debug, valgrind, clean — flags -Wall -Wextra -g -fsanitize=address", "cheatsheet.md com 30+ comandos em 8 categorias: navegação, arquivos, texto, processos, disco, rede, git, compilação", "bandit.md com soluções dos 15 primeiros níveis: comando usado, por que funciona, o que aprendeu", "vimtutor completado pelo menos 1x — vim básico funcional (abrir, editar, buscar, salvar, sair)"], "refs": [{"i": "🌐", "l": "The Missing Semester — MIT (gratuito)", "t": "online", "u": "https://missing.csail.mit.edu/"}, {"i": "🌐", "l": "OverTheWire: Bandit — wargame de terminal", "t": "online", "u": "https://overthewire.org/wargames/bandit/"}, {"i": "🌐", "l": "Dotfiles guide", "t": "online", "u": "https://dotfiles.github.io/"}, {"i": "🌐", "l": "Explainshell.com", "t": "online", "u": "https://explainshell.com/"}], "tips": ["<strong>Comece pelo ambiente:</strong> Se Windows, instale WSL2 com Ubuntu 22.04. Depois:\n<div class=\"pb-cmd\"><span class=\"cmt\"># Todos devem retornar versão sem erro:</span>\ngcc --version && make --version && gdb --version\nvalgrind --version && git --version && vim --version</div>", "<strong>install.sh — estrutura mínima:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">#!/bin/bash</span>\nset -e\nif command -v apt &>/dev/null; then\n  sudo apt update && sudo apt install -y build-essential gcc make gdb valgrind git vim python3 curl htop tree\nelif command -v dnf &>/dev/null; then\n  sudo dnf install -y gcc make gdb valgrind git vim python3 curl htop tree\nfi\n<span class=\"cmt\"># Symlinks dos dotfiles</span>\nfor f in .bashrc .vimrc .gitconfig .inputrc; do\n  ln -sf \"$(pwd)/$f\" \"$HOME/$f\"\ndone\n<span class=\"cmt\"># Verificação</span>\necho \"=== Verificando instalação ===\"\ngcc --version | head -1\nmake --version | head -1</div>", "<strong>Teste em container Docker limpo:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> docker run -it ubuntu:22.04 bash\n<span class=\"cmt\"># dentro do container:</span>\napt update && apt install -y git\ngit clone https://github.com/SEU-USER/dotfiles.git\ncd dotfiles && chmod +x install.sh && ./install.sh</div>\nSe tudo instalar sem erro no container, o script está pronto.", "<strong>Makefile.tpl — template para todos os projetos C futuros:</strong>\n<div class=\"pb-cmd\">CC      = gcc\nCFLAGS  = -Wall -Wextra -Werror -std=c11 -g -fsanitize=address\nSRC     = $(wildcard src/*.c)\nOBJ     = $(SRC:src/%.c=build/%.o)\nTARGET  = bin/program\n\nall: $(TARGET)\n$(TARGET): $(OBJ)\n\t@mkdir -p bin\n\t$(CC) $(CFLAGS) -o $@ $^\nbuild/%.o: src/%.c\n\t@mkdir -p build\n\t$(CC) $(CFLAGS) -c -o $@ $<\nrun: $(TARGET)\n\t./$(TARGET)\nvalgrind: $(TARGET)\n\tvalgrind --leak-check=full --error-exitcode=1 ./$(TARGET)\nclean:\n\trm -rf build/ bin/\n.PHONY: all run valgrind clean</div>", "<strong>Critério de \"done\":</strong> <code>./install.sh</code> funciona em container Docker limpo, todos os comandos do cheatsheet testados pessoalmente, Bandit 15 níveis documentados, <code>vimtutor</code> completado."]}, "refs": [{"e": "🌐", "l": "The Missing Semester — MIT (gratuito)", "u": "https://missing.csail.mit.edu/"}, {"e": "🌐", "l": "OverTheWire: Bandit", "u": "https://overthewire.org/wargames/bandit/"}, {"e": "🌐", "l": "Pro Git Book (gratuito)", "u": "https://git-scm.com/book/pt-br/v2"}, {"e": "🌐", "l": "Explainshell.com", "u": "https://explainshell.com/"}]}, {"id": "cbasics", "label": "FASE 02", "short": "C Básico", "icon": "🌱", "dur": "2–3 semanas", "tag": "antes dos ponteiros", "color": "#86efac", "numBg": "#0a1a10", "numBd": "#183020", "title": "C Básico — A Linguagem Antes dos Ponteiros", "desc": "C tem uma sintaxe pequena, mas cada detalhe importa. Essa fase cobre a linguagem em si — tipos, controle de fluxo, funções, arrays e I/O — antes de chegar nos conceitos que assustam. <strong>Depois daqui, a Fase 01 vai fazer sentido imediato.</strong>", "topics": [{"icon": "🔤", "title": "Tipos, Variáveis e Operadores", "desc": "Tipos primitivos, sizeof, casting, operadores aritméticos e lógicos.", "checks": ["Tipos inteiros: char, short, int, long, long long e versões unsigned", "Tipos de ponto flutuante: float, double — precisão e limitações", "sizeof() para inspecionar tamanho de tipos na sua máquina", "Casting explícito e implícito — quando acontece e riscos", "Operadores: aritméticos, relacionais, lógicos (&&, ||, !), bitwise (&, |, ^, ~, <<, >>)", "Diferença entre = (atribuição) e == (comparação) — bug clássico"], "res": [{"i": "📖", "l": "CS50x — Harvard (gratuito)", "t": "online", "u": "https://cs50.harvard.edu/x/"}, {"i": "🌐", "l": "Learn-C.org — tutorial interativo", "t": "online", "u": "https://www.learn-c.org/"}]}, {"icon": "🔁", "title": "Controle de Fluxo", "desc": "if/else, while, for, do-while, switch, break, continue.", "checks": ["if / else if / else com condições compostas", "for loop: init; condition; update — todas as variações", "while e do-while — saber quando usar cada um", "switch/case com break explícito e fallthrough intencional", "break e continue em loops aninhados", "Evitar goto — entender por que existe e por que não usar"], "res": [{"i": "🌐", "l": "Learn-C.org — Conditions", "t": "online", "u": "https://www.learn-c.org/en/Conditions"}]}, {"icon": "🧩", "title": "Funções e Escopo", "desc": "Declaração, definição, protótipos, escopo de variáveis, recursão.", "checks": ["Declarar função antes de usar (protótipo) vs definir depois do main", "Parâmetros por valor: C sempre passa cópia (não referência)", "Variáveis locais vs globais — por que globais são problemáticas", "Funções void vs funções com retorno", "Recursão: fatorial, fibonacci — entender a call stack", "static em variáveis locais: valor persiste entre chamadas"], "res": [{"i": "📖", "l": "K&R C — Cap 4 (Functions)", "t": "book"}]}, {"icon": "📋", "title": "Arrays e Strings", "desc": "Arrays estáticos, strings como char[], funções da string.h.", "checks": ["Array estático: declarar, inicializar, acessar por índice", "Arrays multidimensionais: int matrix[3][4]", "String em C: char[] terminada em \\0 — por que isso importa", "strlen, strcpy, strcat, strcmp, strchr — funções de string.h", "sprintf e snprintf para formatar strings com segurança", "Por que buffer overflow acontece com strcpy inseguro"], "res": [{"i": "🌐", "l": "CS50 Week 2 — Arrays", "t": "online", "u": "https://cs50.harvard.edu/x/2024/weeks/2/"}]}, {"icon": "📁", "title": "I/O e Arquivos", "desc": "printf, scanf, fgets, FILE*, fopen/fclose, leitura e escrita de arquivos.", "checks": ["printf com format strings: %d, %f, %s, %c, %ld, %zu", "scanf e suas armadilhas (buffer overflow, \\n sobrando no buffer)", "fgets como alternativa segura ao gets (que nunca deve ser usado)", "Abrir arquivo com fopen, ler com fgets/fscanf, fechar com fclose", "Escrever em arquivo com fprintf", "Checar retorno de fopen (NULL = erro) — sempre tratar erros de I/O"], "res": [{"i": "🌐", "l": "File I/O in C — Programiz", "t": "online", "u": "https://www.programiz.com/c-programming/c-file-input-output"}]}, {"icon": "🏗️", "title": "Structs e Enums", "desc": "Structs como tipos compostos, typedef, enums para constantes nomeadas.", "checks": ["Definir struct com campos de diferentes tipos", "Inicializar struct: por campo, por posição, com designated initializers", "typedef struct para evitar escrever struct toda hora", "Passar struct para função: por valor vs por ponteiro (spoiler: usar ponteiro)", "enum para constantes nomeadas — mais seguro que #define para estados", "Struct aninhada: struct com campo do tipo outro struct"], "res": [{"i": "🌐", "l": "Structs in C — Tutorialspoint", "t": "online", "u": "https://www.tutorialspoint.com/cprogramming/c_structures.htm"}]}, {"icon": "🔨", "title": "Compilação e Makefile Básico", "desc": "gcc flags essenciais, múltiplos arquivos .c, Makefile com targets.", "checks": ["gcc hello.c -o hello: compilar e executar", "Flags obrigatórias: -Wall -Wextra -std=c11 -g (debug info)", "Separar código em múltiplos .c + .h com include guards (#ifndef)", "Compilar cada .c em .o separado, depois linkar", "Makefile básico: variáveis CC, CFLAGS, target all, clean", "make: entender dependências entre targets"], "res": [{"i": "🌐", "l": "Makefile Tutorial — makefiletutorial.com", "t": "online", "u": "https://makefiletutorial.com/"}, {"i": "🔧", "l": "GCC manpage — referência de flags", "t": "tool", "u": "https://gcc.gnu.org/onlinedocs/gcc/"}]}, {"icon": "🐛", "title": "Debugging com printf e GDB básico", "desc": "Estratégia de debug, printf debugging, GDB: run, break, next, print.", "checks": ["printf debugging: imprimir estado do programa em pontos chave", "Compilar com -g para incluir debug symbols", "GDB: gdb ./programa, run, quit", "GDB: break main, break linha_numero para colocar breakpoint", "GDB: next (próxima linha), step (entrar na função), continue", "GDB: print variavel para inspecionar valor, info locals para todas"], "res": [{"i": "🔧", "l": "GDB Quick Reference", "t": "online", "u": "https://sourceware.org/gdb/current/onlinedocs/gdb/"}, {"i": "🌐", "l": "CS50 Debug — usando o debug50", "t": "online", "u": "https://cs50.harvard.edu/x/"}]}], "project": {"name": "mini-utils — Coleção de 6 Utilitários em C Puro", "desc": "Você vai construir <strong>6 programas utilitários em C puro</strong>, cada um resolvendo um problema concreto, similar a comandos Unix. <strong>Nada de ponteiros, nada de malloc.</strong> Só a linguagem, a lógica e o compilador. O objetivo é ganhar confiança com a sintaxe e dominar o ciclo compile → run → debug.\n<div class=\"pb-tree\"><span class=\"dir\">mini-utils/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"dir\">calc/</span>       <span class=\"cmt\"># calculadora com precedência</span>\n│   │   ├── <span class=\"f\">main.c</span>\n│   │   ├── <span class=\"f\">parser.c</span> / <span class=\"f\">parser.h</span>\n│   ├── <span class=\"dir\">wc-mini/</span>    <span class=\"cmt\"># conta linhas/palavras/bytes</span>\n│   ├── <span class=\"dir\">caesar/</span>     <span class=\"cmt\"># cifra de César</span>\n│   ├── <span class=\"dir\">stats/</span>      <span class=\"cmt\"># min/max/média/mediana</span>\n│   ├── <span class=\"dir\">grep-mini/</span>  <span class=\"cmt\"># busca substring em arquivo</span>\n│   └── <span class=\"dir\">sort-mini/</span>  <span class=\"cmt\"># compara bubble/selection/insertion</span>\n├── <span class=\"dir\">tests/</span>\n│   └── <span class=\"f\">test_all.sh</span>\n├── <span class=\"f\">Makefile</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "🔢", "t": "6 utilitários funcionais compilando sem warnings com -Wall -Wextra -Werror"}, {"i": "📁", "t": "Código organizado em múltiplos .c e .h com Makefile"}, {"i": "🐛", "t": "1 bug introduzido de propósito e debugado no GDB, sessão documentada no README"}, {"i": "🧪", "t": "test_all.sh com testes automatizados para cada utilitário, incluindo edge cases"}, {"i": "📖", "t": "README com descrição de cada utilitário, como compilar e exemplos de uso"}], "dels": ["calc: ./calc '3 + 4 * 2' → 11 (precedência correta), ./calc '10 / 3' → 3.333333, erro se sem argumentos", "wc-mini: conta linhas/palavras/bytes como wc, suporta flags -l e -w, lê stdin se sem arquivo", "caesar: ./caesar 13 'Hello World' → 'Uryyb Jbeyq', ./caesar -13 desfaz, chars não-alfa passam inalterados", "stats: lê números de arquivo, mostra min/max/soma/média/mediana, trata arquivo vazio e inexistente", "grep-mini: busca substring em arquivo com -n (num linha) e -i (case-insensitive), fallback para stdin", "sort-mini: compara bubble/selection/insertion sort mostrando comparações, trocas e tempo para cada", "test_all.sh: assert_eq para cada utilitário com casos normais e de borda, imprime PASS/FAIL com contagem", "Sessão GDB documentada: bug introduzido, breakpoint, inspect de variáveis, correção"], "refs": [{"i": "🌐", "l": "CS50x — Harvard (semanas 1 e 2)", "t": "online", "u": "https://cs50.harvard.edu/x/"}, {"i": "🌐", "l": "Learn-C.org — tutorial interativo", "t": "online", "u": "https://www.learn-c.org/"}, {"i": "📖", "l": "K&R — The C Programming Language (Caps 1–4)", "t": "book"}, {"i": "🌐", "l": "Makefiletutorial.com", "t": "online", "u": "https://makefiletutorial.com/"}], "tips": ["<strong>calc — entrada e saída esperada:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> ./calc \"3 + 4 * 2\"\n11\n<span class=\"pr\">$</span> ./calc \"100 - 50 + 25 * 2\"\n100\n<span class=\"pr\">$</span> ./calc\nUso: ./calc \"expressão\"</div>\nParsear com <code>strtod()</code> para números e iterar tokens. Para precedência, processe * e / primeiro, depois + e -.", "<strong>wc-mini — suportar stdin:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> ./wc-mini arquivo.txt\n  42  318  2048  arquivo.txt\n<span class=\"pr\">$</span> echo \"hello world\" | ./wc-mini\n   1    2   12\n<span class=\"pr\">$</span> ./wc-mini -l arquivo.txt\n  42  arquivo.txt</div>\nUse <code>fgetc()</code> para contar: newline = +1 linha, espaço após não-espaço = +1 palavra, todo char = +1 byte.", "<strong>sort-mini — comparar algoritmos:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> ./sort-mini --compare numbers.txt\n          | Comparações | Trocas | Tempo(μs)\nBubble    |      15     |   8    |   2.3\nSelection |      15     |   5    |   1.8\nInsertion |      11     |   8    |   1.5</div>\nUse <code>clock()</code> para medir tempo. Cada algoritmo incrementa contadores de comparações e trocas.", "<strong>test_all.sh — estrutura:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">#!/bin/bash</span>\nPASS=0; FAIL=0\nassert_eq() {\n  if [ \"$1\" = \"$2\" ]; then PASS=$((PASS+1))\n  else echo \"FAIL: esperado '$2', recebeu '$1'\"; FAIL=$((FAIL+1)); fi\n}\n<span class=\"cmt\"># Testes calc</span>\nassert_eq \"$(./bin/calc '3 + 4 * 2')\" \"11\"\nassert_eq \"$(./bin/calc '10 / 3')\" \"3.333333\"\n<span class=\"cmt\"># ... mais testes ...</span>\necho \"Resultado: $PASS passed, $FAIL failed\"</div>", "<strong>Sessão GDB para documentar:</strong> Introduza um off-by-one no calc. Depois:\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> gdb ./bin/calc\n(gdb) break parser.c:42\n(gdb) run \"3 + 4 * 2\"\n(gdb) print result     <span class=\"cmt\"># mostra 14 em vez de 11</span>\n(gdb) print tokens[2]  <span class=\"cmt\"># inspeciona o token</span>\n(gdb) info locals</div>\nDocumente cada passo no README: o bug, os comandos GDB, o diagnóstico.", "<strong>Critério de \"done\":</strong> <code>make</code> compila tudo sem warnings, <code>bash tests/test_all.sh</code> passa todos os testes, sessão GDB documentada no README."]}, "refs": [{"e": "🌐", "l": "CS50x — Harvard (gratuito)", "u": "https://cs50.harvard.edu/x/"}, {"e": "🌐", "l": "Learn-C.org — tutorial interativo", "u": "https://www.learn-c.org/"}, {"e": "📖", "l": "K&R — The C Programming Language", "u": "https://www.amazon.com/Programming-Language-2nd-Brian-Kernighan/dp/0131103628"}, {"e": "🌐", "l": "Makefiletutorial.com", "u": "https://makefiletutorial.com/"}]}, {"id": "ptrs", "label": "FASE 03", "short": "Ponteiros & Memória", "icon": "🎯", "dur": "3–4 semanas", "tag": "o grande salto", "color": "#39ff8f", "numBg": "#0a1a10", "numBd": "#1a3020", "title": "Ponteiros & Memória Dinâmica — Entendendo Endereços", "desc": "Aqui é o ponto onde C se diferencia de tudo que você conhece. <strong>Ponteiros não são difíceis — são diferentes.</strong> Nesta fase você vai aprender a usar ponteiros e malloc/free com confiança antes de fazer qualquer coisa avançada. O foco é construir intuição com projetos práticos, não com teoria abstrata.", "topics": [{"icon": "🎯", "title": "Ponteiros — Do Básico ao Confortável", "desc": "Endereços, dereferência, ponteiros para ponteiros, NULL, void*.", "checks": ["Entender o que é um endereço de memória e o operador & (address-of)", "Dereferência com * — acessar o valor apontado", "Ponteiros e arrays: por que arr[i] é *(arr + i)", "Ponteiros para ponteiros (**pp) — quando e por que usar", "NULL como valor especial — sempre checar antes de derreferenciar", "void* como ponteiro genérico — casting para tipo correto", "Aritmética de ponteiros: p++ avança sizeof(*p) bytes"], "res": [{"i": "📖", "l": "K&R C — Cap 5 (Ponteiros)", "t": "book"}, {"i": "🌐", "l": "cdecl.org — decodificar declarações", "t": "online", "u": "https://cdecl.org/"}, {"i": "🌐", "l": "C Pointer Tutorial — Programiz", "t": "online", "u": "https://www.programiz.com/c-programming/c-pointers"}]}, {"icon": "🗂️", "title": "Stack vs Heap — Memória Manual", "desc": "malloc, calloc, realloc, free. Stack frames automáticos vs heap explícito.", "checks": ["Entender stack: variáveis locais, automático, limitado (~8MB)", "Entender heap: malloc retorna ponteiro, você controla o lifetime", "malloc + free: alocar e liberar memória manualmente", "calloc: alocar e zerar memória (útil para arrays)", "realloc: expandir/encolher bloco existente sem perder dados", "Por que free não zera o ponteiro — setar para NULL depois de liberar", "Erros clássicos: use-after-free, double-free, memory leak"], "res": [{"i": "📖", "l": "Modern C — Cap 11 (Memory)", "t": "book", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"i": "🔧", "l": "Valgrind — detectar leaks", "t": "tool", "u": "https://valgrind.org/"}]}, {"icon": "📋", "title": "Structs com Ponteiros", "desc": "Structs alocadas no heap, linked structures, struct dentro de struct.", "checks": ["Alocar struct no heap com malloc e acessar com ->", "Struct que contém ponteiro para outro struct (linked)", "Passar struct por ponteiro para função (evitar cópia)", "Liberar struct com campos que também foram alocados (deep free)", "typedef struct Node { int val; struct Node *next; } — self-referencing"], "res": [{"i": "📖", "l": "K&R C — Cap 6 (Structures)", "t": "book"}]}, {"icon": "🔗", "title": "Linked List — Seu Primeiro Projeto de Memória", "desc": "Implementar linked list do zero: insert, delete, search, print, free.", "checks": ["Linked list singly: criar, inserir no início e no final", "Remover nó por valor — tratar caso de remover a head", "Buscar nó por valor e retornar ponteiro (ou NULL)", "Imprimir a lista inteira percorrendo com while(current != NULL)", "Liberar a lista inteira: percorrer e free cada nó", "Testar com Valgrind: zero leaks, zero errors após free_list()"], "res": [{"i": "🌐", "l": "Visualgo — Linked List", "t": "online", "u": "https://visualgo.net/en/list"}, {"i": "🔧", "l": "Valgrind", "t": "tool", "u": "https://valgrind.org/"}]}, {"icon": "📦", "title": "Dynamic Array (Vector)", "desc": "Array que cresce automaticamente com realloc — como o Array.push() do JS.", "checks": ["Struct com data (ponteiro), size (quantos itens) e capacity (quantos cabem)", "Push: se size == capacity, dobrar capacity com realloc", "Pop: retornar último elemento e decrementar size", "Get e Set por índice com bounds checking", "Free: liberar o array interno e a struct", "Entender amortized O(1) do push com doubling strategy"], "res": [{"i": "🌐", "l": "Dynamic Array — Wikipedia", "t": "online", "u": "https://en.wikipedia.org/wiki/Dynamic_array"}]}, {"icon": "🗃️", "title": "Hash Table — Estrutura Fundamental", "desc": "Implementar hash table com chaining ou open addressing.", "checks": ["Hash function simples para strings (djb2 ou FNV-1a)", "Resolução de colisão: chaining com linked list", "Operações: put, get, delete, contains", "Resize: quando load factor > 0.75, dobrar e rehash", "Liberar toda a tabela: percorrer buckets e free cada entry", "Testar com Valgrind: inserir 1000 items, deletar, free — zero leaks"], "res": [{"i": "🌐", "l": "Visualgo — Hash Table", "t": "online", "u": "https://visualgo.net/en/hashtable"}]}], "project": {"name": "c-collections — Biblioteca de Estruturas de Dados em C", "desc": "Você vai construir uma <strong>biblioteca de 5 estruturas de dados genéricas em C</strong> — linked list, dynamic array, hash table, stack e BST — todas usando ponteiros, <code>malloc</code>/<code>free</code> e <code>void*</code> para genericidade. O Valgrind deve mostrar <strong>zero leaks</strong> em todas.\n<div class=\"pb-tree\"><span class=\"dir\">c-collections/</span>\n├── <span class=\"dir\">include/</span>\n│   ├── <span class=\"f\">linked_list.h</span>\n│   ├── <span class=\"f\">dynamic_array.h</span>\n│   ├── <span class=\"f\">hash_table.h</span>\n│   ├── <span class=\"f\">stack.h</span>\n│   └── <span class=\"f\">bst.h</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">linked_list.c</span>\n│   ├── <span class=\"f\">dynamic_array.c</span>\n│   ├── <span class=\"f\">hash_table.c</span>\n│   ├── <span class=\"f\">stack.c</span>\n│   └── <span class=\"f\">bst.c</span>\n├── <span class=\"dir\">tests/</span>\n│   ├── <span class=\"f\">test_linked_list.c</span>\n│   ├── <span class=\"f\">test_dynamic_array.c</span>\n│   ├── <span class=\"f\">test_hash_table.c</span>\n│   ├── <span class=\"f\">test_stack.c</span>\n│   ├── <span class=\"f\">test_bst.c</span>\n│   └── <span class=\"f\">test_all.c</span>\n├── <span class=\"f\">Makefile</span>\n└── <span class=\"f\">README.md</span>  <span class=\"cmt\"># diagramas de memória ASCII</span></div>", "goals": [{"i": "🔗", "t": "Linked list genérica com void* — insert_front, insert_back, remove, find, destroy"}, {"i": "📦", "t": "Dynamic array com realloc e doubling strategy — push, pop, get, set"}, {"i": "🗃️", "t": "Hash table string→void* com chaining e resize quando load > 0.75"}, {"i": "🌳", "t": "BST genérica com insert, search, delete (nó com 2 filhos), inorder traversal"}, {"i": "🧪", "t": "make valgrind passa com zero leaks em TODAS as estruturas, 1000+ elementos cada"}], "dels": ["Linked list: ll_create, ll_insert_front/back, ll_remove, ll_find, ll_print, ll_destroy — genérica com void*", "Dynamic array: da_create, da_push, da_pop, da_get, da_set, da_destroy — capacity dobra quando size==capacity", "Hash table: ht_create, ht_put, ht_get, ht_contains, ht_delete, ht_destroy — chaining com linked list, resize", "Stack: stack_create, stack_push, stack_pop, stack_peek, stack_is_empty, stack_destroy — baseada em dynamic array", "BST: bst_create, bst_insert, bst_search, bst_delete, bst_inorder, bst_height, bst_destroy", "Cada teste insere 1000+ elementos, verifica operações, destrói — Valgrind zero leaks", "Edge cases: lista vazia, remover inexistente, hash table com colisões forçadas, stack vazia, BST delete nó com 2 filhos", "README com diagrama ASCII de memória para cada estrutura (boxes=heap blocks, setas=ponteiros)"], "tips": ["<strong>Linked list — structs e API:</strong>\n<div class=\"pb-cmd\">typedef struct Node {\n    void *data;\n    struct Node *next;\n} Node;\n\ntypedef struct {\n    Node *head;\n    size_t size;\n    size_t data_size;\n    void (*free_fn)(void*);\n} LinkedList;\n\n<span class=\"cmt\">// API pública:</span>\nLinkedList* ll_create(size_t data_size, void (*free_fn)(void*));\nvoid  ll_insert_front(LinkedList *list, const void *data);\nvoid  ll_insert_back(LinkedList *list, const void *data);\nbool  ll_remove(LinkedList *list, const void *data, int (*cmp)(const void*, const void*));\nvoid* ll_find(LinkedList *list, const void *data, int (*cmp)(const void*, const void*));\nvoid  ll_destroy(LinkedList *list);</div>", "<strong>Dynamic array — doubling strategy:</strong>\n<div class=\"pb-cmd\">typedef struct {\n    void *data;         <span class=\"cmt\">// bloco contíguo</span>\n    size_t size;        <span class=\"cmt\">// quantos existem</span>\n    size_t capacity;    <span class=\"cmt\">// quantos cabem</span>\n    size_t elem_size;   <span class=\"cmt\">// sizeof de cada</span>\n} DynArray;\n\n<span class=\"cmt\">// Em da_push, quando size == capacity:</span>\narr->capacity *= 2;\narr->data = realloc(arr->data, arr->capacity * arr->elem_size);</div>\nTeste: inserir 10.000 elementos, verificar capacity (4→8→16→...→16384), destruir, Valgrind.", "<strong>Hash table — chaining e resize:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// Hash function (djb2):</span>\nunsigned long hash_djb2(const char *str) {\n    unsigned long hash = 5381;\n    int c;\n    while ((c = *str++))\n        hash = ((hash << 5) + hash) + c;\n    return hash;\n}\n<span class=\"cmt\">// Resize quando load_factor > 0.75:</span>\nif ((float)ht->size / ht->capacity > 0.75) ht_resize(ht);</div>\nTeste: inserir 1000 pares, verificar resize (16→32→...→2048), deletar metade, Valgrind.", "<strong>BST — delete com 2 filhos:</strong> Encontre o <strong>in-order successor</strong> (menor valor da subárvore direita), copie o dado para o nó atual, e delete o successor recursivamente. Este é o caso mais complexo.", "<strong>Teste esperado:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> make test\nlinked_list: ALL TESTS PASSED (1000 elements, 0 leaks)\ndynamic_array: ALL TESTS PASSED (10000 elements, 0 leaks)\nhash_table: ALL TESTS PASSED (1000 pairs, 3 resizes, 0 leaks)\nstack: ALL TESTS PASSED (5000 push/pop, 0 leaks)\nbst: ALL TESTS PASSED (500 inserts, delete with 2 children OK, 0 leaks)\n<span class=\"pr\">$</span> make valgrind\n<span class=\"cmt\"># Exit code 0 = zero leaks</span></div>", "<strong>Critério de \"done\":</strong> <code>make test</code> passa sem falhas, <code>make valgrind</code> retorna código 0, README tem diagrama ASCII de memória para cada estrutura, edge cases todos cobertos."], "refs": [{"i": "📖", "l": "K&R — Cap 5 e 6 (Ponteiros e Structs)", "t": "book"}, {"i": "🌐", "l": "Visualgo — visualização de estruturas", "t": "online", "u": "https://visualgo.net/"}, {"i": "🔧", "l": "Valgrind", "t": "tool", "u": "https://valgrind.org/"}, {"i": "📖", "l": "Modern C — Gustedt", "t": "book", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}]}, "refs": [{"e": "📖", "l": "K&R — The C Programming Language"}, {"e": "📖", "l": "Modern C — Gustedt", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"e": "🔧", "l": "Valgrind", "u": "https://valgrind.org/"}, {"e": "🌐", "l": "cdecl.org", "u": "https://cdecl.org/"}, {"e": "🌐", "l": "CS50 Week 5 — Data Structures", "u": "https://cs50.harvard.edu/x/"}]}, {"id": "c", "label": "FASE 04", "short": "C Avançado & Sistemas", "icon": "⚙️", "dur": "3–4 semanas", "tag": "pensar como o computador", "color": "#22d3ee", "numBg": "#08181e", "numBd": "#10282e", "title": "C Avançado — Representação, Toolchain & Alocação", "desc": "Agora que você está confortável com ponteiros e malloc, é hora de entender <strong>como dados são representados na memória</strong>, como o compilador transforma seu código em binário, e como o próprio malloc funciona por dentro. Esta fase é o que diferencia alguém que usa C de alguém que <strong>pensa em C</strong>.", "topics": [{"icon": "📐", "title": "Structs, Unions e Alinhamento", "desc": "Padding, alinhamento por tipo, bitfields, como dados são fisicamente organizados.", "checks": ["sizeof() para inspecionar padding entre campos", "Reordenar campos de struct para minimizar padding", "__attribute__((packed)) e quando NÃO usar", "Tagged union (enum + union) para tipos variantes", "Bitfields para flags compactas em protocolos"], "res": [{"i": "📖", "l": "Modern C — Cap 12", "t": "book"}]}, {"icon": "🔢", "title": "Representação de Dados — Bits e Bytes", "desc": "Two's complement, IEEE 754, endianness, bitwise operators.", "checks": ["Two's complement: como -1 é representado e por que overflow funciona assim", "IEEE 754 floats: por que 0.1 + 0.2 != 0.3 — inspecionar bits com union", "Endianness: big-endian vs little-endian — detectar em C", "Bitwise operators: AND, OR, XOR, NOT, shifts — usar para flags e masks", "Implementar set_bit, clear_bit, toggle_bit, check_bit", "Converter entre host byte order e network byte order (htonl, ntohl)"], "res": [{"i": "📖", "l": "CS:APP Cap 2", "t": "book"}, {"i": "🌐", "l": "float.exposed", "t": "online", "u": "https://float.exposed/"}]}, {"icon": "🔀", "title": "Function Pointers e Callbacks", "desc": "Ponteiros para funções, dispatch tables, polimorfismo em C, qsort.", "checks": ["Sintaxe de function pointer: int (*fn)(int, int)", "Usar qsort() com comparador customizado", "Dispatch table: array de function pointers para state machine", "Callbacks com void* para contexto genérico", "Implementar sistema pub/sub simples com function pointers"], "res": [{"i": "📖", "l": "K&R C — Cap 5.11", "t": "book"}, {"i": "🌐", "l": "cdecl.org", "t": "online", "u": "https://cdecl.org/"}]}, {"icon": "⚙️", "title": "Toolchain Completa: Preprocessador, Linker, ELF", "desc": "O processo completo: preprocessador → compilador → assembler → linker → binário ELF.", "checks": ["Preprocessador: #define, #ifdef, include guards, macros com argumentos", "Compilar com -E para ver saída do preprocessador", "Linking estático (.a) vs dinâmico (.so) — criar ambos", "Usar objdump -d e readelf para inspecionar binários", "Entender o formato ELF: headers, sections (.text, .data, .bss, .rodata)", "nm para listar símbolos e entender name mangling"], "res": [{"i": "🔧", "l": "gcc manpage", "t": "tool"}, {"i": "📖", "l": "CS:APP Cap 7 (Linking)", "t": "book", "u": "https://csapp.cs.cmu.edu/"}]}, {"icon": "🐛", "title": "Debugging Avançado: GDB, ASan, UBSan", "desc": "Breakpoints condicionais, watchpoints, sanitizers, debugging de produção.", "checks": ["GDB: breakpoints condicionais (break if count > 100)", "GDB: watchpoints para detectar quando variável muda valor", "GDB: backtrace em segfault — encontrar a linha exata", "AddressSanitizer (-fsanitize=address): detectar buffer overflow e use-after-free", "UndefinedBehaviorSanitizer (-fsanitize=undefined): detectar UB silencioso", "Valgrind --leak-check=full --track-origins=yes para leaks complexos"], "res": [{"i": "🔧", "l": "GDB docs", "t": "tool", "u": "https://sourceware.org/gdb/current/onlinedocs/gdb/"}, {"i": "🔧", "l": "ASan docs — Google", "t": "online", "u": "https://github.com/google/sanitizers/wiki/AddressSanitizer"}]}, {"icon": "🏗️", "title": "Projeto de Alocador: Preparação Conceitual", "desc": "Entender como malloc funciona antes de implementar: free list, headers, coalescing.", "checks": ["Entender sbrk() e mmap() — como o OS entrega memória ao processo", "Block header: metadados antes de cada bloco (size, is_free, ponteiros)", "Free list: lista ligada de blocos disponíveis", "Estratégias de busca: first-fit, best-fit, worst-fit — trade-offs", "Coalescing: mergear blocos livres adjacentes para evitar fragmentação", "Alinhamento: por que endereços devem ser múltiplos de 8 ou 16"], "res": [{"i": "📖", "l": "K&R — Cap 8.7 (Storage Allocator)", "t": "book"}, {"i": "🌐", "l": "glibc malloc internals", "t": "online", "u": "https://sourceware.org/glibc/wiki/MallocInternals"}]}, {"icon": "🔗", "title": "Ponte .NET/CLR → C: Como Runtimes Funcionam", "desc": "Conectar sua experiência com .NET ao entendimento de como runtimes gerenciados funcionam por dentro.", "checks": ["CLR JIT vs V8 JIT: ambos compilam bytecode → machine code em runtime", ".NET GC (generational) vs malloc manual: por que GC pausa e malloc não", "Value types (struct) vs Reference types (class) no CLR — análogo a stack vs heap em C", "P/Invoke: como .NET chama código C nativo (similar ao N-API no Node.js)", "Como Entity Framework gera SQL — análogo ao que Prisma faz para Node.js"], "res": [{"i": "📖", "l": ".NET Runtime Architecture", "t": "online", "u": "https://learn.microsoft.com/en-us/dotnet/standard/managed-execution-process"}, {"i": "📖", "l": "Book of the Runtime (BotR)", "t": "online", "u": "https://github.com/dotnet/runtime/blob/main/docs/design/coreclr/botr/README.md"}, {"i": "🌐", "l": ".NET GC Fundamentals", "t": "online", "u": "https://learn.microsoft.com/en-us/dotnet/standard/garbage-collection/fundamentals"}]}], "project": {"name": "my_malloc — Alocador de Memória do Zero", "desc": "Você vai implementar <code>my_malloc()</code>, <code>my_free()</code>, <code>my_realloc()</code> e <code>my_calloc()</code> em C puro — obtendo memória do SO com <code>sbrk()</code> e gerenciando com free list, coalescing e alinhamento. Depois disso, <code>Buffer.alloc()</code> no Node.js nunca mais vai ser mágica.\n<div class=\"pb-tree\"><span class=\"dir\">my_malloc/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">my_malloc.c</span>   <span class=\"cmt\"># implementação principal</span>\n│   ├── <span class=\"f\">my_malloc.h</span>   <span class=\"cmt\"># API pública</span>\n│   └── <span class=\"f\">debug.c</span>       <span class=\"cmt\"># funções de debug (dump free list)</span>\n├── <span class=\"dir\">tests/</span>\n│   ├── <span class=\"f\">test_basic.c</span>  <span class=\"cmt\"># malloc/free simples</span>\n│   ├── <span class=\"f\">test_stress.c</span> <span class=\"cmt\"># 10.000 operações aleatórias</span>\n│   └── <span class=\"f\">test_edge.c</span>  <span class=\"cmt\"># edge cases</span>\n├── <span class=\"f\">Makefile</span>\n└── <span class=\"f\">README.md</span>      <span class=\"cmt\"># diagramas da free list</span></div>", "goals": [{"i": "📦", "t": "Block header com size, is_free, ponteiros prev/next — alinhado a 16 bytes"}, {"i": "🔗", "t": "Free list duplamente ligada com busca first-fit"}, {"i": "🔀", "t": "Coalescing de blocos livres adjacentes ao free()"}, {"i": "📏", "t": "Alinhamento de 16 bytes para todos os ponteiros retornados"}, {"i": "🧪", "t": "Stress test: 10.000 malloc/free/realloc aleatórios — zero erros no Valgrind"}], "dels": ["my_malloc(size_t): aloca bloco, retorna ponteiro alinhado 16 bytes, usa sbrk() para pedir memória ao SO", "my_free(void*): marca bloco como livre, faz coalescing com vizinhos livres adjacentes", "my_realloc(void*, size_t): expande in-place se possível, senão aloca novo + copia + free antigo", "my_calloc(size_t n, size_t size): aloca e zera, detecta overflow em n*size", "debug_dump_heap(): imprime estado da free list (endereço, tamanho, livre/ocupado de cada bloco)", "test_stress.c: 10.000 operações aleatórias (malloc/free/realloc) sem leaks nem erros", "README com diagrama do header de bloco, estrutura da free list e estratégia de coalescing"], "tips": ["<strong>Header de bloco:</strong>\n<div class=\"pb-cmd\">typedef struct block {\n    size_t size;           <span class=\"cmt\">// tamanho dos dados (sem header)</span>\n    int free;              <span class=\"cmt\">// 1 = livre, 0 = ocupado</span>\n    struct block *next;    <span class=\"cmt\">// próximo na free list</span>\n    struct block *prev;    <span class=\"cmt\">// anterior na free list</span>\n} block_t;\n\n<span class=\"cmt\">// O ponteiro retornado aponta DEPOIS do header:</span>\n<span class=\"cmt\">// [header | dados do usuário...]</span>\n<span class=\"cmt\">//         ^ ponteiro retornado</span>\n#define HEADER_SIZE (sizeof(block_t))\n#define ALIGN16(x) (((x) + 15) & ~15)</div>", "<strong>my_malloc — passo a passo:</strong> 1) Percorra a free list buscando bloco com <code>b->free && b->size >= size</code> (first-fit). 2) Se encontrou, marque como ocupado e retorne <code>(void*)(b + 1)</code>. 3) Se não encontrou, peça mais memória com <code>sbrk(ALIGN16(size + HEADER_SIZE))</code>, crie novo bloco no final.", "<strong>Coalescing no free():</strong>\n<div class=\"pb-cmd\">void my_free(void *ptr) {\n    block_t *b = (block_t*)ptr - 1;\n    b->free = 1;\n    <span class=\"cmt\">// Coalece com próximo se livre</span>\n    if (b->next && b->next->free) {\n        b->size += HEADER_SIZE + b->next->size;\n        b->next = b->next->next;\n        if (b->next) b->next->prev = b;\n    }\n    <span class=\"cmt\">// Coalece com anterior se livre</span>\n    if (b->prev && b->prev->free) {\n        b->prev->size += HEADER_SIZE + b->size;\n        b->prev->next = b->next;\n        if (b->next) b->next->prev = b->prev;\n    }\n}</div>", "<strong>Teste de stress:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// test_stress.c</span>\n#define N 10000\nvoid *ptrs[N] = {0};\nsrand(42);\nfor (int i = 0; i < N * 3; i++) {\n    int idx = rand() % N;\n    if (ptrs[idx]) { my_free(ptrs[idx]); ptrs[idx] = NULL; }\n    else {\n        size_t sz = (rand() % 1024) + 1;\n        ptrs[idx] = my_malloc(sz);\n        memset(ptrs[idx], 0xAA, sz); <span class=\"cmt\">// escrever para detectar overlap</span>\n    }\n}\nfor (int i = 0; i < N; i++) if (ptrs[i]) my_free(ptrs[i]);</div>", "<strong>Critério de \"done\":</strong> stress test passa sem segfault, <code>debug_dump_heap()</code> mostra free list coerente (sem blocos sobrepostos), README tem diagrama da free list antes e depois de coalescing."], "refs": [{"i": "📖", "l": "K&R — Cap 8.7 (Storage Allocator)", "t": "book"}, {"i": "🌐", "l": "glibc malloc internals", "t": "online", "u": "https://sourceware.org/glibc/wiki/MallocInternals"}, {"i": "🔧", "l": "Valgrind", "t": "tool", "u": "https://valgrind.org/"}, {"i": "📖", "l": "CS:APP — Cap 9 (Virtual Memory)", "t": "book", "u": "https://csapp.cs.cmu.edu/"}]}, "refs": [{"e": "📖", "l": "K&R — The C Programming Language"}, {"e": "📖", "l": "Modern C — Gustedt", "u": "https://gustedt.gitlabpages.inria.fr/modern-c/"}, {"e": "📖", "l": "CS:APP", "u": "https://csapp.cs.cmu.edu/"}, {"e": "🔧", "l": "Valgrind", "u": "https://valgrind.org/"}, {"e": "🌐", "l": "float.exposed", "u": "https://float.exposed/"}]}, {"id": "asm", "label": "FASE 05", "short": "Assembly & CPU", "icon": "🧮", "dur": "3–4 semanas", "tag": "núcleo low-level", "color": "#3b9eff", "numBg": "#08122a", "numBd": "#10203a", "title": "Assembly, CPU e Performance", "desc": "Não é sobre escrever Assembly — é sobre <strong>ler o que o compilador gera</strong> e entender custos de abstrações. Compiler Explorer será sua ferramenta favorita.", "topics": [{"icon": "🧮", "title": "x86-64 Assembly", "desc": "Registradores, modos de endereçamento, instruções básicas.", "checks": ["16 registradores x86-64", "Hello World em NASM puro", "Loop for em ASM", "6 modos de endereçamento"], "res": [{"i": "🌐", "l": "nasm.us", "t": "online", "u": "https://www.nasm.us/"}]}, {"icon": "📚", "title": "Stack Frames e Calling Conv.", "desc": "System V AMD64 ABI, prologue/epilogue, red zone.", "checks": ["Stack frame completo no papel", "Função C chamada por ASM", "Recursão e stack overflow", "GDB: rbp/rsp durante call"], "res": [{"i": "📖", "l": "CS:APP Cap 3", "t": "book"}]}, {"icon": "🔬", "title": "Compiler Explorer", "desc": "ASM gerado, flags -O0 a -O3, inlining, auto-vectorization.", "checks": ["-O0 vs -O3 no Godbolt", "Loop unrolling", "SIMD auto-vectorization", "volatile para evitar otimizações"], "res": [{"i": "🌐", "l": "godbolt.org", "t": "online", "u": "https://godbolt.org/"}]}, {"icon": "⚡", "title": "Cache & CPU Internals", "desc": "L1/L2/L3, cache lines 64B, locality, prefetching, false sharing.", "checks": ["Medir latência L1/L2/RAM", "Row vs column major benchmark", "False sharing em structs", "perf stat cache-misses"], "res": [{"i": "📖", "l": "What Every Programmer Should Know About Memory", "t": "book", "u": "https://people.freebsd.org/~lstewart/articles/cpumemory.pdf"}]}, {"icon": "🚀", "title": "Pipeline e Branch Prediction", "desc": "Out-of-order execution, speculative, branchless programming.", "checks": ["Com e sem branch + perf", "max(a,b) branchless com CMOV", "Spectre em alto nível"], "res": [{"i": "📖", "l": "Agner Fog Microarchitecture", "t": "book", "u": "https://www.agner.org/optimize/"}]}, {"icon": "🛡️", "title": "SIMD — SSE/AVX", "desc": "XMM (128-bit), YMM (256-bit), operações vetoriais.", "checks": ["_mm_add_ps para 4 floats", "Dot product scalar vs SIMD", "Alinhamento para SIMD"], "res": [{"i": "🌐", "l": "Intel Intrinsics Guide", "t": "online", "u": "https://www.intel.com/content/www/us/en/docs/intrinsics-guide/index.html"}]}, {"icon": "🔓", "title": "Segurança de Memória", "desc": "Buffer overflows, stack canaries, ASLR, DEP/NX.", "checks": ["Buffer overflow simples (ASLR off)", "Stack canaries", "ASLR com /proc/self/maps", "-fno-stack-protector e comparar"], "res": [{"i": "🌐", "l": "overthewire.org", "t": "online", "u": "https://overthewire.org/wargames/"}]}], "project": {"name": "perf-profiler — Framework de Microbenchmark com Análise de Cache", "desc": "Você vai construir um <strong>framework de microbenchmark em C</strong> que mede operações com precisão de nanosegundos usando RDTSC e depois prova empiricamente como cache misses e branch mispredictions destroem performance.\n<div class=\"pb-tree\"><span class=\"dir\">perf-profiler/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">bench.h</span>         <span class=\"cmt\"># macros BENCH_START/BENCH_END</span>\n│   ├── <span class=\"f\">timer.c/h</span>       <span class=\"cmt\"># RDTSC wrapper calibrado</span>\n│   ├── <span class=\"f\">bench_cache.c</span>   <span class=\"cmt\"># row-major vs column-major</span>\n│   ├── <span class=\"f\">bench_sort.c</span>    <span class=\"cmt\"># insertion vs merge vs qsort</span>\n│   ├── <span class=\"f\">bench_struct.c</span>  <span class=\"cmt\"># padding vs packed</span>\n│   ├── <span class=\"f\">bench_simd.c</span>    <span class=\"cmt\"># scalar vs SSE/AVX</span>\n│   └── <span class=\"f\">bench_branch.c</span> <span class=\"cmt\"># sorted vs unsorted branch</span>\n├── <span class=\"dir\">results/</span>\n│   └── <span class=\"f\">*.csv</span>           <span class=\"cmt\"># output de cada benchmark</span>\n├── <span class=\"f\">plot.py</span>             <span class=\"cmt\"># gera gráficos dos CSVs</span>\n├── <span class=\"f\">Makefile</span>\n├── <span class=\"f\">analysis.md</span>        <span class=\"cmt\"># explicação de cada resultado</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "⏱", "t": "Timer RDTSC calibrado com overhead medido e warmup de cache antes de cada benchmark"}, {"i": "📊", "t": "5 benchmarks cobrindo: cache, sorting, struct layout, SIMD, branch prediction"}, {"i": "🔬", "t": "Verificação com perf stat: cache-misses, branch-misses, IPC para cada benchmark"}, {"i": "🧮", "t": "Benchmark SIMD: dot product scalar vs SSE/AVX com speedup ~4x documentado"}, {"i": "📝", "t": "analysis.md explicando cada resultado com base em latências de cache (L1=4cy, L2=12cy, RAM=200cy)"}], "dels": ["Timer RDTSC com serialização CPUID, calibração contra clock_gettime, overhead < 50 ciclos", "Benchmark cache: row-major vs column-major em matrix NxN — mostrando 5-10x diferença", "Benchmark sort: insertion vs merge vs qsort para N=100, 1k, 10k, 100k — tabela CSV", "Benchmark struct: padding vs packed mostrando custo real de misalignment", "Benchmark SIMD: soma de 1M floats com loop vs _mm256_add_ps — speedup ~4-8x", "Benchmark branch: mesmo código com array sorted vs unsorted mostrando efeito da branch prediction", "Output CSV: nome, N, ciclos_min, ciclos_median, ciclos_p99, cache_misses", "analysis.md: cada resultado explicado com latências teóricas de cache"], "refs": [{"i": "📖", "l": "What Every Programmer Should Know About Memory — Drepper", "t": "online", "u": "https://people.freebsd.org/~lstewart/articles/cpumemory.pdf"}, {"i": "🌐", "l": "Compiler Explorer — godbolt.org", "t": "online", "u": "https://godbolt.org/"}, {"i": "🌐", "l": "Intel Intrinsics Guide", "t": "online", "u": "https://www.intel.com/content/www/us/en/docs/intrinsics-guide/index.html"}, {"i": "📖", "l": "Agner Fog — Optimizing Software in C++", "t": "online", "u": "https://www.agner.org/optimize/"}], "tips": ["<strong>Timer RDTSC:</strong>\n<div class=\"pb-cmd\">static inline uint64_t rdtsc(void) {\n    unsigned int lo, hi;\n    __asm__ volatile(\"rdtsc\" : \"=a\"(lo), \"=d\"(hi));\n    return ((uint64_t)hi << 32) | lo;\n}\n<span class=\"cmt\">// Uso:</span>\nuint64_t start = rdtsc();\n<span class=\"cmt\">// ... operação a medir ...</span>\nuint64_t end = rdtsc();\nprintf(\"Ciclos: %lu\\n\", end - start);</div>", "<strong>Benchmark cache — o mais revelador:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// Row-major (cache-friendly):</span>\nfor (int i = 0; i < N; i++)\n    for (int j = 0; j < N; j++)\n        sum += matrix[i][j];  <span class=\"cmt\">// acessa sequencialmente</span>\n\n<span class=\"cmt\">// Column-major (cache-hostile):</span>\nfor (int j = 0; j < N; j++)\n    for (int i = 0; i < N; i++)\n        sum += matrix[i][j];  <span class=\"cmt\">// pula N*sizeof(int) bytes a cada acesso</span></div>\nCom N=4096 e int (4 bytes), column-major será 5-10x mais lento. Verificar com <code>perf stat -e cache-misses</code>.", "<strong>SIMD — soma de floats:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// Scalar:</span>\nfloat sum = 0;\nfor (int i = 0; i < N; i++) sum += arr[i];\n\n<span class=\"cmt\">// AVX (8 floats por vez):</span>\n__m256 vsum = _mm256_setzero_ps();\nfor (int i = 0; i < N; i += 8)\n    vsum = _mm256_add_ps(vsum, _mm256_loadu_ps(&arr[i]));\n<span class=\"cmt\">// horizontal sum dos 8 floats no vetor</span></div>\nCompilar com <code>-mavx2</code>. Speedup esperado: ~4-8x.", "<strong>Verificar com perf:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> perf stat -e cache-misses,cache-references,branches,branch-misses ./bin/bench_cache\n<span class=\"pr\">$</span> perf stat -e instructions,cycles ./bin/bench_simd</div>", "<strong>Critério de \"done\":</strong> 5 benchmarks produzindo CSVs, <code>python3 plot.py</code> gera gráficos, analysis.md com explicação detalhada de cada resultado vinculado à teoria."]}, "refs": [{"e": "📖", "l": "CS:APP", "u": "https://csapp.cs.cmu.edu/"}, {"e": "🌐", "l": "Compiler Explorer", "u": "https://godbolt.org/"}, {"e": "📖", "l": "Agner Fog Optimization", "u": "https://www.agner.org/optimize/"}, {"e": "🌐", "l": "Intel Intrinsics", "u": "https://www.intel.com/content/www/us/en/docs/intrinsics-guide/index.html"}]}, {"id": "os", "label": "FASE 06", "short": "Sistemas Operacionais", "icon": "🐧", "dur": "4–5 semanas", "tag": "conecta com Node.js", "color": "#ff6b35", "numBg": "#1a0e08", "numBd": "#2a1808", "title": "Sistemas Operacionais — O Kernel por Baixo do Node.js", "desc": "Todo <code>fs.readFile()</code>, todo <code>net.createServer()</code> faz uma syscall. Você vai entender <strong>exatamente</strong> como o event loop funciona — as syscalls por baixo.", "topics": [{"icon": "🐧", "title": "Syscalls Linux", "desc": "User space → kernel, strace, as 10 syscalls mais comuns.", "checks": ["strace em node app.js", "Syscall diretamente em assembly", "Número de syscall no rax", "/proc/PID/maps de processo Node"], "res": [{"i": "📖", "l": "TLPI Cap 3-4", "t": "book"}, {"i": "🔧", "l": "strace", "t": "tool"}]}, {"icon": "🧵", "title": "Processos e Threads", "desc": "fork/exec/wait, pthreads, mutexes, "https://www.youtube.com/watch?v=8fi7uSYlOdc"}]}], "project": {"name": "mini-eventloop — Event Loop em C Inspirado no libuv", "desc": "Você vai construir um <strong>event loop em C</strong> usando epoll — o mesmo mecanismo que o libuv usa por baixo do Node.js. Ao final, você vai abrir o source do libuv e entender <code>uv__io_poll()</code> linha por linha.\n<div class=\"pb-tree\"><span class=\"dir\">mini-eventloop/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">loop.c/h</span>       <span class=\"cmt\"># loop principal com epoll_wait</span>\n│   ├── <span class=\"f\">tcp.c/h</span>        <span class=\"cmt\"># echo server TCP não-bloqueante</span>\n│   ├── <span class=\"f\">timer.c/h</span>      <span class=\"cmt\"># min-heap de timers</span>\n│   ├── <span class=\"f\">threadpool.c/h</span> <span class=\"cmt\"># pool de pthreads para I/O bloqueante</span>\n│   ├── <span class=\"f\">http.c/h</span>       <span class=\"cmt\"># parser HTTP básico</span>\n│   └── <span class=\"f\">main.c</span>\n├── <span class=\"dir\">public/</span>\n│   └── <span class=\"f\">index.html</span>     <span class=\"cmt\"># arquivo estático servido pelo HTTP</span>\n├── <span class=\"f\">Makefile</span>\n├── <span class=\"f\">libuv-mapping.md</span>  <span class=\"cmt\"># diagrama seu código → libuv</span>\n└── <span class=\"f\">README.md</span></div>", "goals": [{"i": "🔄", "t": "Loop principal com epoll_wait() tratando I/O, timers e tasks do thread pool"}, {"i": "🌐", "t": "Echo server TCP suportando 100+ conexões simultâneas em thread única"}, {"i": "⏰", "t": "Timer system com min-heap: setTimeout/setInterval com precisão ±5ms"}, {"i": "🧵", "t": "Thread pool (4 threads) para tarefas bloqueantes com callback no loop principal"}, {"i": "📋", "t": "Diagrama mapeando cada parte do seu código para a fase correspondente do libuv"}], "dels": ["Loop: epoll_wait() como núcleo, wakeup pipe para acordar de fora da thread principal", "TCP echo server: accept + read/write assíncronos, 100+ clientes simultâneos sem threads", "Timer min-heap: registrar timer, disparar callback no tempo certo, recalcular timeout do epoll", "Thread pool: fila com mutex + condvar, enviar trabalho bloqueante, callback no loop via wakeup pipe", "HTTP parser: parsear GET method/path, responder com arquivo de public/, Content-Type correto", "libuv-mapping.md: uv__io_poll→epoll_wait, uv_timer_t→min-heap, uv__work→thread pool"], "refs": [{"i": "🌐", "l": "libuv source", "t": "online", "u": "https://github.com/libuv/libuv"}, {"i": "📖", "l": "OSTEP (gratuito)", "t": "online", "u": "https://pages.cs.wisc.edu/~remzi/OSTEP/"}, {"i": "📖", "l": "TLPI — Kerrisk", "t": "book", "u": "https://man7.org/tlpi/"}, {"i": "🌐", "l": "Lord of the io_uring", "t": "online", "u": "https://unixism.net/loti/"}], "tips": ["<strong>Loop principal — estrutura:</strong>\n<div class=\"pb-cmd\">while (loop->running) {\n    <span class=\"cmt\">// 1. Calcular timeout do próximo timer</span>\n    int timeout = timer_next_timeout(loop);\n    <span class=\"cmt\">// 2. Esperar eventos de I/O</span>\n    int n = epoll_wait(loop->epfd, events, MAX_EVENTS, timeout);\n    <span class=\"cmt\">// 3. Processar eventos de I/O</span>\n    for (int i = 0; i < n; i++) handle_event(loop, &events[i]);\n    <span class=\"cmt\">// 4. Disparar timers expirados</span>\n    timer_process(loop);\n    <span class=\"cmt\">// 5. Processar callbacks do thread pool</span>\n    threadpool_drain_done(loop);\n}</div>", "<strong>TCP não-bloqueante — setup:</strong>\n<div class=\"pb-cmd\"><span class=\"cmt\">// Tornar socket não-bloqueante:</span>\nint flags = fcntl(fd, F_GETFL, 0);\nfcntl(fd, F_SETFL, flags | O_NONBLOCK);\n<span class=\"cmt\">// Registrar no epoll:</span>\nstruct epoll_event ev = { .events = EPOLLIN | EPOLLET, .data.fd = fd };\nepoll_ctl(loop->epfd, EPOLL_CTL_ADD, fd, &ev);</div>", "<strong>Timer min-heap:</strong> Use array onde parent de i está em (i-1)/2, filhos em 2i+1 e 2i+2. O timer com menor deadline fica no topo. No loop, <code>timeout = heap[0].deadline - now_ms()</code>.", "<strong>Thread pool + wakeup pipe:</strong> O loop cria um <code>pipe()</code>. Quando uma thread termina trabalho, ela escreve 1 byte no pipe. O epoll detecta e o loop processa o callback.", "<strong>Testar:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> ./bin/mini-eventloop &\n<span class=\"pr\">$</span> curl http://localhost:8080/index.html  <span class=\"cmt\"># deve servir arquivo</span>\n<span class=\"pr\">$</span> <span class=\"cmt\"># Em outro terminal, abrir 100+ conexões TCP:</span>\nfor i in $(seq 1 100); do echo \"hello\" | nc localhost 8080 & done</div>", "<strong>Critério de \"done\":</strong> echo server aguenta 100+ conexões, timers disparam com precisão, thread pool processa tarefas sem race conditions (testar com <code>-fsanitize=thread</code>), diagrama de mapeamento libuv completo."]}, "refs": [{"e": "📖", "l": "TLPI — Kerrisk", "u": "https://man7.org/tlpi/"}, {"e": "📖", "l": "OSTEP (gratuito)", "u": "https://pages.cs.wisc.edu/~remzi/OSTEP/"}, {"e": "🌐", "l": "libuv source", "u": "https://github.com/libuv/libuv"}, {"e": "🌐", "l": "Lord of the io_uring", "u": "https://unixism.net/loti/"}]}, {"id": "net", "label": "FASE 07", "short": "Redes & Protocolos", "icon": "🔌", "dur": "3–4 semanas", "tag": "do socket ao HTTP", "color": "#bf5fff", "numBg": "#160a22", "numBd": "#241030", "title": "Redes de Computadores e Protocolos", "desc": "O que acontece quando <code>fetch()</code> é chamado — desde <code>connect()</code> até TCP handshake, HTTP request e keep-alive.", "topics": [{"icon": "🔌", "title": "Sockets BSD", "desc": "TCP e UDP, options, Wireshark.", "checks": ["Echo server TCP em C", "Cliente/servidor UDP", "Wireshark para pacotes", "TIME_WAIT e SO_REUSEADDR"], "res": [{"i": "📖", "l": "Beej's Guide", "t": "online", "u": "https://beej.us/guide/bgnet/"}]}, {"icon": "🤝", "title": "TCP Internals", "desc": "Handshake, sliding window, congestion control.", "checks": ["TCP handshake no Wireshark", "MSS e window size", "TCP_NODELAY no Node.js", "Packet loss e retransmissão"], "res": [{"i": "📖", "l": "TCP/IP Illustrated", "t": "book"}]}, {"icon": "🌐", "title": "HTTP/1.1, HTTP/2, HTTP/3", "desc": "Parser HTTP, keep-alive, multiplexing, QUIC.", "checks": ["Parser HTTP/1.1 em C", "Arquivo estático sem lib", "HTTP/2 vs head-of-line blocking", "HTTP/3 QUIC: 0-RTT, no HOL"], "res": [{"i": "📖", "l": "HTTP/3 Explained", "t": "online", "u": "https://http3-explained.haxx.se/"}]}, {"icon": "🔐", "title": "TLS/SSL", "desc": "TLS 1.3, certificados, PKI, OpenSSL.", "checks": ["TLS handshake no Wireshark", "CA + certificado com openssl", "TLS no servidor TCP"], "res": [{"i": "📖", "l": "Bulletproof TLS", "t": "book"}]}, {"icon": "📦", "title": "DNS e Camadas", "desc": "Resolver, ARP, OSI, roteamento IP.", "checks": ["DNS resolver UDP em C", "dig/nslookup", "ARP com tcpdump"], "res": [{"i": "📖", "l": "Computer Networks (Tanenbaum)", "t": "book"}]}, {"icon": "🔃", "title": "WebSocket e Zero-Copy", "desc": "Handshake, framing, sendfile, splice.", "checks": ["WebSocket handshake em C", "Parsear frames WS", "sendfile vs read+write", "splice entre FDs"], "res": [{"i": "🌐", "l": "RFC 6455", "t": "online", "u": "https://datatracker.ietf.org/doc/html/rfc6455"}]}], "project": {"name": "http-server — Servidor HTTP/1.1 em C do Zero", "desc": "Você vai construir um <strong>servidor HTTP/1.1 completo em C</strong> usando apenas sockets BSD e epoll — sem nenhuma lib. O objetivo é entender cada byte entre cliente e servidor, visível no Wireshark.\n<div class=\"pb-tree\"><span class=\"dir\">http-server/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">server.c/h</span>    <span class=\"cmt\"># socket, bind, listen, accept</span>\n│   ├── <span class=\"f\">epoll.c/h</span>     <span class=\"cmt\"># wrapper epoll</span>\n│   ├── <span class=\"f\">http.c/h</span>      <span class=\"cmt\"># parser HTTP/1.1</span>\n│   ├── <span class=\"f\">response.c/h</ an>\nGET /index.html HTTP/1.1\\r\\n\n<span class=\"cmt\">// Headers (até \\r\\n\\r\\n):</span>\nHost: localhost:8080\\r\\n\nConnection: keep-alive\\r\\n\n\\r\\n\n<span class=\"cmt\">// Seu parser deve extrair: method, path, version, headers[]</span></div>", "<strong>Serving com mmap() — zero-copy:</strong>\n<div class=\"pb-cmd\">int fd = open(filepath, O_RDONLY);\nstruct stat st;\nfstat(fd, &st);\nvoid *data = mmap(NULL, st.st_size, PROT_READ, MAP_PRIVATE, fd, 0);\n<span class=\"cmt\">// Enviar headers + data com send()</span>\nsend(client_fd, header_buf, header_len, 0);\nsend(client_fd, data, st.st_size, 0);\nmunmap(data, st.st_size);\nclose(fd);</div>", "<strong>Benchmark com wrk:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> wrk -t4 -c10 -d10s http://localhost:8080/index.html\n<span class=\"pr\">$</span> wrk -t4 -c100 -d10s http://localhost:8080/index.html\n<span class=\"pr\">$</span> wrk -t4 -c1000 -d10s http://localhost:8080/index.html\n<span class=\"cmt\"># Documentar: requests/sec, latency avg/p99, transfer/sec</span></div>", "<strong>Critério de \"done\":</strong> <code>curl http://localhost:8080/index.html</code> retorna HTML, <code>wrk</code> mostra >10k req/s com 100 conexões, Wireshark mostra keep-alive funcionando, todos os status codes implementados."]}, "refs": [{"e": "📖", "l": "Beej's Guide to Network Programming", "u": "https://beej.us/guide/bgnet/"}, {"e": "📖", "l": "HTTP/3 Explained", "u": "https://http3-explained.haxx.se/"}, {"e": "🌐", "l": "RFC 6455 — WebSocket", "u": "https://datatracker.ietf.org/doc/html/rfc6455"}, {"e": "🔧", "l": "Wireshark", "u": "https://www.wireshark.org/"}]}, {"id": "cpp", "label": "FASE 08", "short": "C++ Moderno", "icon": "⚙️", "dur": "3–4 semanas", "tag": "ponte para sistemas", "color": "#00d4ff", "numBg": "#08181e", "numBd": "#10282e", "title": "C++ Moderno — Performance com Abstração", "desc": "C++ do V8, Chrome e LLVM. Seu TypeScript faz <strong>muito mais sentido</strong> quando você entender RAII e o e, FetchContent para dependências externas"], "res": [{"i": "🌐", "l": "CMake Tutorial", "t": "online", "u": "https://cmake.org/cmake/help/latest/guide/tutorial/"}]}], "project": {"name": "node-lz4 — Native Addon de Compressão LZ4 para Node.js", "desc": "Você vai criar um <strong>módulo nativo para Node.js</strong> que expõe compressão LZ4 via N-API — a ponte entre C++ de performance e JavaScript ergonômico. A API JS é Promise-based com TypeScript types, mas por baixo roda C++ puro.\n<div class=\"pb-tree\"><span class=\"dir\">node-lz4/</span>\n├── <span class=\"dir\">src/</span>\n│   ├── <span class=\"f\">addon.cc</span>       <span class=\"cmt\"># entry point N-API</span>\n│   ├── <span class=\"f\">compress.cc/h</span>  <span class=\"cmt\"># compress sync + async</span>\n│   └── <span class=\"f\">decompress.cc/h</span>\n├── <span class=\"dir\">lib/</span>\n│   └── <span class=\"f\">index.d.ts</span>     <span class=\"cmt\"># TypeScript definitions</span>\n├── <span class=\"dir\">test/</span>\n│   ├── <span class=\"f\">basic.test.js</span>\n│   └── <span class=\"f\">benchmark.js</span>\n├── <span class=\"f\">binding.gyp</span>       <span class=\"cmt\"># build config</span>\n├── <span class=\"f\">package.json</span>\n└── <span class=\"f\">README.md</span>         <span class=\"cmt\"># benchmark results</span></div>", "goals": [{"i": "🔧", "t": "Binding C++ via N-API: compress/decompress síncronos Buffer JS → C++ → Buffer JS"}, {"i": "⚡", "t": "API assíncrona com AsyncWorker: não bloqueia event loop"}, {"i": "📊", "t": "Benchmark vs zlib nativo vs JS puro para 1KB, 100KB, 10MB"}, {"i": "📦", "t": "Publicável no npm com TypeScript definitions (.d.ts)"}, {"i": "🧪", "t": "Testes: round-trip, dados corrompidos, buffer vazio"}], "dels": ["lz4_compress/decompress síncronos: Buffer JS → uint8_t* C++ → Buffer JS de volta", "lz4CompressAsync/decompressAsync com AsyncWorker: Promise-based, thread pool", "Tratamento de erros: dados inválidos, buffer insuficiente → exceção JS clara", "Benchmark: addon C++ vs zlib (built-in) vs lz4js (pure JS) para 3 tamanhos de arquivo", "TypeScript definitions: export function compress(input: Buffer): Buffer", "Testes: round-trip (compress→decompress===original), dados corrompidos, buffer vazio"], "refs": [{"i": "📖", "l": "N-API — Node.js docs", "t": "online", "u": "https://nodejs.org/api/n-api.html"}, {"i": "🌐", "l": "node-addon-api (C++ wrapper)", "t": "online", "u": "https://github.com/nodejs/node-addon-api"}, {"i": "🌐", "l": "lz4 source (C)", "t": "online", "u": "https://github.com/lz4/lz4"}], "tips": ["<strong>Binding síncrono — compress:</strong>\n<div class=\"pb-cmd\">Napi::Value CompressSync(const Napi::CallbackInfo& info) {\n    Napi::Buffer<uint8_t> input = info[0].As<Napi::Buffer<uint8_t>>();\n    int src_size = input.Length();\n    int max_dst = LZ4_compressBound(src_size);\n    auto output = Napi::Buffer<uint8_t>::New(info.Env(), max_dst);\n    int compressed_size = LZ4_compress_default(\n        (const char*)input.Data(), (char*)output.Data(), src_size, max_dst);\n    <span class=\"cmt\">// Retornar buffer truncado ao tamanho real</span>\n    return Napi::Buffer<uint8_t>::Copy(info.Env(), output.Data(), compressed_size);\n}</div>", "<strong>AsyncWorker — não bloquear o event loop:</strong>\n<div class=\"pb-cmd\">class CompressWorker : public Napi::AsyncWorker {\n    void Execute() override {\n        <span class=\"cmt\">// Roda na thread pool (NÃO no event loop)</span>\n        compressed_size = LZ4_compress_default(src, dst, src_len, max_dst);\n    }\n    void OnOK() override {\n        <span class=\"cmt\">// Roda no event loop (pode criar objetos JS)</span>\n        auto buf = Napi::Buffer<uint8_t>::Copy(Env(), dst, compressed_size);\n        deferred.Resolve(buf);\n    }\n};</div>", "<strong>Benchmark:</strong>\n<div class=\"pb-cmd\"><span class=\"pr\">$</span> node test/benchmark.js\n=== 1KB file ===\naddon C++:  0.003ms  (overhead domina)\nzlib:       0.012ms\nlz4js:      0.045ms\n=== 10MB
